<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayBook Pro - Ultimate Ledger</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase SDK (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-field { @apply w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none focus:border-indigo-500 transition-all text-white placeholder-slate-400; }
        .btn-primary { @apply w-full py-5 rounded-2xl font-black text-lg shadow-2xl active:scale-95 transition-all; }
        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        #zoomModal img { transition: transform 0.3s ease; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 overflow-x-hidden">

    <!-- 1. AUTH SCREEN -->
    <div id="authScreen" class="hidden fixed inset-0 z-[200] flex flex-col items-center justify-center p-8 bg-[#0f172a]">
        <div class="w-full max-w-md space-y-8">
            <div class="text-center">
                <h1 class="text-5xl font-black italic tracking-tighter text-white">PayBook<span class="text-indigo-500">.</span></h1>
                <p id="authSubtitle" class="text-xs uppercase tracking-widest text-slate-500 mt-2 font-bold">Secure Business Ledger</p>
            </div>

            <!-- Registration -->
            <div id="regBox" class="hidden space-y-4">
                <input type="text" id="regName" placeholder="Business Name" class="input-field">
                <input type="number" id="regPhone" placeholder="Mobile Number" class="input-field">
                <div class="grid grid-cols-2 gap-3">
                    <input type="password" id="regPin" placeholder="PIN" maxlength="4" class="input-field text-center tracking-widest">
                    <input type="password" id="regPinConf" placeholder="Confirm" maxlength="4" class="input-field text-center tracking-widest">
                </div>
                <button onclick="handleRegistration()" class="btn-primary bg-indigo-600 text-white">CREATE ACCOUNT</button>
            </div>

            <!-- Login -->
            <div id="loginBox" class="hidden space-y-6">
                <div class="text-center"><p class="text-indigo-400 font-bold" id="welcomeMsg">Welcome Back</p></div>
                <input type="password" id="loginPin" placeholder="Enter PIN" maxlength="4" class="input-field text-center text-3xl tracking-[1.5em] h-20">
                <button onclick="handleLogin()" class="btn-primary bg-emerald-600 text-white">UNLOCK APP</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP -->
    <div id="appBody" class="hidden min-h-screen bg-slate-50 text-slate-900 pb-24">
        <header class="bg-indigo-900 text-white p-6 sticky top-0 z-50 rounded-b-[40px] shadow-2xl">
            <div class="flex justify-between items-center">
                <h1 onclick="location.reload()" class="text-2xl font-black italic tracking-tighter">PayBook</h1>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-file-pdf text-xl opacity-70" onclick="askPin(handleSmartPdfDownload)"></i>
                    <div id="userAvatar" class="w-10 h-10 bg-indigo-800 rounded-full flex items-center justify-center border border-white/20 font-bold text-xs uppercase">AD</div>
                </div>
            </div>
            <div class="mt-8 flex justify-between items-end">
                <div>
                    <p id="balHeaderLabel" class="text-[10px] uppercase font-bold text-indigo-300 tracking-widest mb-1">Net Balance (Pakka)</p>
                    <div class="flex items-center gap-3">
                        <span id="secretTrigger" class="text-4xl font-black select-none cursor-pointer">₹</span>
                        <h2 id="mainTotal" class="text-4xl font-extrabold tracking-tighter">0.00</h2>
                    </div>
                </div>
                <div id="kacchaIndicator" class="hidden bg-rose-500 px-3 py-1 rounded-full text-[10px] font-black animate-pulse text-white mb-2 uppercase">Secret Mode</div>
            </div>
        </header>

        <!-- Home: Contact List -->
        <div id="pageHome" class="p-5">
            <div class="flex bg-white p-1 rounded-2xl shadow-sm mb-6 border border-slate-100">
                <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white">CUSTOMERS</button>
                <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-xl text-xs font-black text-slate-400">SUPPLIERS</button>
            </div>
            <div id="contactList" class="space-y-4"></div>
            <button onclick="openAddModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-all"><i class="fas fa-plus"></i></button>
        </div>

        <!-- Ledger Screen -->
        <div id="pageLedger" class="hidden p-5">
            <div class="flex justify-between items-center mb-6">
                <i class="fas fa-chevron-left text-xl text-slate-400" onclick="goHome()"></i>
                <div class="text-center">
                    <h2 id="lName" class="text-xl font-extrabold text-slate-800">Name</h2>
                    <p id="lPhone" class="text-[10px] text-slate-400 font-bold"></p>
                </div>
                <i class="fas fa-sync text-lg text-slate-300" onclick="syncFirebase()"></i>
            </div>
            <div id="ledgerList" class="space-y-4 pb-72"></div>

            <!-- Input Dock -->
            <div class="fixed bottom-0 left-0 right-0 bg-white p-6 rounded-t-[40px] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] border-t border-slate-100">
                <div class="flex gap-3 mb-4">
                    <input type="number" id="txAmt" placeholder="0.00" class="flex-1 p-5 bg-slate-100 rounded-2xl font-black text-3xl outline-none">
                    <label class="w-20 h-20 bg-slate-100 rounded-2xl flex items-center justify-center relative border-2 border-dashed border-slate-300 cursor-pointer">
                        <i class="fas fa-camera text-slate-400 text-2xl"></i>
                        <input type="file" id="txFile" accept="image/*" class="hidden">
                        <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-2xl">
                    </label>
                </div>
                <input type="text" id="txNote" placeholder="Note (Optional)" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none">
                <div class="flex gap-3">
                    <button onclick="preSave('GIVEN')" class="flex-1 py-5 bg-rose-500 text-white rounded-2xl font-black">GIVEN</button>
                    <button onclick="preSave('RECEIVED')" class="flex-1 py-5 bg-emerald-600 text-white rounded-2xl font-black">RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="pinModal" class="hidden fixed inset-0 bg-slate-900/90 z-[300] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 text-center shadow-2xl">
            <h3 class="text-xl font-black mb-4">Security PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-4 bg-slate-100 rounded-2xl text-center text-4xl tracking-widest outline-none border-2 focus:border-indigo-500">
            <div class="flex gap-4 mt-8">
                <button onclick="closePinModal()" class="flex-1 font-bold text-slate-400">Cancel</button>
                <button id="pinSubmitBtn" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-slate-900/60 z-[150] flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-10 shadow-2xl">
            <h3 id="addModalTitle" class="text-xl font-black mb-6">New Account</h3>
            <input id="newPName" type="text" placeholder="Full Name" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none">
            <input id="newPPhone" type="number" placeholder="Unique Phone Number" class="w-full p-4 bg-slate-100 rounded-2xl mb-6 outline-none">
            <div class="flex gap-4">
                <button onclick="closeAddModal()" class="flex-1 font-bold text-slate-400">Cancel</button>
                <button onclick="confirmAdd()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl">CREATE</button>
            </div>
        </div>
    </div>

    <div id="zoomModal" class="hidden fixed inset-0 bg-black/95 z-[500] flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="zoomImg" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ",
            authDomain: "paybook-cc6be.firebaseapp.com",
            projectId: "paybook-cc6be",
            storageBucket: "paybook-cc6be.firebasestorage.app",
            messagingSenderId: "1000801647538",
            appId: "1:1000801647538:web:648ac804d8d75a0811c2ab"
        };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();

        // --- State ---
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const SECRET_PIN = "5000"; 
        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer;

        // --- Initialization ---
        window.onload = async () => {
            const localData = localStorage.getItem('paybook_v3_final');
            if(localData) {
                db = JSON.parse(localData);
                if(db.admin) {
                    showLogin();
                    syncFirebase(); // Background sync
                } else showReg();
            } else showReg();
            
            setupImagePreview();
            setupSecretTrigger();
        };

        // --- Sync Logic ---
        async function syncFirebase() {
            if(!db.admin) return;
            const docRef = db_fs.collection("users").doc(db.admin.phone);
            try {
                const doc = await docRef.get();
                if (doc.exists) {
                    const cloudData = doc.data();
                    // Merge logic: simpler for this scale, cloud wins if exists
                    db.people = cloudData.people || [];
                    saveLocal();
                    refreshView();
                }
            } catch(e) { console.error("Sync failed", e); }
        }

        async function pushFirebase() {
            if(!db.admin) return;
            try {
                await db_fs.collection("users").doc(db.admin.phone).set({
                    admin: db.admin,
                    people: db.people,
                    lastSync: Date.now()
                });
            } catch(e) { console.error("Cloud push failed", e); }
        }

        function saveLocal() { 
            localStorage.setItem('paybook_v3_final', JSON.stringify(db)); 
            pushFirebase();
        }

        // --- Auth ---
        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = "Logged in as " + db.admin.phone;
        }

        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p1 = document.getElementById('regPin').value, p2 = document.getElementById('regPinConf').value;
            if(!n || ph.length < 10 || p1 !== p2 || p1.length < 4) return alert("Please fill details correctly!");
            db.admin = { name: n, phone: ph, pin: p1 };
            saveLocal();
            location.reload();
        }

        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("Wrong PIN!");
        }

        // --- Ledger UI ---
        function setupSecretTrigger() {
            const el = document.getElementById('secretTrigger');
            el.onpointerdown = () => {
                holdTimer = setTimeout(() => {
                    askPin(() => {
                        db.secret = !db.secret;
                        document.getElementById('kacchaIndicator').classList.toggle('hidden');
                        document.getElementById('secretTrigger').classList.toggle('text-rose-500');
                        document.getElementById('balHeaderLabel').innerText = db.secret ? "Net Balance (Kaccha)" : "Net Balance (Pakka)";
                        refreshView();
                    });
                }, 2000);
            };
            el.onpointerup = () => clearTimeout(holdTimer);
        }

        function switchTab(t) {
            db.tab = t;
            document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-md' : 'flex-1 py-3 rounded-xl text-xs font-black text-slate-400';
            document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-md' : 'flex-1 py-3 rounded-xl text-xs font-black text-slate-400';
            renderHome();
        }

        function renderHome() {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            let net = 0;
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBalance(p.transactions, db.secret);
                net += bal;
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-5 rounded-[30px] border border-slate-100 flex justify-between items-center shadow-sm active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-50 text-indigo-700 rounded-xl flex items-center justify-center font-black">${p.name[0]}</div>
                            <div>
                                <h4 class="font-extrabold text-slate-800">${p.name}</h4>
                                <p class="text-[9px] text-slate-400 font-bold">${p.phone}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h5 class="font-black ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${Math.abs(bal).toLocaleString()}</h5>
                            <p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'Due' : 'Advance'}</p>
                        </div>
                    </div>`;
            });
            updateMainBalance(net);
        }

        function calcBalance(txs, isSec) {
            let b = 0;
            txs.filter(t => t.secret === isSec && t.status === 'active').forEach(t => {
                b += (t.type === 'RECEIVED' ? t.amount : -t.amount);
            });
            return b;
        }

        function updateMainBalance(val) {
            const el = document.getElementById('mainTotal');
            // UI display: if secret mode, divide by 100
            const displayVal = db.secret ? (Math.abs(val) / 100).toFixed(2) : Math.abs(val).toLocaleString();
            el.innerText = displayVal;
            el.style.color = val > 0 ? '#f43f5e' : '#10b981';
        }

        function openLedger(id) {
            db.activeId = id;
            const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('lPhone').innerText = p.phone;
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            renderLedger();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList');
            list.innerHTML = "";
            const net = calcBalance(p.transactions, db.secret);
            updateMainBalance(net);

            p.transactions.filter(t => t.secret === db.secret).forEach(t => {
                const isLeft = t.type === 'GIVEN';
                const isDel = t.status === 'deleted';
                // Kaccha mode UI division
                const displayAmt = db.secret ? (t.amount / 100).toFixed(2) : t.amount.toLocaleString();
                
                list.innerHTML += `
                    <div class="flex flex-col ${isLeft ? 'items-start pl-2' : 'items-end pr-2'} mb-8 w-full ${isDel ? 'tx-deleted' : ''}">
                        <div class="bg-white w-[85%] rounded-3xl p-4 shadow-md border ${isLeft ? 'border-l-4 border-rose-500' : 'border-r-4 border-emerald-600'}">
                            ${t.imgUrl ? `<img src="${t.imgUrl}" class="w-full h-44 object-cover rounded-2xl mb-3" onclick="zoomImage('${t.imgUrl}')">` : ''}
                            <div class="flex justify-between items-center">
                                <h3 class="text-xl font-black ${isLeft?'text-rose-500':'text-emerald-600'}">₹${displayAmt}</h3>
                                <p class="text-[8px] text-slate-300 font-bold uppercase">${t.date}</p>
                            </div>
                            <p class="text-[10px] text-slate-500 italic mt-2">${t.note || ''}</p>
                            <div class="mt-4 flex gap-4 pt-2 border-t border-slate-50">
                                <button onclick="deleteTx(${t.id})" class="text-[8px] font-bold text-rose-300 uppercase">Delete</button>
                                <button onclick="editTransaction(${p.id}, ${t.id})" class="text-[8px] font-bold text-indigo-400 uppercase">Edit</button>
                                ${t.history ? `<i class="fas fa-history text-[8px] text-slate-300 ml-1" onclick="showHistory(${p.id},${t.id})"></i>` : ''}
                            </div>
                        </div>
                    </div>`;
            });
        }

        // --- Save Logic ---
        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value);
            if(!amt) return alert("Enter amount");

            const saveAction = async () => {
                let imgUrl = "";
                const file = document.getElementById('txFile').files[0];
                if(file) {
                    const fd = new FormData(); fd.append('image', file);
                    try {
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                        const data = await res.json(); imgUrl = data.data.url;
                    } catch(e) { console.error("Image upload failed"); }
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.unshift({
                    id: Date.now(),
                    amount: amt,
                    type,
                    secret: db.secret,
                    date: new Date().toLocaleDateString('en-GB'),
                    note: document.getElementById('txNote').value,
                    imgUrl,
                    status: 'active'
                });
                saveLocal();
                renderLedger();
                resetForm();
            };

            // PIN logic: Secret mode + Customer Receiving
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') {
                askPin(saveAction);
            } else {
                saveAction();
            }
        }

        // --- PDF Logic ---
        function handleSmartPdfDownload() {
            const isLedger = !document.getElementById('pageLedger').classList.contains('hidden');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const isSec = db.secret;

            if(isLedger) {
                const p = db.people.find(x => x.id === db.activeId);
                doc.setFontSize(16);
                doc.text(`${isSec ? 'Full' : 'Official'} Ledger: ${p.name}`, 14, 20);
                doc.setFontSize(10);
                doc.text(`Generated: ${new Date().toLocaleString()} | Original Amounts`, 14, 28);
                
                const headers = isSec ? [['Date', 'Note', 'Pakka Amt', 'Kaccha Amt']] : [['Date', 'Note', 'Amount (Pakka)']];
                const rows = p.transactions.filter(t => t.status === 'active').map(t => {
                    // Pakka mode PDF hides Kaccha transactions completely
                    if(!isSec && t.secret) return null;
                    
                    const amtStr = "Rs. " + t.amount.toLocaleString('en-IN');
                    if(isSec) {
                        return [t.date, t.note || '-', t.secret ? '-' : amtStr, t.secret ? amtStr : '-'];
                    } else {
                        return [t.date, t.note || '-', amtStr];
                    }
                }).filter(r => r !== null);

                doc.autoTable({ startY:35, head:headers, body:rows, theme:'grid', headStyles:{fillColor:isSec?[190,18,60]:[67,56,202]} });
                doc.save(`${p.name}_Ledger.pdf`);
            } else {
                doc.setFontSize(16);
                doc.text(`Business Summary (${isSec ? 'Full' : 'Pakka Only'})`, 14, 20);
                const headers = isSec ? [['Name', 'Pakka Bal', 'Kaccha Bal']] : [['Name', 'Balance']];
                const rows = db.people.map(p => {
                    let pb = 0, kb = 0;
                    p.transactions.filter(t => t.status === 'active').forEach(t => {
                        let v = (t.type === 'RECEIVED' ? t.amount : -t.amount);
                        if(t.secret) kb += v; else pb += v;
                    });
                    if(isSec) return [p.name, "Rs. "+pb.toLocaleString(), "Rs. "+kb.toLocaleString()];
                    return [p.name, "Rs. "+pb.toLocaleString()];
                });
                doc.autoTable({ startY:30, head:headers, body:rows, theme:'striped' });
                doc.save("PayBook_Summary.pdf");
            }
        }

        // --- Standard UI Helpers ---
        function askPin(callback) {
            const m = document.getElementById('pinModal');
            m.classList.remove('hidden');
            document.getElementById('confirmPinInput').value = "";
            document.getElementById('confirmPinInput').focus();
            document.getElementById('pinSubmitBtn').onclick = () => {
                const entered = document.getElementById('confirmPinInput').value;
                if(entered === db.admin.pin || entered === SECRET_PIN) {
                    m.classList.add('hidden');
                    callback();
                } else alert("Wrong PIN!");
            };
        }
        function closePinModal() { document.getElementById('pinModal').classList.add('hidden'); }

        function deleteTx(tid) {
            askPin(() => {
                const p = db.people.find(x => x.id === db.activeId);
                const t = p.transactions.find(x => x.id === tid);
                t.status = 'deleted';
                saveLocal(); renderLedger();
            });
        }

        function editTransaction(pid, tid) {
            const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid);
            askPin(() => {
                const nAmt = parseFloat(prompt("New Amount (Original):", t.amount));
                const nDate = prompt("Date (DD/MM/YYYY):", t.date);
                const nNote = prompt("Note:", t.note || "");
                if(!isNaN(nAmt)) {
                    if(!t.history) t.history = [];
                    t.history.push({ amt:t.amount, date:t.date, note:t.note, time: new Date().toLocaleString() });
                    t.amount = nAmt; t.date = nDate; t.note = nNote;
                    saveLocal(); renderLedger();
                }
            });
        }

        function showHistory(pid, tid) {
            const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid);
            alert("Edit History:\n" + t.history.map(h => `${h.time}: ₹${h.amt} (${h.date})`).join("\n"));
        }

        function setupImagePreview() {
            document.getElementById('txFile').onchange = e => {
                const f = e.target.files[0], p = document.getElementById('imgPreview');
                if(f) { p.src = URL.createObjectURL(f); p.classList.remove('hidden'); }
            };
        }

        function zoomImage(src) { 
            const m = document.getElementById('zoomModal'); 
            document.getElementById('zoomImg').src = src; 
            m.classList.remove('hidden'); 
        }

        function goHome() { 
            document.getElementById('pageLedger').classList.add('hidden'); 
            document.getElementById('pageHome').classList.remove('hidden'); 
            renderHome(); 
        }

        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function confirmAdd() {
            const n = document.getElementById('newPName').value, ph = document.getElementById('newPPhone').value;
            if(!n || !ph) return alert("Missing info");
            db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] });
            saveLocal(); closeAddModal(); renderHome();
            document.getElementById('newPName').value = ""; document.getElementById('newPPhone').value = "";
        }

        function resetForm() {
            document.getElementById('txAmt').value = ""; 
            document.getElementById('txNote').value = ""; 
            document.getElementById('txFile').value = ""; 
            document.getElementById('imgPreview').classList.add('hidden');
        }

        function refreshView() {
            if(db.activeId && !document.getElementById('pageLedger').classList.contains('hidden')) renderLedger();
            else renderHome();
        }

        function forgotPin() {
            const ph = prompt("Enter registered phone:");
            if(ph === db.admin.phone) {
                const np = prompt("New 4-digit PIN:");
                if(np && np.length === 4) { db.admin.pin = np; saveLocal(); alert("PIN Updated"); }
            }
        }
    </script>
</body>
</html>
