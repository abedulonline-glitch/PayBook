<!DOCTYPE html>
<html lang="bn">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayBook - Secure Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 pb-24">

    <!-- Header -->
    <div class="bg-indigo-900 text-white p-5 sticky top-0 z-50 shadow-xl">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter">PayBook</h1>
            <div class="flex gap-4">
                <i class="fas fa-chart-pie text-xl" onclick="generateReport()"></i>
                <i class="fas fa-sync-alt text-xl" id="syncBtn" onclick="syncWithDrive()"></i>
            </div>
        </div>
        <div id="balanceSection" class="mt-4 bg-white/10 p-4 rounded-xl border border-white/20">
            <p class="text-[10px] uppercase font-bold opacity-70">Net Balance (Pakka View)</p>
            <h2 id="totalBalance" class="text-3xl font-bold">₹ 0.00</h2>
        </div>
    </div>

    <!-- Form -->
    <div class="p-4 bg-white m-3 rounded-2xl shadow-sm border border-slate-200">
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="col-span-2 relative">
                <input type="number" id="amt" placeholder="Amount (₹)" class="w-full p-4 bg-slate-100 rounded-xl text-xl font-bold outline-none border-2 border-transparent focus:border-indigo-500">
                <span class="absolute right-4 top-4 text-slate-400">₹</span>
            </div>
            <input type="date" id="dt" class="p-3 bg-slate-100 rounded-xl text-sm">
            <div class="flex items-center justify-center bg-slate-100 rounded-xl px-2">
                <input type="checkbox" id="isK" class="w-5 h-5 accent-indigo-600">
                <span class="ml-2 text-xs font-bold text-slate-600 uppercase">Kaccha?</span>
            </div>
        </div>
        
        <div class="flex items-center justify-between mb-4 px-1">
            <input type="file" id="imgInp" accept="image/*" class="hidden">
            <label for="imgInp" class="flex items-center gap-2 text-indigo-600 font-bold text-sm">
                <i class="fas fa-camera"></i> Add Receipt
            </label>
            <span id="fileName" class="text-[10px] text-slate-400">No file chosen</span>
        </div>

        <div class="flex gap-3">
            <button onclick="saveEntry('GIVEN')" class="flex-1 py-4 bg-rose-500 text-white rounded-xl font-black shadow-lg shadow-rose-200 uppercase tracking-widest">Given</button>
            <button onclick="saveEntry('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-black shadow-lg shadow-emerald-200 uppercase tracking-widest">Received</button>
        </div>
    </div>

    <!-- Transaction List -->
    <div id="list" class="px-3 space-y-3">
        <p class="text-center text-slate-400 mt-10">Syncing with Google Drive...</p>
    </div>

    <script>
        // CONFIG - আপনার তথ্য এখানে দিন
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const GOOGLE_CLIENT_ID = '465014257318-v5q8qn6v1vjnth5nqdrnqj37gsv4p76e.apps.googleusercontent.com';
        const SECRET_PIN = "1234"; 

        let db = { transactions: [] };
        let tokenClient;
        let accessToken = null;

        // ১. ImgBB-তে ছবি আপলোড
        async function uploadImg(file) {
            if(!file) return "https://via.placeholder.com/100?text=No+Img";
            let body = new FormData();
            body.append('image', file);
            let res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body });
            let data = await res.json();
            return data.data.url;
        }

        // ২. ট্রানজ্যাকশন সেভ লজিক
        async function saveEntry(type) {
            let amount = parseFloat(document.getElementById('amt').value);
            let isKaccha = document.getElementById('isK').checked;
            let date = document.getElementById('dt').value || new Date().toISOString().split('T')[0];
            let file = document.getElementById('imgInp').files[0];

            if(!amount) return alert("অ্যামাউন্ট দিন!");
            
            document.getElementById('syncBtn').classList.add('animate-spin');
            let imgUrl = await uploadImg(file);

            let entry = {
                id: Date.now(),
                amount, type, isKaccha, date, imgUrl
            };

            db.transactions.unshift(entry);
            render();
            await syncWithDrive(); // ড্রাইভের সাথে সেভ
            document.getElementById('syncBtn').classList.remove('animate-spin');
            document.getElementById('amt').value = "";
        }

        // ৩. রেন্ডার লিস্ট (স্মার্ট মাস্কিং সহ)
        function render() {
            let list = document.getElementById('list');
            list.innerHTML = "";
            let totalPakka = 0;

            db.transactions.forEach(t => {
                // Secret Logic: Kaccha amount mask (Amount / 100)
                let displayAmt = t.isKaccha ? (t.amount / 100).toFixed(2) : t.amount.toLocaleString();
                if(!t.isKaccha) totalPakka += (t.type === 'RECEIVED' ? t.amount : -t.amount);

                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-slate-100" 
                         oncontextmenu="event.preventDefault(); showReal(${t.id}, ${t.amount})">
                        <div class="flex items-center gap-3">
                            <img src="${t.imgUrl}" class="w-12 h-12 rounded-lg object-cover bg-slate-100">
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">${t.date}</p>
                                <p class="font-black text-slate-700">${t.type}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h3 id="amt-${t.id}" class="text-lg font-black ${t.type === 'GIVEN' ? 'text-rose-500' : 'text-emerald-600'}">₹ ${displayAmt}</h3>
                            <button onclick="whatsapp(${t.amount},'${t.type}')" class="text-[10px] font-bold text-indigo-500 uppercase"><i class="fab fa-whatsapp"></i> Share Real</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('totalBalance').innerText = "₹ " + totalPakka.toLocaleString();
        }

        // ৪. পিন প্রটেক্টেড রিয়েল অ্যামাউন্ট
        function showReal(id, real) {
            if(prompt("সিক্রেট পিন দিন:") === SECRET_PIN) {
                let el = document.getElementById(`amt-${id}`);
                el.innerText = "₹ " + real.toLocaleString();
                el.style.color = "#4f46e5"; // Indigo color
                setTimeout(() => render(), 6000); // ৬ সেকেন্ড পর আবার হাইড
            }
        }

        // ৫. WhatsApp শেয়ার (আসল টাকা শেয়ার হবে)
        function whatsapp(amt, type) {
            let msg = `PayBook Update: ${type} Amount: ₹${amt}. Date: ${new Date().toLocaleDateString()}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        // ৬. Google Drive Sync (Placeholder for Full Drive Logic)
        async function syncWithDrive() {
            console.log("Syncing to Google Drive AppDataFolder...");
            localStorage.setItem('paybook_db', JSON.stringify(db));
            // এখানে Drive API-এর fetch('https://www.googleapis.com/upload/drive/v3/files') মেথড বসবে
        }

        // ফাইল সিলেক্ট করলে নাম দেখানো
        document.getElementById('imgInp').onchange = e => {
            document.getElementById('fileName').innerText = e.target.files[0].name;
        };

        // ইনিশিয়াল লোড
        window.onload = () => {
            let local = localStorage.getItem('paybook_db');
            if(local) { db = JSON.parse(local); render(); }
        };
    </script>
</body>
</html>
