<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Axis Premium Edition</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F4F7F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--axis-grey); color: #333; margin: 0; overflow: hidden; }
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        .axis-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .axis-input { @apply w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#861F41] bg-white; }
        
        /* Message Bubbles Style */
        .bubble { max-width: 85%; padding: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); background: white; }
        .bubble-left { align-self: flex-start; border-radius: 0 1.5rem 1.5rem 1.5rem; border-left: 5px solid #861F41; }
        .bubble-right { align-self: flex-end; border-radius: 1.5rem 0 1.5rem 1.5rem; border-right: 5px solid #10b981; }

        /* Drawer & Media Sheet System */
        #entryDrawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 600; }
        #entryDrawer.open { transform: translateY(0); }
        #mediaSheet { z-index: 2000 !important; background: rgba(0,0,0,0.6); }

        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
        #mainViewport { height: calc(100vh - 65px); overflow-y: auto; scroll-behavior: smooth; }
    </style>
</head>
<body>

    <!-- 1. AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-8 overflow-y-auto">
        <div class="w-full max-w-md text-center">
            <div class="w-20 h-20 axis-gradient rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black">PB</div>
            <h1 class="text-3xl font-black text-[#861F41] mb-10">PayBook<span class="text-slate-300">Pro</span></h1>

            <div id="regBox" class="hidden space-y-4 text-left">
                <input type="text" id="regName" placeholder="Owner Name" class="axis-input">
                <input type="number" id="regPhone" placeholder="10-Digit Mobile" class="axis-input">
                <input type="password" id="regPin" placeholder="Set PIN" maxlength="4" class="axis-input text-center tracking-widest">
                <button onclick="handleRegistration()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold mt-4 shadow-xl">CREATE ACCOUNT</button>
            </div>

            <div id="loginBox" class="hidden space-y-8">
                <div class="p-6 bg-slate-50 rounded-2xl border-l-8 border-[#861F41] text-left">
                    <p id="displayPhone" class="text-xl font-black text-[#861F41]"></p>
                </div>
                <input type="password" id="loginPin" placeholder="PIN" maxlength="4" class="axis-input text-center text-5xl tracking-widest h-24">
                <button onclick="handleLogin()" class="w-full py-5 bg-[#861F41] text-white rounded-2xl font-bold shadow-2xl">SECURE ACCESS</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP UI -->
    <div id="appBody" class="hidden min-h-screen">
        <header class="axis-gradient text-white sticky top-0 z-[100] h-[65px] px-5 flex items-center justify-between shadow-lg">
            <div id="headerMain" class="flex justify-between items-center w-full">
                <h1 class="text-xl font-black italic">PayBook</h1>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-file-pdf opacity-80" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog opacity-80" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <i class="fas fa-arrow-left" onclick="goHome()"></i>
                    <div><h2 id="lName" class="text-sm font-bold leading-none">Client</h2><p id="balTypeLabel" class="text-[8px] opacity-60 uppercase">Portfolio Balance</p></div>
                </div>
                <div class="flex items-center gap-3">
                    <span id="mainTotal" class="font-black text-lg">0.00</span>
                    <span id="secretTrigger" class="text-xl font-black opacity-30 select-none">₹</span>
                </div>
            </div>
        </header>

        <div id="mainViewport" class="bg-slate-50">
            <!-- Home: Contacts -->
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl border mb-6 shadow-sm">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md transition-all">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400 transition-all">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-3"></div>
                <button onclick="openAddModal()" class="fixed bottom-10 right-6 w-16 h-16 axis-gradient text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl border-4 border-white"><i class="fas fa-plus"></i></button>
            </div>

            <!-- Ledger: Transactions -->
            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col"></div>
                <div class="fixed bottom-8 left-5 right-5 flex gap-3 z-[150]">
                    <button onclick="triggerDrawer('GIVEN')" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-2xl">↑ GIVEN</button>
                    <button onclick="triggerDrawer('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl">↓ RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. PREMIUM DATA ENTRY DRAWER -->
    <div id="entryDrawer" class="fixed inset-0 bg-black/60 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3rem] p-8 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-10" onclick="closeDrawer()"></div>
            <div class="text-center mb-8">
                <p id="drawerActionType" class="text-[10px] font-black text-slate-400 uppercase">Amount</p>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <span class="text-4xl font-black text-slate-300">₹</span>
                    <input type="number" id="txAmt" placeholder="0.00" class="text-5xl font-black text-[#861F41] bg-transparent outline-none w-2/3 text-center border-b-2">
                </div>
            </div>
            <div class="space-y-4 mb-10">
                <div class="flex items-center bg-slate-50 p-4 rounded-2xl gap-4"><i class="fas fa-file-lines text-slate-300"></i><input type="text" id="txNote" placeholder="Add Notes (Bill No/Ref)" class="bg-transparent outline-none flex-1 text-sm text-slate-700"></div>
                <div class="flex items-center bg-slate-50 p-4 rounded-2xl gap-4" onclick="document.getElementById('txDate').showPicker()"><i class="fas fa-calendar-alt text-slate-300"></i><input type="date" id="txDate" class="bg-transparent outline-none flex-1 text-sm font-bold text-slate-600"></div>
                <div class="bg-slate-50 p-4 rounded-2xl flex items-center justify-between">
                    <p class="text-sm font-bold text-slate-500">Bill Image</p>
                    <div class="flex gap-2">
                        <div id="billPreviewArea" class="hidden relative"><img id="imgPreview" class="w-10 h-10 rounded-lg object-cover border"><i class="fas fa-times-circle absolute -top-2 -right-2 text-rose-500 bg-white rounded-full" onclick="clearImage()"></i></div>
                        <button onclick="openMediaSelector()" class="w-10 h-10 bg-white border-2 border-dashed rounded-lg flex items-center justify-center text-slate-300"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
            <button id="mainConfirmBtn" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-xl uppercase">Confirm Transaction</button>
        </div>
    </div>

    <!-- 4. MEDIA SELECTOR -->
    <div id="mediaSheet" class="fixed inset-0 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] p-10 flex justify-around shadow-2xl transition-transform duration-300">
            <button onclick="triggerCamera()" class="flex flex-col items-center gap-2"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-2xl"><i class="fas fa-camera"></i></div><span class="text-xs font-bold text-slate-600">Camera</span></button>
            <button onclick="triggerGallery()" class="flex flex-col items-center gap-2"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-2xl"><i class="fas fa-image"></i></div><span class="text-xs font-bold text-slate-600">Gallery</span></button>
        </div>
        <input type="file" id="camInp" accept="image/*" capture="camera" class="hidden">
        <input type="file" id="galInp" accept="image/*" class="hidden">
    </div>

    <!-- 5. OTHER MODALS -->
    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[2000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl">
            <h3 class="text-xl font-black mb-10 text-[#861F41]">Enter Security PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-4 bg-slate-50 rounded-2xl text-center text-4xl tracking-widest outline-none border">
            <button id="pinSubmitBtn" class="w-full py-4 mt-8 bg-[#861F41] text-white rounded-xl font-bold">VERIFY PIN</button>
        </div>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[3.5rem] p-10 shadow-2xl">
            <h3 class="text-xl font-black text-[#861F41] mb-8 text-center uppercase">Add New Account</h3>
            <input id="newPName" type="text" placeholder="Full Name" class="axis-input mb-4">
            <input id="newPPhone" type="number" placeholder="10-Digit Mobile" class="axis-input mb-10">
            <div class="flex gap-4">
                <button onclick="closeAddModal()" class="flex-1 font-bold text-slate-400">EXIT</button>
                <button onclick="confirmAdd()" class="flex-1 py-4 bg-[#861F41] text-white rounded-xl font-bold shadow-lg">SAVE PROFILE</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10 shadow-2xl">
            <h3 class="text-xl font-black text-[#861F41] mb-8 text-center">SECURITY SETTINGS</h3>
            <button onclick="askPin(changePinProcess)" class="w-full p-6 bg-slate-50 rounded-3xl flex justify-between font-bold mb-3">Change PIN <i class="fas fa-chevron-right text-slate-300"></i></button>
            <button onclick="shareApp()" class="w-full p-6 bg-slate-50 rounded-3xl flex justify-between font-bold text-emerald-600 mb-8">Share App <i class="fas fa-share-nodes"></i></button>
            <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="axis-gradient text-white w-full py-4 rounded-xl font-bold">CLOSE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";

        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer, autoExitTimer, capturedImgFile = null;

        window.onload = () => {
            const data = localStorage.getItem('pb_v11_axis');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) showLogin(); else showReg();
            } else showReg();
            initSecretGesture();
            
            document.getElementById('camInp').onchange = e => handleImageFile(e.target.files[0]);
            document.getElementById('galInp').onchange = e => handleImageFile(e.target.files[0]);
        };

        // --- AUTH & CLOUD ---
        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden'); 
            document.getElementById('displayPhone').innerText = "+91 " + db.admin.phone;
            syncCloud();
        }
        // ১. একটি নির্দিষ্ট এবং ইউনিক ডেটাবেস কী ব্যবহার করা
const DB_KEY = 'PayBook_Pro_Verified_V12';

// ২. ডেটা সেভ করার সলিড ফাংশন
function saveDB() {
    // লোকাল স্টোরেজে সেভ
    localStorage.setItem(DB_KEY, JSON.stringify(db));
    
    // ফায়ারবেসে ব্যাকগ্রাউন্ডে সেভ
    if(db.admin && db.admin.phone) {
        db_fs.collection("global_ledgers").doc(db.admin.phone).set(db)
            .then(() => console.log("Cloud Updated"))
            .catch(err => console.error("Cloud Error", err));
    }
}

// ৩. রেজিস্ট্রেশন হ্যান্ডলার (সরাসরি অ্যাপে নিয়ে যাবে)
function handleRegistration() {
    const n = document.getElementById('regName').value.trim();
    const ph = document.getElementById('regPhone').value.trim();
    const p = document.getElementById('regPin').value.trim();

    if(!n || ph.length !== 10 || p.length < 4) {
        return alert("Please enter Name, 10-digit Phone, and 4-digit PIN!");
    }

    // ডেটা অবজেক্ট তৈরি
    db.admin = { name: n, phone: ph, pin: p };
    db.people = []; // নতুন ইউজারের জন্য কন্টাক্ট লিস্ট খালি
    
    // সেভ করা
    saveDB();

    // রেজিস্ট্রেশন সফল হলে সরাসরি অ্যাপ বডিতে নিয়ে যাবে (রিফ্রেশ ছাড়াই)
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('appBody').classList.remove('hidden');
    
    // ইউজার ইনফো আপডেট
    document.getElementById('welcomeName').innerText = db.admin.name;
    document.getElementById('userInitials').innerText = db.admin.name.substring(0,2).toUpperCase();
    
    renderHome();
    alert("Account Created Successfully!");
}

// ৪. অ্যাপ স্টার্টআপ লজিক (নিখুঁত চেক)
window.onload = () => {
    const savedData = localStorage.getItem(DB_KEY);
    
    if(savedData) {
        db = JSON.parse(savedData);
        if(db.admin && db.admin.phone) {
            // যদি আগে থেকে রেজিস্টার করা থাকে, তবে লগইন বক্স দেখাবে
            showLogin(); 
            loadCloudSync(); // ব্যাকগ্রাউন্ডে ক্লাউড থেকে লেটেস্ট ডেটা আনবে
        } else {
            showReg();
        }
    } else {
        showReg();
    }

    // ইমেজ এবং অন্যান্য হ্যান্ডলার...
    setupImageHandlers();
};

async function loadCloudSync() {
    if(db.admin && db.admin.phone) {
        const doc = await db_fs.collection("global_ledgers").doc(db.admin.phone).get();
        if(doc.exists) { 
            db = doc.data(); 
            // যদি ইউজার অলরেডি লগইন অবস্থায় অ্যাপ বডিতে থাকে, তবেই রি-রেন্ডার হবে
            if(!document.getElementById('appBody').classList.contains('hidden')) {
                renderHome(); 
            }
        }
    }
}
          
        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin || document.getElementById('loginPin').value === MASTER_PIN) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("Invalid Axis PIN!");
        }

        // --- CONTACT MANAGEMENT (Fixes Creation) ---
        function switchTab(t) {
            db.tab = t;
            document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400';
            document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400';
            renderHome();
        }

        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); document.getElementById('newPName').value=""; document.getElementById('newPPhone').value=""; }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }

        function confirmAdd() {
            const n = document.getElementById('newPName').value.trim();
            const ph = document.getElementById('newPPhone').value.trim();
            if(!n || ph.length !== 10) return alert("Enter Name & 10-digit Phone!");
            if(db.people.some(x => x.phone === ph)) return alert("Number already exists!");
            
            db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] });
            saveDB(); closeAddModal(); renderHome();
        }

        // --- LEDGER LOGIC ---
        function calcBal(txs, isSecMode, pType) {
    let b = 0;
    // দ্রুত ফিল্টারিং
    const filtered = txs.filter(t => t.status === 'active' && !!t.secret === !!isSecMode);
    
    for (let i = 0; i < filtered.length; i++) {
        const t = filtered[i];
        if (pType === 'CUSTOMER') {
            b += (t.type === 'GIVEN' ? t.amount : -t.amount);
        } else {
            b += (t.type === 'RECEIVED' ? t.amount : -t.amount);
        }
    }
    return b;
}

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerLedger').classList.add('hidden');
            document.getElementById('headerMain').classList.remove('hidden');
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret, p.type);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="axis-card p-5 flex justify-between items-center active:scale-95 transition-all">
                        <div class="flex items-center gap-4"><div class="w-12 h-12 axis-gradient text-white rounded-2xl flex items-center justify-center font-black text-xs shadow-lg">${p.name[0]}</div>
                        <div><h4 class="font-bold text-sm text-slate-800">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">${p.phone}</p></div></div>
                        <div class="text-right"><h5 class="font-black text-sm ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5><p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'YOU GET' : 'CLEAR'}</p></div>
                    </div>`;
            });
        }

        function openLedger(id) {
            db.activeId = id; const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('headerMain').classList.add('hidden');
            document.getElementById('headerLedger').classList.remove('hidden');
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            renderLedger();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            const net = calcBal(p.transactions, db.secret, p.type);
            const dNet = db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN');
            document.getElementById('mainTotal').innerText = dNet;
            document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isR = t.type === 'RECEIVED', isDel = t.status === 'deleted';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                let isRedCol = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');

                list.innerHTML += `
                    <div class="flex flex-col ${isR ? 'items-end pr-2' : 'items-start pl-2'} w-full mb-10 ${isDel ? 'tx-deleted' : ''}">
                        <div class="text-[8px] font-black text-slate-300 uppercase mb-2">${t.date}</div>
                        <div class="bubble ${isR ? 'bubble-right' : 'bubble-left'}">
                            ${t.imgUrl ? `<img src="${t.imgUrl}" class="w-full h-44 object-cover rounded-xl mb-3 shadow-inner" onclick="window.open(this.src)">` : ''}
                            <div class="flex justify-between items-center gap-6"><h3 class="text-xl font-black ${isRedCol?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3><p class="text-[8px] font-bold text-slate-300">${t.type}</p></div>
                            <p class="text-[10px] text-slate-500 italic mt-1 font-medium">${t.note || 'Ref: PB-AX'+t.id.toString().slice(-4)}</p>
                            <div class="flex gap-5 mt-4 pt-3 border-t"><i class="fas fa-edit text-indigo-300 text-xs" onclick="editTx(${p.id}, ${t.id})"></i><i class="fas fa-trash text-rose-200 text-xs" onclick="deleteTx(${t.id})"></i><i class="fab fa-whatsapp text-emerald-300 text-xs ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i>
                            ${t.history ? `<i class="fas fa-history text-slate-300 text-xs" onclick="showHistory(${p.id}, ${t.id})"></i>`:''}</div>
                        </div>
                    </div>`;
            });
            setTimeout(() => { document.getElementById('mainViewport').scrollTop = list.scrollHeight; }, 100);
        }

        // --- DATA ENTRY DRAWER ---
        function triggerDrawer(type) {
            const drawer = document.getElementById('entryDrawer'); drawer.classList.remove('hidden');
            setTimeout(() => drawer.classList.add('open'), 10);
            document.getElementById('drawerActionType').innerText = type + " AMOUNT";
            document.getElementById('drawerActionType').style.color = (type==='GIVEN' ? '#e11d48' : '#059669');
            document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('mainConfirmBtn').onclick = () => preSave(type);
        }
        function closeDrawer() { const d = document.getElementById('entryDrawer'); d.classList.remove('open'); setTimeout(() => { d.classList.add('hidden'); clearImage(); document.getElementById('txAmt').value=""; document.getElementById('txNote').value=""; }, 400); }

        function openMediaSelector() { document.getElementById('mediaSheet').classList.remove('hidden'); }
        function triggerCamera() { document.getElementById('camInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function triggerGallery() { document.getElementById('galInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function handleImageFile(f) { if(!f) return; capturedImgFile = f; document.getElementById('imgPreview').src = URL.createObjectURL(f); document.getElementById('billPreviewArea').classList.remove('hidden'); }
        function clearImage() { document.getElementById('billPreviewArea').classList.add('hidden'); capturedImgFile = null; }

        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Enter Amount!");
            const action = async () => {
                document.getElementById('mainConfirmBtn').innerText = "UPLOADING...";
                let imgUrl = "";
                if(capturedImgFile) {
                    const fd = new FormData(); fd.append('image', capturedImgFile);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                    const dat = await res.json(); if(dat.success) imgUrl = dat.data.url;
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:document.getElementById('txDate').value, note:document.getElementById('txNote').value, imgUrl, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
                document.getElementById('mainConfirmBtn').innerText = "CONFIRM TRANSACTION";
                if(db.secret) startAutoExit();
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
        }

        function exitSecret() {
    db.secret = false;
    clearTimeout(autoExitTimer);

    // ১. সাথে সাথে UI ইন্ডিকেটর পরিবর্তন করুন
    const badge = document.getElementById('kacchaTag') || document.getElementById('secretBadge');
    if(badge) badge.classList.add('hidden');
    
    const trigger = document.getElementById('secretTrigger');
    if(trigger) trigger.classList.remove('text-rose-500');

    const label = document.getElementById('balLabel') || document.getElementById('balHeader');
    if(label) label.innerText = "Total Net Portfolio (Pakka)";

    // ২. ক্লাউড থেকে ডাটা লোড না করে সরাসরি লোকাল ডাটা দিয়ে রেন্ডার করুন
    // এটি মাইক্রো-সেকেন্ডে কাজ করবে
    if (!document.getElementById('pageLedger').classList.contains('hidden')) {
        renderLedger();
    } else {
        renderHome();
    }
}

        // --- GESTURES & TIMER (30s) ---
        function initSecretGesture() {
            const el = document.getElementById('secretTrigger');
            el.onpointerdown = () => { holdTimer = setTimeout(() => { askPin(() => { db.secret = true; document.getElementById('secretTrigger').classList.add('text-rose-500'); renderLedger(); startAutoExit(); }); }, 2500); };
            el.onpointerup = () => clearTimeout(holdTimer);
        }
        function startAutoExit() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(() => { db.secret = false; document.getElementById('secretTrigger').classList.remove('text-rose-500'); renderAll(); }, 30000); }

        // --- UTILS ---
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("Wrong PIN!"); }; }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('headerLedger').classList.add('hidden'); document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('pageHome').classList.remove('hidden'); renderHome(); }
        function renderAll() { if(!document.getElementById('pageLedger').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function editTx(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); askPin(() => { const n = parseFloat(prompt("New Original Amt:", t.amount)), note = prompt("Update Note:", t.note); if(!t.history) t.history = []; t.history.push({ amt: t.amount, note: t.note, date: new Date().toLocaleString() }); t.amount = n; t.note = note; saveDB(); renderLedger(); }); }
        function showHistory(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); let msg = "Edit History:\n\n"; t.history.forEach(h => msg += `${h.date}: Rs. ${h.amt} (${h.note})\n`); alert(msg); }
        function shareWA(amt, type, name) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro Receipt: '+name+'\n'+type+': Rs.'+amt)}`); }
        function shareApp() { window.open(`https://wa.me/?text=${encodeURIComponent('Manage your business with PayBook Pro: ' + window.location.href)}`); }
        function changePinProcess() { const p = prompt("New 4-Digit PIN:"); if(p && p.length===4) { db.admin.pin = p; saveDB(); alert("PIN Updated!"); } }

        function handleSmartPdfDownload() {
    // চেক করা হচ্ছে ইউজার এখন লেজার পেজে আছে নাকি হোম পেজে
    const ledgerPage = document.getElementById('pageLedger');
    const isLedgerView = ledgerPage && !ledgerPage.classList.contains('hidden');
    const isSecretMode = !!db.secret;

    if (isLedgerView && db.activeId) {
        // নির্দিষ্ট ব্যক্তির ডিটেইল রিপোর্ট
        downloadPersonalLedgerPDF(db.activeId, isSecretMode);
    } else {
        // সব কাস্টমারের সামারি রিপোর্ট
        downloadBusinessSummaryPDF(isSecretMode);
    }
}
        function downloadPersonalLedgerPDF(personId, isSecret) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const person = db.people.find(p => p.id === personId);

    // হেডার তথ্য
    doc.setFontSize(18);
    doc.setTextColor(isSecret ? 134 : 15, isSecret ? 31 : 23, isSecret ? 65 : 42);
    doc.text(`Account Statement: ${person.name}`, 14, 20);
    
    doc.setFontSize(9);
    doc.setTextColor(100);
    doc.text(`Type: ${person.type} | Mobile: +91 ${person.phone}`, 14, 28);
    doc.text(`Report Mode: ${isSecret ? 'Detailed (Full)' : 'Official (Pakka)'} | Date: ${new Date().toLocaleString()}`, 14, 33);

    // কলাম নির্ধারণ (Given ও Received আলাদা কলামে)
    let headers = isSecret 
        ? [['Date', 'Note', 'Pakka Given', 'Pakka Rec.', 'Kaccha Given', 'Kaccha Rec.']] 
        : [['Date', 'Note', 'Given (Debit)', 'Received (Credit)']];

    const tableData = [];
    let totP_Given = 0, totP_Rec = 0, totK_Given = 0, totK_Rec = 0;

    person.transactions.filter(t => t.status === 'active').forEach(t => {
        const amt = t.amount;
        if (!isSecret) {
            // পাক্কা মোড: কাঁচা ডাটা ফিল্টার আউট
            if (!t.secret) {
                if(t.type === 'GIVEN') totP_Given += amt; else totP_Rec += amt;
                tableData.push([t.date, t.note || "-", (t.type==='GIVEN' ? "Rs. "+amt : "-"), (t.type==='RECEIVED' ? "Rs. "+amt : "-")]);
            }
        } else {
            // কাঁচা মোড: পাকা ও কাঁচা পাশাপাশি
            let pG="-", pR="-", kG="-", kR="-";
            if(!t.secret) {
                if(t.type==='GIVEN') { pG="Rs. "+amt; totP_Given+=amt; } else { pR="Rs. "+amt; totP_Rec+=amt; }
            } else {
                if(t.type==='GIVEN') { kG="Rs. "+amt; totK_Given+=amt; } else { kR="Rs. "+amt; totK_Rec+=amt; }
            }
            tableData.push([t.date, t.note || "-", pG, pR, kG, kR]);
        }
    });

    // ফুটার এবং নিট ব্যালেন্স ক্যালকুলেশন
    const netPakka = totP_Given - totP_Rec;
    const netKaccha = totK_Given - totK_Rec;

    doc.autoTable({
        startY: 40,
        head: headers,
        body: tableData,
        theme: 'grid',
        headStyles: { fillColor: isSecret ? [134, 31, 65] : [15, 23, 42] },
        styles: { fontSize: 7, font: 'helvetica' }
    });

    // সামারি সেকশন নিচে
    let finalY = doc.lastAutoTable.finalY + 10;
    doc.setFontSize(10);
    doc.setTextColor(0);
    doc.text(`SUMMARY:`, 14, finalY);
    doc.text(`Total Given: Rs. ${(isSecret ? totP_Given + totK_Given : totP_Given).toLocaleString('en-IN')}`, 14, finalY + 7);
    doc.text(`Total Received: Rs. ${(isSecret ? totP_Rec + totK_Rec : totP_Rec).toLocaleString('en-IN')}`, 14, finalY + 14);
    
    doc.setFontSize(12);
    doc.setTextColor(netPakka + netKaccha > 0 ? 200 : 0, 0, 0);
    const balLabel = person.type === 'CUSTOMER' ? 'You Get (Balance)' : 'You Pay (Due)';
    doc.text(`${balLabel}: Rs. ${Math.abs(isSecret ? netPakka + netKaccha : netPakka).toLocaleString('en-IN')}`, 14, finalY + 25);

    doc.save(`${person.name}_Statement.pdf`);
}
        function downloadBusinessSummaryPDF(isSecret) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(20);
    doc.text(`Business Portfolio Summary`, 14, 20);
    doc.setFontSize(10);
    doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 28);

    let headers = isSecret 
        ? [['Name', 'Type', 'Pakka Bal', 'Kaccha Bal', 'Net Total']] 
        : [['Name', 'Type', 'Mobile', 'Pakka Balance']];

    const tableData = [];
    db.people.forEach(p => {
        let pB = 0, kB = 0;
        p.transactions.filter(t => t.status === 'active').forEach(t => {
            let v = (t.type === 'RECEIVED' ? -t.amount : t.amount);
            if (t.secret) kB += v; else pB += v;
        });

        if (!isSecret) {
            tableData.push([p.name, p.type, p.phone, "Rs. " + pB.toLocaleString('en-IN')]);
        } else {
            tableData.push([p.name, p.type, "Rs. " + pB.toLocaleString('en-IN'), "Rs. " + kB.toLocaleString('en-IN'), "Rs. " + (pB+kB).toLocaleString('en-IN')]);
        }
    });

    doc.autoTable({
        startY: 35,
        head: headers,
        body: tableData,
        headStyles: { fillColor: [134, 31, 65] }
    });

    doc.save("Full_Business_Summary.pdf");
}
