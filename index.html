<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Axis Premium Edition</title>
    
    <!-- লাইব্রেরি সমূহ -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F4F7F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--axis-grey); color: #333; margin: 0; overflow: hidden; user-select: none; }
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        .axis-input { @apply w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#861F41] bg-white text-slate-700; }
        
        /* পয়েন্ট ৫: মেসেজ বাবল স্টাইল (Given/Received চেনার জন্য) */
        .bubble { max-width: 85%; padding: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); background: white; border-radius: 1.2rem; }
        .bubble-left { align-self: flex-start; border-left: 5px solid #861F41; border-top-left-radius: 0; }
        .bubble-right { align-self: flex-end; border-right: 5px solid #10b981; border-top-right-radius: 0; }

        /* পয়েন্ট ৩: ড্রয়ার এবং ডাটা এন্ট্রি স্ক্রিন */
        #entryDrawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        #entryDrawer.open { transform: translateY(0); }
        
        /* পয়েন্ট ৮: পিন এন্ট্রির ঘর ছোট ও স্মার্ট */
        .pin-input-box { height: 50px !important; font-size: 1.5rem !important; letter-spacing: 1rem !important; }
        
        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
        #mainViewport { height: calc(100vh - 65px); overflow-y: auto; scroll-behavior: smooth; }
        
        /* পয়েন্ট ৪: সিক্রেট ব্লিনকিং আইকন */
        .blink-secret { animation: blinker 1s linear infinite; color: #ff4d4d !important; font-weight: 900; }
        @keyframes blinker { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <!-- ১ (ক): রেজিস্ট্রেশন ও লগইন স্ক্রিন -->
    <div id="authScreen" class="fixed inset-0 z-[5000] bg-white flex flex-col items-center justify-center p-6 overflow-y-auto">
        <div class="w-full max-w-md bg-white p-8 rounded-[3rem] shadow-2xl border">
            <div class="text-center mb-8">
                <div class="w-16 h-16 axis-gradient rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl font-black shadow-lg">PB</div>
                <h1 class="text-3xl font-black text-[#861F41]">PayBook<span class="text-slate-300">Pro</span></h1>
            </div>

            <!-- ট্যাব সুইচার -->
            <div class="flex bg-slate-100 p-1 rounded-xl mb-8 border">
                <button onclick="toggleAuth('LOGIN')" id="tabLogin" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white">LOGIN</button>
                <button onclick="toggleAuth('REG')" id="tabReg" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400">REGISTER</button>
            </div>

            <div id="loginBox" class="space-y-6">
                <input type="number" id="loginPhone" placeholder="Mobile Number" class="axis-input">
                <input type="password" id="loginPin" placeholder="PIN" maxlength="4" class="axis-input text-center pin-input-box shadow-inner">
                <button onclick="handleLogin()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold shadow-xl">ACCESS ACCOUNT</button>
            </div>

            <div id="regBox" class="hidden space-y-4">
                <input type="text" id="regName" placeholder="Owner Name" class="axis-input">
                <input type="number" id="regPhone" placeholder="10-Digit Mobile" class="axis-input">
                <input type="password" id="regPin" placeholder="Set 4-Digit PIN" maxlength="4" class="axis-input text-center pin-input-box">
                <button onclick="handleRegistration()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold mt-4 shadow-lg">CREATE ACCOUNT</button>
            </div>
        </div>
    </div>

    <!-- ২: মেইন অ্যাপ ইউআই -->
    <div id="appBody" class="hidden min-h-screen">
        <header class="axis-gradient text-white sticky top-0 z-[100] h-[65px] px-5 flex items-center justify-between shadow-lg">
            <div id="headerMain" class="flex justify-between items-center w-full">
                <h1 class="text-xl font-black italic">PayBook</h1>
                <div class="flex gap-5 items-center">
                    <!-- ১: অ্যাপ শেয়ার বাটন -->
                    <i class="fas fa-share-nodes opacity-80" onclick="shareApp()"></i>
                    <!-- ৫: গ্লোবাল পিডিএফ আইকন -->
                    <i class="fas fa-file-pdf opacity-80" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog opacity-80" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <i class="fas fa-arrow-left" onclick="goHome()"></i>
                    <div><h2 id="lName" class="text-sm font-bold leading-none">Client</h2><p id="balTypeLabel" class="text-[8px] opacity-60 uppercase mt-1">Portfolio Balance</p></div>
                </div>
                <div class="flex items-center gap-4">
                    <!-- ৫: ইন্ডিভিজুয়াল পিডিএফ আইকন -->
                    <i class="fas fa-file-pdf opacity-80" onclick="askPin(handleSmartPdfDownload)"></i>
                    <span id="mainTotal" class="font-black text-lg">0.00</span>
                    <!-- ৪ ও ৮: সিক্রেট ট্রিগার (হোল্ড টু এন্টার, টাচ টু এক্সিট) -->
                    <span id="secretTrigger" class="text-2xl font-black opacity-30 select-none cursor-pointer">₹</span>
                </div>
            </div>
        </header>

        <div id="mainViewport" class="bg-slate-50">
            <!-- কাস্টমার ও সাপ্লায়ার লিস্ট -->
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl border mb-6 shadow-sm">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-3"></div>
                <button onclick="openAddModal()" class="fixed bottom-10 right-6 w-16 h-16 axis-gradient text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl border-4 border-white"><i class="fas fa-plus"></i></button>
            </div>

            <!-- ট্রানজ্যাকশন লিস্ট -->
            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col"></div>
                <div class="fixed bottom-8 left-5 right-5 flex gap-3 z-[150]">
                    <button onclick="triggerDrawer('GIVEN')" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-2xl uppercase tracking-tighter">↑ Given</button>
                    <button onclick="triggerDrawer('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl uppercase tracking-tighter">↓ Received</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ৩: ডাটা এন্ট্রি ড্রয়ার (মাল্টি ইমেজ সাপোর্ট) -->
    <div id="entryDrawer" class="fixed inset-0 bg-black/60 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3rem] p-8 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-10" onclick="closeDrawer()"></div>
            <div class="text-center mb-8">
                <p id="drawerActionType" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Entry Amount</p>
                <input type="number" id="txAmt" placeholder="0.00" class="text-5xl font-black text-[#861F41] bg-transparent outline-none w-full text-center border-b-2 mt-2">
            </div>
            <div class="space-y-4 mb-10">
                <!-- ৩ (ই): নোট এন্ট্রি -->
                <input type="text" id="txNote" placeholder="Add Note / Reference" class="axis-input bg-slate-50 border-none">
                <!-- ৩ (এফ): কালেকশন ডেট -->
                <input type="date" id="txDate" class="axis-input bg-slate-50 border-none font-bold">
                
                <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between border">
                    <p class="text-sm font-bold text-slate-500 uppercase tracking-tighter">Attach Bills (Multi)</p>
                    <div class="flex gap-2">
                        <!-- থাম্বনেইল প্রিভিউ এরিয়া -->
                        <div id="multiImgPreviewContainer" class="flex gap-2"></div>
                        <button onclick="openMediaSelector()" class="w-10 h-10 bg-white border-2 border-dashed rounded-lg flex items-center justify-center text-slate-300"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
            <button id="mainConfirmBtn" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-xl uppercase">Confirm Entry</button>
        </div>
    </div>

    <!-- সেটিংস ও ম্যানেজার সেন্টার -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-black text-[#861F41] mb-8 text-center uppercase">Management Center</h3>
            <!-- ১ (বি): ম্যানেজার নিয়োগ -->
            <button onclick="hireManager()" class="w-full p-5 bg-slate-50 rounded-2xl flex justify-between font-bold mb-3 italic">Hire New Manager <i class="fas fa-user-plus"></i></button>
            <div id="mgrList" class="space-y-2 mb-6"></div>
            <!-- ১ (সি): পিন চেঞ্জ -->
            <button onclick="askPin(changePinProcess)" class="w-full p-5 bg-slate-50 rounded-2xl flex justify-between font-bold mb-3">Change Security PIN <i class="fas fa-key"></i></button>
            <button onclick="transferAccProcess()" class="w-full p-5 bg-slate-50 rounded-2xl flex justify-between font-bold mb-8">Transfer Phone Number <i class="fas fa-exchange-alt"></i></button>
            <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="axis-gradient text-white w-full py-4 rounded-xl font-bold uppercase">Back</button>
            <!-- ১ (ডি): লগআউট বাটন -->
            <button onclick="logout()" class="w-full py-4 text-rose-500 font-bold uppercase mt-4 text-[10px]"><i class="fas fa-power-off"></i> Secure Logout</button>
        </div>
    </div>

    <!-- পিন ও মিডিয়া মোডাল -->
    <div id="pinModal" class="hidden fixed inset-0 bg-black/80 z-[4000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center">
            <h3 class="font-black text-[#861F41] mb-8 uppercase tracking-widest">Verify Admin Access</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="axis-input text-center text-4xl tracking-widest h-14 mb-8 pin-input-box">
            <button id="pinSubmitBtn" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold uppercase shadow-xl">Confirm</button>
        </div>
    </div>

    <div id="mediaSheet" class="fixed inset-0 bg-black/60 hidden z-[3000]">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] p-10 flex justify-around shadow-2xl">
            <button onclick="triggerCamera()" class="flex flex-col items-center gap-3"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-2xl shadow-inner"><i class="fas fa-camera"></i></div><span class="text-xs font-bold uppercase tracking-tighter">Camera</span></button>
            <button onclick="triggerGallery()" class="flex flex-col items-center gap-3"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-2xl shadow-inner"><i class="fas fa-image"></i></div><span class="text-xs font-bold uppercase tracking-tighter">Gallery</span></button>
        </div>
        <input type="file" id="camInp" accept="image/*" capture="camera" class="hidden">
        <input type="file" id="galInp" accept="image/*" class="hidden">
    </div>

    <script>
        // --- ফায়ারবেস কনফিগ (গ্লোবাল সিঙ্ক: পয়েন্ট ৯) ---
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";
        const STORAGE_KEY = 'PB_Ultimate_V12_Axis_Final';

        let db = { admin: null, people: [], managers: [], secret: false, tab: 'CUSTOMER', activeId: null, role: 'ADMIN', opName: '' };
        let holdTimer, autoExitTimer, tempImageFiles = [];

        window.onload = () => {
            const data = localStorage.getItem(STORAGE_KEY);
            if(data) {
                db = JSON.parse(data);
                if(db.admin) { toggleAuth('LOGIN'); } else showReg();
            } else showReg();
            initSecretGesture();
            
            // মিডিয়া হ্যান্ডলার
            document.getElementById('camInp').onchange = e => handleImageFile(e.target.files[0]);
            document.getElementById('galInp').onchange = e => handleImageFile(e.target.files[0]);
        };

        // --- সেভ ও সিঙ্ক লজিক (পয়েন্ট ৯: মিউচুয়াল এন্ট্রি সাপোর্ট) ---
        function saveDB() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            if(db.admin && db.admin.phone) db_fs.collection("global_ledgers").doc(db.admin.phone).set(db);
        }

        async function loadCloudSync(ph) {
            const doc = await db_fs.collection("global_ledgers").doc(ph).get();
            if(doc.exists) { db = doc.data(); renderHome(); }
        }

        // --- অথেনটিকেশন (পয়েন্ট ১এ ও ৮) ---
        function toggleAuth(mode) {
            const lBox = document.getElementById('loginBox'), rBox = document.getElementById('regBox'), tLog = document.getElementById('tabLogin'), tReg = document.getElementById('tabReg');
            if(mode==='LOGIN') { lBox.classList.remove('hidden'); rBox.classList.add('hidden'); tLog.className="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white"; tReg.className="flex-1 py-3 rounded-lg text-xs font-black text-slate-400"; }
            else { rBox.classList.remove('hidden'); lBox.classList.add('hidden'); tReg.className="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white"; tLog.className="flex-1 py-3 rounded-lg text-xs font-black text-slate-400"; }
        }

        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value;
            if(!n || ph.length !== 10) return alert("Invalid Data!");
            db.admin = { name: n, phone: ph, pin: p };
            saveDB(); location.reload();
        }

        async function handleLogin() {
            const ph = document.getElementById('loginPhone').value, pin = document.getElementById('loginPin').value;
            const doc = await db_fs.collection("global_ledgers").doc(ph).get();
            if (doc.exists) {
                const cloud = doc.data();
                if(pin === cloud.admin.pin || pin === MASTER_PIN) { db = cloud; db.role = 'ADMIN'; db.opName = db.admin.name; enterApp(); }
                else {
                    const mgr = (cloud.managers || []).find(m => m.pin === pin);
                    if(mgr) { db = cloud; db.role = 'MANAGER'; db.opName = mgr.name; enterApp(); }
                    else alert("Wrong PIN!");
                }
            } else { alert("Account not found!"); toggleAuth('REG'); }
        }

        function enterApp() { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appBody').classList.remove('hidden'); renderHome(); }
        function logout() { if(confirm("Secure Logout?")) location.reload(); }

        // --- সিক্রেট মোড (পয়েন্ট ৪, ৬, ৭, ৮) ---
        function initSecretGesture() {
            const el = document.getElementById('secretTrigger');
            el.onclick = () => { if(db.secret) exitSecret(); };
            el.onpointerdown = () => { if(!db.secret) holdTimer = setTimeout(() => { askPin(() => { db.secret=true; el.classList.add('blink-secret'); renderAll(); startAutoExitTimer(); }); }, 2500); };
            el.onpointerup = () => clearTimeout(holdTimer);
        }
        function startAutoExitTimer() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(exitSecret, 60000); } // ১ মিনিট (পয়েন্ট ৭)
        function exitSecret() { db.secret = false; document.getElementById('secretTrigger').classList.remove('blink-secret'); renderAll(); }

        // --- ক্যালকুলেশন ও রেন্ডার (পয়েন্ট ৪ ও ৬: ১০০ দিয়ে ভাগ) ---
        function calcBal(txs, isSec, pType) {
            let b = 0;
            txs.filter(t => t.status==='active' && !!t.secret === !!isSec).forEach(t => {
                if (pType === 'CUSTOMER') b += (t.type==='GIVEN' ? t.amount : -t.amount);
                else b += (t.type==='RECEIVED' ? t.amount : -t.amount);
            });
            return b;
        }

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('headerLedger').classList.add('hidden');
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret, p.type);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `<div onclick="openLedger(${p.id})" class="axis-card p-5 flex justify-between items-center active:scale-95 transition-all">
                    <div class="flex items-center gap-3"><div class="w-12 h-12 axis-gradient text-white rounded-2xl flex items-center justify-center font-black text-xs shadow-lg">${p.name[0]}</div>
                    <div><h4 class="font-bold text-sm">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">${p.phone}</p></div></div>
                    <div class="text-right"><h5 class="font-black text-sm ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5><p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'DUE' : 'CLEAR'}</p></div></div>`;
            });
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            const net = calcBal(p.transactions, db.secret, p.type);
            const dNet = db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN');
            document.getElementById('mainTotal').innerText = dNet;
            document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isR = t.type === 'RECEIVED', isDel = t.status === 'deleted';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                let isRedCol = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');

                let imgHtml = "";
                if(t.images) t.images.forEach(img => imgHtml += `<img src="${img}" class="h-40 w-auto rounded-xl mr-2 shadow-sm" onclick="window.open('${img}')">`);

                list.innerHTML += `<div class="flex flex-col ${isR ? 'items-end pr-2' : 'items-start pl-2'} w-full mb-10 ${isDel ? 'tx-deleted' : ''}">
                    <div class="text-[8px] font-black text-slate-300 uppercase mb-2 px-2">${t.date}</div>
                    <div class="bubble ${isR ? 'bubble-right' : 'bubble-left'}">
                        <div class="flex gap-2 overflow-x-auto mb-3 scroll-hide">${imgHtml}</div>
                        <div class="flex justify-between items-center gap-6"><h3 class="text-xl font-black ${isRedCol?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3><p class="text-[8px] font-bold text-slate-300">${t.type}</p></div>
                        <p class="text-[10px] text-slate-500 italic mt-1 font-medium">${t.note || ''}</p>
                        <p class="text-[7px] text-slate-300 mt-1 uppercase font-bold tracking-tighter border-t pt-1">By: ${t.by || 'Owner'} (Edited by Manager? ${t.history?'Yes':'No'})</p>
                        <div class="flex gap-5 mt-4 pt-2"><i class="fas fa-edit text-indigo-300 text-xs" onclick="editTx(${p.id}, ${t.id})"></i><i class="fas fa-trash text-rose-200 text-xs" onclick="deleteTx(${t.id})"></i><i class="fab fa-whatsapp text-emerald-300 text-xs ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i>
                        ${t.history ? `<i class="fas fa-history text-slate-300 text-xs" onclick="showHistory(${p.id}, ${t.id})"></i>`:''}</div>
                    </div></div>`;
            });
            document.getElementById('mainViewport').scrollTop = list.scrollHeight;
        }

        // --- পয়েন্ট ৩: ইমেজ ও ডাটা সেভ ---
        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Amount!");
            const action = async () => {
                document.getElementById('mainConfirmBtn').innerText = "SAVING...";
                let imgUrls = [];
                for(let file of tempImageFiles) {
                    const fd = new FormData(); fd.append('image', file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                    const dat = await res.json(); if(dat.success) imgUrls.push(dat.data.url);
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:document.getElementById('txDate').value, note:document.getElementById('txNote').value, images:imgUrls, by: db.opName, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
        }

        // --- পয়েন্ট ১ ও ৭: সেটিংস ও ম্যানেজার ---
        function hireManager() {
            const n = prompt("Manager Name:"), ph = prompt("10-Digit Phone:"), p = prompt("Manager PIN:");
            if(n && ph.length===10 && p.length===4) { if(!db.managers) db.managers = []; db.managers.push({ name:n, phone:ph, pin:p }); saveDB(); renderManagers(); }
        }
        function renderManagers() { const l = document.getElementById('mgrList'); l.innerHTML = ""; (db.managers || []).forEach(m => { l.innerHTML += `<div class="p-3 bg-slate-100 rounded-xl flex justify-between"><span>${m.name} (${m.phone})</span><i class="fas fa-trash text-rose-300" onclick="delMgr('${m.phone}')"></i></div>`; }); }
        function delMgr(ph) { if(confirm("Remove?")) { db.managers = db.managers.filter(m=>m.phone!==ph); saveDB(); renderManagers(); } }

        // --- পয়েন্ট ৬: পিডিএফ (অরিজিনাল এমাউন্ট সহ) ---
        function handleSmartPdfDownload() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const isSec = db.secret;
            if(!document.getElementById('pageLedger').classList.contains('hidden')) {
                const p = db.people.find(x => x.id === db.activeId); doc.text(`Official Ledger: ${p.name}`, 14, 20);
                const head = isSec ? [['Date', 'Given Rs.', 'Received Rs.']] : [['Date', 'Total Amount Rs.']];
                const rows = p.transactions.filter(t => t.status==='active').map(t => {
                    const amtS = t.amount.toLocaleString('en-IN'); // অরিজিনাল এমাউন্ট
                    return isSec ? [t.date, t.type==='GIVEN'?amtS:'-', t.type==='RECEIVED'?amtS:'-'] : [t.date, amtS];
                });
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} }); doc.save(`${p.name}.pdf`);
            } else {
                doc.text(`Full Summary`, 14, 20);
                const head = isSec ? [['Name', 'Pakka Rs.', 'Kaccha Rs.']] : [['Name', 'Pakka Balance']];
                const rows = db.people.map(p => { 
                    let pb=0, kb=0; p.transactions.filter(t=>t.status==='active').forEach(t=>{ let v=(t.type==='RECEIVED'?t.amount:-t.amount); if(t.secret) kb+=v; else pb+=v; });
                    return isSec ? [p.name, pb, kb] : [p.name, pb];
                });
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} }); doc.save("Business_Summary.pdf");
            }
        }

        // --- ইউটিলস ---
        function handleImageFile(f) { if(!f) return; tempImageFiles.push(f); renderMultiThumbnails(); }
        function renderMultiThumbnails() { const c = document.getElementById('multiImgPreviewContainer'); c.innerHTML = ""; tempImageFiles.forEach((file, idx) => { c.innerHTML += `<div class="relative w-10 h-10"><img src="${URL.createObjectURL(file)}" class="w-full h-full object-cover rounded"><i class="fas fa-times absolute -top-1 -right-1 text-red-500 bg-white rounded-full text-[8px]" onclick="tempImageFiles.splice(${idx},1);renderMultiThumbnails();"></i></div>`; }); }
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("Wrong!"); }; }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('pageHome').classList.remove('hidden'); document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('headerLedger').classList.add('hidden'); renderHome(); }
        function switchTab(t) { db.tab = t; document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; renderHome(); }
        function renderAll() { if(!document.getElementById('pageLedger').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function triggerDrawer(t) { document.getElementById('entryDrawer').classList.remove('hidden'); setTimeout(()=>document.getElementById('entryDrawer').classList.add('open'), 10); document.getElementById('drawerActionType').innerText=t; document.getElementById('txDate').value=new Date().toISOString().split('T')[0]; document.getElementById('mainConfirmBtn').onclick=()=>preSave(t); }
        function closeDrawer() { document.getElementById('entryDrawer').classList.remove('open'); setTimeout(()=>{document.getElementById('entryDrawer').classList.add('hidden'); tempImageFiles=[]; document.getElementById('multiImgPreviewContainer').innerHTML="";}, 400); }
        function openMediaSelector() { document.getElementById('mediaSheet').classList.remove('hidden'); }
        function triggerCamera() { document.getElementById('camInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function triggerGallery() { document.getElementById('galInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function clearImage() { tempImageFiles=[]; document.getElementById('multiImgPreviewContainer').innerHTML=""; }
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); document.getElementById('newPName').value=""; document.getElementById('newPPhone').value=""; }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function editTx(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); askPin(() => { const n = parseFloat(prompt("New Amt:", t.amount)), nt = prompt("Note:", t.note); if(!t.history) t.history = []; t.history.push({ amt: t.amount, note: t.note, date: new Date().toLocaleString() }); t.amount = n; t.note = nt; saveDB(); renderLedger(); }); }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function showHistory(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); let msg = "History:\n\n"; t.history.forEach(h => msg += `${h.date}: Rs. ${h.amt} (${h.note})\n`); alert(msg); }
        function shareApp() { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro: Download link: ' + window.location.href)}`); }
        function shareWA(amt, t, n) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro: '+n+'\n'+t+': Rs.'+amt)}`); }
        function changePin() { const p = prompt("New 4-Digit PIN:"); if(p && p.length===4) { db.admin.pin = p; saveDB(); alert("PIN Updated!"); } }
        function transferAcc() { const v = prompt("Current Phone:"); if(v===db.admin.phone) { const n = prompt("New 10 Digit Phone:"); if(n && n.length===10) { db.admin.phone = n; saveDB(); location.reload(); } } }
    </script>
</body>
</html>
