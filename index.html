<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Axis Elite Premium</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-burgundy-dark: #631430; --axis-grey: #F4F7F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--axis-grey); color: #333; margin: 0; overflow: hidden; user-select: none; }
        
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        .axis-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(134, 31, 65, 0.05); border: 1px solid rgba(134, 31, 65, 0.03); }
        .auth-input { @apply w-full p-5 rounded-2xl border-2 border-slate-100 outline-none focus:border-[#861F41] bg-slate-50 text-lg font-medium; }
        .auth-card { background: white; border-radius: 3rem 3rem 0 0; box-shadow: 0 -20px 50px rgba(134, 31, 65, 0.1); }

        /* Message Bubble Styles */
        .bubble { max-width: 85%; padding: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); background: white; border: 1px solid #f1f5f9; }
        .bubble-left { align-self: flex-start; border-radius: 0 1.5rem 1.5rem 1.5rem; border-left: 5px solid #861F41; }
        .bubble-right { align-self: flex-end; border-radius: 1.5rem 0 1.5rem 1.5rem; border-right: 5px solid #10b981; }

        /* Drawer & Sheets Animation */
        #entryDrawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        #entryDrawer.open { transform: translateY(0); }
        #mediaSheet { z-index: 2000 !important; }

        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
        #mainViewport { height: calc(100vh - 65px); overflow-y: auto; scroll-behavior: smooth; }
        
        .blink-secret { animation: blinker 1.5s linear infinite; color: #ff4d4d !important; font-weight: 900; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <!-- 1. AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 z-[3000] bg-white flex flex-col hidden">
        <div class="h-[35%] axis-gradient flex flex-col items-center justify-center text-white p-10 relative overflow-hidden">
            <div class="w-20 h-20 bg-white rounded-[2rem] flex items-center justify-center shadow-2xl mb-4">
                <i class="fas fa-university text-[#861F41] text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic">PayBook Pro</h1>
            <p class="text-[8px] uppercase tracking-[0.4em] font-bold mt-2 opacity-70">Premium Business Ledger</p>
        </div>

        <div class="auth-card flex-1 -mt-10 p-10 flex flex-col justify-between overflow-y-auto">
            <div id="authContent">
                <!-- Login Box -->
                <div id="loginBox" class="hidden">
                    <h2 class="text-3xl font-black text-slate-800 mb-2">Login</h2>
                    <p class="text-sm text-slate-400 font-medium mb-8">Access your authenticated ledger</p>
                    <div class="p-5 bg-slate-50 rounded-2xl border-l-8 border-[#861F41] mb-8 text-left">
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Active Account</span>
                        <p id="displayPhone" class="text-xl font-black text-[#861F41] mt-1"></p>
                    </div>
                    <input type="password" id="loginPin" placeholder="ENTER 4-DIGIT PIN" maxlength="4" class="auth-input text-center text-5xl tracking-[1em] h-24 shadow-inner mb-8">
                    <button onclick="handleLogin()" class="w-full py-5 bg-[#861F41] text-white rounded-2xl font-black text-lg shadow-2xl uppercase tracking-widest">Unlock</button>
                </div>

                <!-- Register Box -->
                <div id="regBox" class="hidden">
                    <h2 class="text-2xl font-black text-slate-800 mb-2">Open Account</h2>
                    <p class="text-sm text-slate-400 font-medium mb-8">Set up your business profile</p>
                    <div class="space-y-4">
                        <input type="text" id="regName" placeholder="Admin/Owner Name" class="auth-input">
                        <input type="number" id="regPhone" placeholder="10-Digit Mobile Number" class="auth-input">
                        <input type="password" id="regPin" placeholder="Set 4-Digit PIN" maxlength="4" class="auth-input text-center tracking-[0.5em]">
                    </div>
                    <button onclick="handleRegistration()" class="w-full py-5 bg-[#861F41] text-white rounded-2xl font-black text-lg shadow-2xl mt-8 uppercase tracking-widest">Create</button>
                </div>
            </div>
            <p class="text-[9px] text-slate-300 font-black uppercase text-center mt-6 tracking-widest">
                <i class="fas fa-shield-halved text-emerald-500 mr-1"></i> Axis Premium Secure Sync
            </p>
        </div>
    </div>

    <!-- 2. MAIN APPLICATION UI -->
    <div id="appBody" class="hidden min-h-screen">
        <header class="axis-gradient text-white sticky top-0 z-[100] h-[65px] px-5 flex items-center justify-between shadow-xl">
            <div id="headerMain" class="flex justify-between items-center w-full">
                <h1 class="text-xl font-black italic">PayBook</h1>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-file-pdf opacity-80 text-xl" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog opacity-80 text-xl" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-4">
                    <div onclick="goHome()" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full active:bg-white/20 transition-all"><i class="fas fa-arrow-left text-white"></i></div>
                    <div><h2 id="lName" class="text-sm font-bold leading-none">Client</h2><p id="balTypeLabel" class="text-[8px] opacity-60 uppercase mt-1">Portfolio Balance</p></div>
                </div>
                <div class="flex items-center gap-3">
                    <i class="fas fa-file-pdf opacity-80 mr-2" onclick="askPin(handleSmartPdfDownload)"></i>
                    <span id="mainTotal" class="font-black text-lg tracking-tighter">0.00</span>
                    <span id="secretTrigger" class="text-2xl font-black opacity-30 select-none">₹</span>
                </div>
            </div>
        </header>

        <div id="mainViewport" class="bg-slate-50">
            <!-- Home Screen -->
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl border mb-6 shadow-sm">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-3"></div>
                <button onclick="openAddModal()" class="fixed bottom-10 right-6 w-16 h-16 axis-gradient text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl border-4 border-white transition-all active:scale-90"><i class="fas fa-plus"></i></button>
            </div>

            <!-- Ledger Screen -->
            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col pb-40"></div>
                <div class="fixed bottom-8 left-5 right-5 flex gap-3 z-[150]">
                    <button onclick="triggerDrawer('GIVEN')" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-2xl uppercase tracking-widest text-xs">↑ Given</button>
                    <button onclick="triggerDrawer('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl uppercase tracking-widest text-xs">↓ Received</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. DATA ENTRY DRAWER -->
    <div id="entryDrawer" class="fixed inset-0 bg-black/60 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3rem] p-8 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-10" onclick="closeDrawer()"></div>
            <div class="text-center mb-8">
                <p id="drawerActionType" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Entry Amount</p>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <span class="text-4xl font-black text-slate-300">₹</span>
                    <input type="number" id="txAmt" placeholder="0.00" class="text-5xl font-black text-[#861F41] bg-transparent outline-none w-2/3 text-center border-b-2 border-slate-100 focus:border-[#861F41] pb-2">
                </div>
            </div>
            <div class="space-y-4 mb-10 text-left">
                <div class="flex items-center bg-slate-50 p-4 rounded-2xl gap-4"><i class="fas fa-file-lines text-slate-300"></i><input type="text" id="txNote" placeholder="Add Note / Ref" class="bg-transparent outline-none flex-1 text-sm text-slate-700"></div>
                <div class="flex items-center bg-slate-50 p-4 rounded-2xl gap-4" onclick="document.getElementById('txDate').showPicker()"><i class="fas fa-calendar-alt text-slate-300"></i><input type="date" id="txDate" class="bg-transparent outline-none flex-1 text-sm font-bold text-slate-600"></div>
                <div class="bg-slate-50 p-4 rounded-2xl flex items-center justify-between">
                    <p class="text-sm font-bold text-slate-500">Attach Bill</p>
                    <div class="flex gap-2">
                        <div id="billPreviewArea" class="hidden relative"><img id="imgPreview" class="w-10 h-10 rounded-lg object-cover shadow-sm"><i class="fas fa-times-circle absolute -top-2 -right-2 text-rose-500 bg-white rounded-full" onclick="clearImage()"></i></div>
                        <button onclick="openMediaSelector()" class="w-10 h-10 bg-white border-2 border-dashed rounded-lg flex items-center justify-center text-slate-300"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
            <button id="mainConfirmBtn" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-xl uppercase tracking-widest active:scale-95 transition-all">Confirm Entry</button>
        </div>
    </div>

    <!-- 4. MODALS & MEDIA -->
    <div id="mediaSheet" class="fixed inset-0 bg-black/60 hidden z-[3000]">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] p-10 flex justify-around shadow-2xl">
            <button onclick="triggerCamera()" class="flex flex-col items-center gap-3"><div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-[#861F41] text-2xl shadow-inner border border-slate-100"><i class="fas fa-camera"></i></div><span class="text-xs font-bold text-slate-600">Camera</span></button>
            <button onclick="triggerGallery()" class="flex flex-col items-center gap-3"><div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-[#861F41] text-2xl shadow-inner border border-slate-100"><i class="fas fa-image"></i></div><span class="text-xs font-bold text-slate-600">Gallery</span></button>
        </div>
        <input type="file" id="camInp" accept="image/*" capture="camera" class="hidden">
        <input type="file" id="galInp" accept="image/*" class="hidden">
    </div>

    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[5000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] p-12 text-center shadow-2xl">
            <i class="fas fa-shield-halved text-5xl text-[#861F41] mb-8"></i>
            <h3 class="text-xl font-black mb-10 text-[#861F41] uppercase tracking-widest">Verify Access</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-5 bg-slate-50 rounded-2xl text-center text-4xl tracking-widest outline-none border focus:border-[#861F41]">
            <button id="pinSubmitBtn" class="w-full py-4 mt-10 bg-[#861F41] text-white rounded-xl font-bold uppercase shadow-xl">Authorize</button>
        </div>
    </div>

    <!-- 5. SCRIPTS (Final Business Logic) -->
    <script>
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";
        const DB_KEY = 'PayBook_Axis_Ultimate_Final_V12';

        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer, autoExitTimer, capturedImgFile = null;

        window.onload = () => {
            const data = localStorage.getItem(DB_KEY);
            document.getElementById('authScreen').classList.remove('hidden');
            if(data) {
                db = JSON.parse(data);
                if(db.admin && db.admin.phone) showLogin(); else showReg();
            } else showReg();
            initSecretGesture();
            document.getElementById('camInp').onchange = e => handleImageFile(e.target.files[0]);
            document.getElementById('galInp').onchange = e => handleImageFile(e.target.files[0]);
        };

        function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); if(db.admin) db_fs.collection("global_ledgers").doc(db.admin.phone).set(db); }
        async function syncCloud() { const doc = await db_fs.collection("global_ledgers").doc(db.admin.phone).get(); if(doc.exists) { db = doc.data(); renderHome(); } }

        function showReg() { document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { document.getElementById('loginBox').classList.remove('hidden'); document.getElementById('displayPhone').innerText = "+91 " + db.admin.phone; syncCloud(); }

        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value;
            if(!n || ph.length !== 10) return alert("Valid 10-digit phone required!");
            db.admin = { name: n, phone: ph, pin: p };
            saveDB(); location.reload();
        }

        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin || document.getElementById('loginPin').value === MASTER_PIN) {
                document.getElementById('authScreen').style.transform = "translateY(-100%)";
                document.getElementById('authScreen').style.transition = "transform 0.5s ease-in";
                setTimeout(() => { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appBody').classList.remove('hidden'); renderHome(); }, 500);
            } else alert("Invalid Axis PIN!");
        }

        function switchTab(t) { db.tab = t; document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; renderHome(); }

        function initSecretGesture() {
            const el = document.getElementById('secretTrigger');
            el.onclick = () => { if(db.secret) exitSecretManually(); };
            el.onpointerdown = () => { if(!db.secret) { holdTimer = setTimeout(() => { askPin(() => { db.secret = true; el.classList.add('blink-secret'); renderAll(); startAutoExit(); }); }, 2500); } };
            el.onpointerup = () => clearTimeout(holdTimer);
        }
        function startAutoExit() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(exitSecretManually, 60000); }
        function exitSecretManually() { db.secret = false; clearTimeout(autoExitTimer); document.getElementById('secretTrigger').classList.remove('blink-secret'); renderAll(); }

        function calcBal(txs, isSecMode, pType) {
            let b = 0;
            txs.filter(t => t.status==='active' && !!t.secret === !!isSecMode).forEach(t => {
                if (pType === 'CUSTOMER') b += (t.type==='GIVEN' ? t.amount : -t.amount);
                else b += (t.type==='RECEIVED' ? t.amount : -t.amount);
            });
            return b;
        }

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerLedger').classList.add('hidden'); document.getElementById('headerMain').classList.remove('hidden');
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret, p.type);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                const isRed = bal > 0;
                list.innerHTML += `<div onclick="openLedger(${p.id})" class="axis-card p-5 flex justify-between items-center active:scale-95 transition-all">
                    <div class="flex items-center gap-4"><div class="w-12 h-12 axis-gradient text-white rounded-2xl flex items-center justify-center font-black text-xs shadow-lg">${p.name[0]}</div>
                    <div><h4 class="font-bold text-sm text-slate-800">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">${p.phone}</p></div></div>
                    <div class="text-right"><h5 class="font-black text-sm ${isRed ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5><p class="text-[7px] font-bold text-slate-300 uppercase">${isRed ? 'YOU GET' : 'SETTLED'}</p></div></div>`;
            });
        }

        function openLedger(id) {
            db.activeId = id; const p = db.people.find(x => x.id === id);
            if(!p) return alert("Account not found!");
            document.getElementById('lName').innerText = p.name;
            document.getElementById('headerMain').classList.add('hidden');
            document.getElementById('headerLedger').classList.remove('hidden');
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            renderLedger();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            const net = calcBal(p.transactions, db.secret, p.type);
            const dNet = db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN');
            document.getElementById('mainTotal').innerText = dNet;
            document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isR = t.type === 'RECEIVED', isDel = t.status === 'deleted';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                let isRedCol = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');
                list.innerHTML += `<div class="flex flex-col ${isR ? 'items-end pr-2' : 'items-start pl-2'} w-full mb-10 ${isDel ? 'tx-deleted' : ''}">
                    <div class="text-[8px] font-black text-slate-300 uppercase mb-2 px-2">${t.date}</div>
                    <div class="bubble ${isR ? 'bubble-right' : 'bubble-left'}">
                        ${t.imgUrl ? `<img src="${t.imgUrl}" class="w-full h-44 object-cover rounded-xl mb-3 shadow-inner" onclick="window.open(this.src)">` : ''}
                        <div class="flex justify-between items-center gap-6"><h3 class="text-xl font-black ${isRedCol?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3><p class="text-[8px] font-bold text-slate-300 uppercase">${t.type}</p></div>
                        <p class="text-[10px] text-slate-500 italic mt-1 font-medium">${t.note || ''}</p>
                        <div class="flex gap-5 mt-4 pt-3 border-t"><i class="fas fa-edit text-indigo-300 text-xs" onclick="editTx(${p.id}, ${t.id})"></i><i class="fas fa-trash text-rose-200 text-xs" onclick="deleteTx(${t.id})"></i><i class="fab fa-whatsapp text-emerald-300 text-xs ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i>
                        ${t.history ? `<i class="fas fa-history text-slate-300 text-xs" onclick="showHistory(${p.id}, ${t.id})"></i>`:''}</div>
                    </div></div>`;
            });
        }

        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Enter Amount!");
            const action = async () => {
                document.getElementById('mainConfirmBtn').innerText = "UPLOADING...";
                let imgUrl = ""; if(capturedImgFile) {
                    const fd = new FormData(); fd.append('image', capturedImgFile);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                    const dat = await res.json(); if(dat.success) imgUrl = dat.data.url;
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:document.getElementById('txDate').value, note:document.getElementById('txNote').value, imgUrl, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
                document.getElementById('mainConfirmBtn').innerText = "CONFIRM ENTRY";
                if(db.secret) startAutoExit();
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
        }

        function triggerDrawer(t) { document.getElementById('entryDrawer').classList.remove('hidden'); setTimeout(() => document.getElementById('entryDrawer').classList.add('open'), 10); document.getElementById('drawerActionType').innerText = t + " AMOUNT"; document.getElementById('txDate').value = new Date().toISOString().split('T')[0]; document.getElementById('mainConfirmBtn').onclick = () => preSave(t); }
        function closeDrawer() { document.getElementById('entryDrawer').classList.remove('open'); setTimeout(() => { document.getElementById('entryDrawer').classList.add('hidden'); capturedImgFile=null; document.getElementById('imgPreview').classList.add('hidden'); document.getElementById('txAmt').value=""; document.getElementById('txNote').value=""; }, 400); }
        
        function openMediaSelector() { document.getElementById('mediaSheet').classList.remove('hidden'); }
        function triggerCamera() { document.getElementById('camInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function triggerGallery() { document.getElementById('galInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function handleImageFile(f) { if(!f) return; capturedImgFile = f; document.getElementById('imgPreview').src = URL.createObjectURL(f); document.getElementById('billPreviewArea').classList.remove('hidden'); document.getElementById('imgPreview').classList.remove('hidden'); }
        function clearImage() { document.getElementById('billPreviewArea').classList.add('hidden'); capturedImgFile = null; }
        
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("PIN Error!"); }; }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('headerLedger').classList.add('hidden'); document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('pageHome').classList.remove('hidden'); renderHome(); }
        function renderAll() { if(!document.getElementById('pageLedger').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); document.getElementById('newPName').value=""; document.getElementById('newPPhone').value=""; }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function confirmAdd() { const n = document.getElementById('newPName').value, ph = document.getElementById('newPPhone').value; if(n && ph.length===10) { db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] }); saveDB(); closeAddModal(); renderHome(); } else alert("Invalid Input!"); }
        function editTx(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); askPin(() => { const n = parseFloat(prompt("New Amount:", t.amount)), nt = prompt("Note:", t.note); if(!t.history) t.history = []; t.history.push({ amt: t.amount, note: t.note, date: new Date().toLocaleString() }); t.amount = n; t.note = nt; saveDB(); renderLedger(); }); }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function showHistory(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); let msg = "History:\n"; t.history.forEach(h => msg += `${h.date}: Rs. ${h.amt}\n`); alert(msg); }
        function shareWA(amt, t, n) { window.open(`https://wa.me/?text=${encodeURIComponent('Receipt for: '+n+'\n'+t+': Rs.'+amt)}`); }
        function shareApp() { window.open(`https://wa.me/?text=${encodeURIComponent('Download PayBook Pro: ' + window.location.href)}`); }
        function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function changePinProcess() { const n = prompt("New 4-Digit PIN:"); if(n && n.length===4) { db.admin.pin = n; saveDB(); alert("PIN Updated!"); } }
        function transferAccProcess() { const v = prompt("Verify current phone:"); if(v===db.admin.phone) { const n = prompt("Enter new 10-digit phone:"); if(n && n.length===10) { db.admin.phone = n; saveDB(); location.reload(); } } }

        function handleSmartPdfDownload() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const isSec = db.secret;
            if(!document.getElementById('pageLedger').classList.contains('hidden')) {
                const p = db.people.find(x => x.id === db.activeId); doc.text(`Ledger: ${p.name}`, 14, 20);
                const head = isSec ? [['Date', 'Ref', 'Pakka', 'Kaccha']] : [['Date', 'Ref', 'Amount']];
                const rows = p.transactions.filter(t => t.status==='active').map(t => { if(!isSec && t.secret) return null; return isSec ? [t.date, t.note, t.secret?'-':t.amount, t.secret?t.amount:'-'] : [t.date, t.note, t.amount]; }).filter(x => x);
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} }); doc.save(`${p.name}.pdf`);
            } else {
                doc.text(`Portfolio Summary`, 14, 20);
                const head = isSec ? [['Name', 'Pakka', 'Kaccha']] : [['Name', 'Balance']];
                const rows = db.people.map(p => { let pb = 0, kb = 0; p.transactions.filter(t => t.status==='active').forEach(t => { let v = (t.type==='RECEIVED'?-t.amount:t.amount); if(t.secret) kb+=v; else pb+=v; }); return isSec ? [p.name, pb, kb] : [p.name, pb]; });
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} }); doc.save("Summary.pdf");
            }
        }
    </script>
</body>
</html>
