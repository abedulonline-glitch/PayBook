<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Ultimate Axis Edition</title>
    
    <!-- External Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F4F7F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--axis-grey); color: #333; margin: 0; overflow: hidden; user-select: none; }
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        .axis-input { @apply w-full p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-[#861F41] bg-white text-slate-700; }
        
        /* Message Bubbles Style */
        .bubble { max-width: 85%; padding: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); background: white; border-radius: 1.2rem; border: 1px solid #eee; }
        .bubble-left { align-self: flex-start; border-left: 5px solid #861F41; border-top-left-radius: 0; }
        .bubble-right { align-self: flex-end; border-right: 5px solid #10b981; border-top-right-radius: 0; }

        /* Full Screen Data Entry Drawer */
        #entryDrawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        #entryDrawer.open { transform: translateY(0); }
        
        /* PIN UI Adjustment (Point 8) */
        .pin-field { height: 55px !important; font-size: 1.8rem !important; letter-spacing: 1.2rem !important; }
        
        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
        #mainViewport { height: calc(100vh - 65px); overflow-y: auto; scroll-behavior: smooth; }
        
        /* Secret Blink & Quick Exit (Point 4) */
        .blink-secret { animation: blinker 1s linear infinite; color: #ff4d4d !important; font-weight: 900; }
        @keyframes blinker { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <!-- 1. SEAMLESS AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 z-[5000] bg-white flex flex-col items-center justify-center p-6 overflow-y-auto">
        <div class="w-full max-w-md bg-white p-8 rounded-[3.5rem] shadow-2xl border border-slate-50">
            <div class="text-center mb-10">
                <div class="w-20 h-20 axis-gradient rounded-3xl mx-auto flex items-center justify-center text-white text-3xl font-black mb-4 shadow-xl">PB</div>
                <h1 class="text-3xl font-black text-[#861F41]">PayBook<span class="text-slate-300">Pro</span></h1>
                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-[0.2em] mt-2">Premium Digital Ledger</p>
            </div>

            <!-- Login Form (Handles Auto-Reg also) -->
            <div id="authForm" class="space-y-6">
                <input type="number" id="loginPhone" placeholder="10-Digit Mobile Number" class="axis-input shadow-sm">
                <div class="text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Access PIN</p>
                    <input type="password" id="loginPin" placeholder="PIN" maxlength="4" class="axis-input text-center pin-field shadow-inner border-2">
                </div>
                <button onclick="handleSmartAuth()" id="authMainBtn" class="w-full py-5 bg-[#861F41] text-white rounded-[1.5rem] font-black shadow-2xl uppercase tracking-widest active:scale-95 transition-all">Secure Login</button>
            </div>

            <div class="mt-8 text-center">
                <p class="text-[9px] text-slate-300 font-bold uppercase tracking-widest flex items-center justify-center gap-2">
                    <i class="fas fa-shield-halved text-emerald-500"></i> Encrypted Global Firestore Active
                </p>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP UI -->
    <div id="appBody" class="hidden min-h-screen">
        <header class="axis-gradient text-white sticky top-0 z-[100] h-[65px] px-5 flex items-center justify-between shadow-lg">
            <div id="headerMain" class="flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <div id="userInitials" class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-[10px] font-bold border border-white/20">PB</div>
                    <h1 class="text-xl font-black italic">PayBook</h1>
                </div>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-share-nodes opacity-80" onclick="shareApp()"></i>
                    <i class="fas fa-file-pdf opacity-80" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog opacity-80" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-4">
                    <i class="fas fa-arrow-left" onclick="goHome()"></i>
                    <div><h2 id="lName" class="text-sm font-bold leading-none text-white">Client</h2><p id="balTypeLabel" class="text-[8px] opacity-60 uppercase mt-1">Portfolio Ledger</p></div>
                </div>
                <div class="flex items-center gap-3">
                    <i class="fas fa-file-pdf opacity-70 mr-2" onclick="askPin(handleSmartPdfDownload)"></i>
                    <span id="mainTotal" class="font-black text-lg tracking-tighter">0.00</span>
                    <span id="secretTrigger" class="text-2xl font-black opacity-30 select-none">₹</span>
                </div>
            </div>
        </header>

        <div id="mainViewport" class="bg-slate-50">
            <!-- Home -->
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl border mb-6 shadow-sm">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-3"></div>
                <button onclick="openAddModal()" class="fixed bottom-10 right-6 w-16 h-16 axis-gradient text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl border-4 border-white transition-transform active:scale-90"><i class="fas fa-plus"></i></button>
            </div>

            <!-- Ledger -->
            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col"></div>
                <div class="fixed bottom-8 left-5 right-5 flex gap-3 z-[150]">
                    <button onclick="triggerDrawer('GIVEN')" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-2xl uppercase tracking-wider text-xs">↑ Given</button>
                    <button onclick="triggerDrawer('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl uppercase tracking-wider text-xs">↓ Received</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. DATA ENTRY DRAWER -->
    <div id="entryDrawer" class="fixed inset-0 bg-black/60 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3.5rem] p-10 shadow-2xl">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-10" onclick="closeDrawer()"></div>
            <div class="text-center mb-10">
                <p id="drawerActionType" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Entry Amount</p>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <span class="text-4xl font-black text-slate-300">₹</span>
                    <input type="number" id="txAmt" placeholder="0.00" class="text-5xl font-black text-[#861F41] bg-transparent outline-none w-2/3 text-center border-b-2">
                </div>
            </div>
            <div class="space-y-4 mb-10">
                <input type="text" id="txNote" placeholder="Notes (Ref/Details)" class="axis-input bg-slate-50 border-none">
                <input type="date" id="txDate" class="axis-input bg-slate-50 border-none font-bold">
                <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between border">
                    <p class="text-xs font-bold text-slate-400 uppercase">Attach Bill Image(s)</p>
                    <div id="multiImgArea" class="flex gap-2">
                         <div id="billPreviewArea" class="hidden relative"><img id="imgPreview" class="w-12 h-12 rounded-xl object-cover border"><i class="fas fa-times absolute -top-2 -right-2 text-rose-500 bg-white rounded-full text-[10px]" onclick="clearImage()"></i></div>
                         <button onclick="openMediaSelector()" class="w-12 h-12 bg-white border-2 border-dashed rounded-xl flex items-center justify-center text-slate-300"><i class="fas fa-camera"></i></button>
                    </div>
                </div>
            </div>
            <button id="mainConfirmBtn" class="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black shadow-xl uppercase tracking-widest">Confirm Transaction</button>
        </div>
    </div>

    <!-- 4. MODALS -->
    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[4000] flex items-center justify-center p-8 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] p-12 text-center shadow-2xl">
            <i class="fas fa-shield-halved text-5xl text-[#861F41] mb-8"></i>
            <h3 class="text-xl font-black mb-10 text-[#861F41] uppercase tracking-widest">Authorize PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="axis-input text-center pin-field shadow-inner mb-10">
            <button id="pinSubmitBtn" class="w-full py-4 axis-gradient text-white rounded-2xl font-black uppercase">Confirm</button>
        </div>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[3.5rem] p-10 shadow-2xl">
            <h3 class="text-xl font-black text-[#861F41] mb-8 text-center uppercase tracking-widest">New Account</h3>
            <input id="newPName" type="text" placeholder="Full Name" class="axis-input mb-4">
            <input id="newPPhone" type="number" placeholder="Mobile Number" class="axis-input mb-8">
            <div class="flex gap-4">
                <button onclick="closeAddModal()" class="flex-1 font-bold text-slate-400">Discard</button>
                <button onclick="confirmAdd()" class="flex-1 py-4 bg-[#861F41] text-white rounded-[2rem] font-bold">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIG & STARTUP ---
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";
        const DB_KEY = 'PayBook_Pro_Global_v1.3';

        let db = { admin: null, people: [], managers: [], secret: false, tab: 'CUSTOMER', activeId: null, role: 'ADMIN', opName: '' };
        let holdTimer, autoExitTimer, capturedImgFile = null;

        window.onload = () => {
            const data = localStorage.getItem(DB_KEY);
            if(data) {
                db = JSON.parse(data);
                db.secret = false;
                if(db.admin) {
                    document.getElementById('loginPhone').value = db.admin.phone;
                    document.getElementById('authMainBtn').innerText = "Access Vault";
                }
            }
            initSecretGesture();
            initHistoryState();
        };

        // --- 2. SEAMLESS AUTH (No Not-Registered Alert) ---
        async function handleSmartAuth() {
            const ph = document.getElementById('loginPhone').value.trim();
            const pin = document.getElementById('loginPin').value.trim();

            if(ph.length !== 10 || pin.length < 4) return alert("Enter 10-digit Phone & 4-digit PIN!");

            document.getElementById('authMainBtn').innerText = "Verifying...";
            
            // ক্লাউড থেকে ডাটা খোঁজা
            const doc = await db_fs.collection("global_ledgers").doc(ph).get();

            if (doc.exists) {
                const cloudData = doc.data();
                // পিন চেক
                if(pin === cloudData.admin.pin || pin === MASTER_PIN) {
                    db = cloudData; db.role='ADMIN'; db.opName=db.admin.name; enterApp();
                } else {
                    const mgr = (cloudData.managers || []).find(m => m.pin === pin);
                    if(mgr) { db = cloudData; db.role='MANAGER'; db.opName=mgr.name; enterApp(); }
                    else alert("Incorrect PIN for this number!");
                }
            } else {
                // নম্বর না থাকলে অটো-রেজিস্টার (Point: No Not Registered Message)
                const businessName = prompt("Account not found. Enter Business Name to Register:", "Business Name");
                if(businessName) {
                    db.admin = { name: businessName, phone: ph, pin: pin };
                    db.people = []; db.managers = [];
                    saveDB(); enterApp();
                }
            }
            document.getElementById('authMainBtn').innerText = "Access Vault";
        }

        function enterApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('appBody').classList.remove('hidden');
            document.getElementById('userInitials').innerText = db.admin.name.substring(0,2).toUpperCase();
            renderHome();
        }

        function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); if(db.admin) db_fs.collection("global_ledgers").doc(db.admin.phone).set(db); }

        // --- 3. CORE LOGIC (Isolation & Dividing by 100) ---
        function calcBal(txs, isSecMode, pType) {
            let b = 0;
            txs.filter(t => t.status==='active' && !!t.secret === !!isSecMode).forEach(t => {
                if (pType === 'CUSTOMER') b += (t.type==='GIVEN' ? t.amount : -t.amount);
                else b += (t.type==='RECEIVED' ? t.amount : -t.amount);
            });
            return b;
        }

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('headerLedger').classList.add('hidden');
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret, p.type);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `<div onclick="openLedger(${p.id})" class="axis-card p-5 flex justify-between items-center active:scale-95 transition-all">
                    <div class="flex items-center gap-3"><div class="w-12 h-12 axis-gradient text-white rounded-2xl flex items-center justify-center font-black text-xs">${p.name[0]}</div>
                    <div><h4 class="font-bold text-sm text-slate-800">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold tracking-widest">${p.phone}</p></div></div>
                    <div class="text-right"><h5 class="font-black text-sm ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5><p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'GET' : 'CLEAR'}</p></div></div>`;
            });
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            const net = calcBal(p.transactions, db.secret, p.type);
            const dNet = db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN');
            document.getElementById('mainTotal').innerText = dNet;
            document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isR = t.type === 'RECEIVED', isDel = t.status === 'deleted';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                let isRed = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');
                list.innerHTML += `<div class="flex flex-col ${isR ? 'items-end pr-2' : 'items-start pl-2'} w-full mb-10 ${isDel ? 'tx-deleted' : ''}">
                    <div class="text-[8px] font-black text-slate-300 uppercase mb-2 px-2">${t.date}</div>
                    <div class="bubble ${isR ? 'bubble-right' : 'bubble-left'}">
                        ${t.imgUrl ? `<img src="${t.imgUrl}" class="w-full h-44 object-cover rounded-xl mb-3" onclick="window.open(this.src)">` : ''}
                        <div class="flex justify-between items-center gap-6"><h3 class="text-xl font-black ${isRed?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3><p class="text-[8px] font-bold text-slate-300">${t.type}</p></div>
                        <p class="text-[10px] text-slate-500 italic mt-1 font-medium">${t.note || ''}</p>
                        <p class="text-[7px] text-slate-300 mt-2 uppercase font-black tracking-tighter border-t pt-1 border-slate-50">By: ${t.by || 'Owner'}</p>
                        <div class="flex gap-5 mt-4 pt-2 border-t border-slate-50"><i class="fas fa-edit text-indigo-300 text-xs" onclick="editTx(${p.id}, ${t.id})"></i><i class="fas fa-trash text-rose-200 text-xs" onclick="deleteTx(${t.id})"></i><i class="fab fa-whatsapp text-emerald-300 text-xs ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i></div>
                    </div></div>`;
            });
            document.getElementById('mainViewport').scrollTop = list.scrollHeight;
        }

        // --- 4. DATA ENTRY & MEDIA ---
        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Amount!");
            const action = async () => {
                document.getElementById('mainConfirmBtn').innerText = "SAVING..."; let imgUrl = "";
                if(capturedImgFile) { const fd = new FormData(); fd.append('image', capturedImgFile); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd }); const dat = await res.json(); if(dat.success) imgUrl = dat.data.url; }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:document.getElementById('txDate').value, note:document.getElementById('txNote').value, imgUrl, by: db.opName, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
                document.getElementById('mainConfirmBtn').innerText = "Confirm Transaction";
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
        }

        // --- 5. GESTURES & TIMER ---
        function initSecretGesture() {
            const el = document.getElementById('secretTrigger');
            el.onclick = () => { if(db.secret) exitSecret(); };
            el.onpointerdown = () => { if(!db.secret) holdTimer = setTimeout(() => { askPin(() => { db.secret=true; el.classList.add('blink-secret'); renderAll(); startTimer(); }); }, 2500); };
            el.onpointerup = () => clearTimeout(holdTimer);
        }
        function startTimer() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(exitSecret, 60000); }
        function exitSecret() { db.secret = false; document.getElementById('secretTrigger').classList.remove('blink-secret'); renderAll(); }

        // --- 6. SMART PDF ---
        function handleSmartPdfDownload() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const isSec = db.secret;
            if(!document.getElementById('pageLedger').classList.contains('hidden')) {
                const p = db.people.find(x => x.id === db.activeId); doc.text(`Ledger Statement: ${p.name}`, 14, 20);
                const head = isSec ? [['Date', 'Note', 'Pakka Rs.', 'Kaccha Rs.']] : [['Date', 'Note', 'Amount Rs.']];
                const rows = p.transactions.filter(t => t.status === 'active').map(t => { 
                    if(!isSec && t.secret) return null; 
                    const aS = t.amount.toLocaleString('en-IN');
                    return isSec ? [t.date, t.note, t.secret?'-':aS, t.secret?aS:'-'] : [t.date, aS];
                }).filter(x=>x);
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} }); doc.save(`${p.name}.pdf`);
            } else {
                doc.text(`Portfolio Summary`, 14, 20);
                const head = isSec ? [['Name', 'Mobile', 'Pakka Bal', 'Kaccha Bal']] : [['Name', 'Mobile', 'Pakka Balance']];
                const rows = db.people.map(p => { 
                    let pb=0, kb=0; p.transactions.filter(t=>t.status==='active').forEach(t=>{ let v=(t.type==='RECEIVED'?t.amount:-t.amount); if(t.secret) kb+=v; else pb+=v; });
                    return isSec ? [p.name, p.phone, pb, kb] : [p.name, p.phone, pb];
                });
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} }); doc.save("PayBook_Summary.pdf");
            }
        }

        // --- 7. UTILS & OTHERS ---
        function initHistoryState() { history.pushState(null, null, window.location.pathname); window.addEventListener('popstate', () => { if(!document.getElementById('pageLedger').classList.contains('hidden')) goHome(); history.pushState(null, null, window.location.pathname); }); }
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("PIN Mismatch!"); }; }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('headerLedger').classList.add('hidden'); document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('pageHome').classList.remove('hidden'); renderHome(); }
        function openLedger(id) { db.activeId = id; const p = db.people.find(x => x.id === id); document.getElementById('lName').innerText = p.name; document.getElementById('headerMain').classList.add('hidden'); document.getElementById('headerLedger').classList.remove('hidden'); document.getElementById('pageHome').classList.add('hidden'); document.getElementById('pageLedger').classList.remove('hidden'); renderLedger(); }
        function switchTab(t) { db.tab = t; document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; renderHome(); }
        function triggerDrawer(t) { document.getElementById('entryDrawer').classList.remove('hidden'); setTimeout(()=>document.getElementById('entryDrawer').classList.add('open'), 10); document.getElementById('drawerActionType').innerText=t; document.getElementById('txDate').value=new Date().toISOString().split('T')[0]; document.getElementById('mainConfirmBtn').onclick=()=>preSave(t); }
        function closeDrawer() { document.getElementById('entryDrawer').classList.remove('open'); setTimeout(()=>{document.getElementById('entryDrawer').classList.add('hidden'); capturedImgFile=null; document.getElementById('imgPreview').classList.add('hidden');}, 400); }
        function openMediaSelector() { document.getElementById('mediaSheet').classList.remove('hidden'); }
        function triggerCamera() { document.getElementById('camInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function triggerGallery() { document.getElementById('galInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function handleImageFile(f) { if(!f) return; capturedImgFile = f; document.getElementById('imgPreview').src = URL.createObjectURL(f); document.getElementById('billPreviewArea').classList.remove('hidden'); document.getElementById('imgPreview').classList.remove('hidden'); }
        function clearImage() { document.getElementById('billPreviewArea').classList.add('hidden'); capturedImgFile = null; }
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); document.getElementById('newPName').value=""; document.getElementById('newPPhone').value=""; }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function confirmAdd() { const n = document.getElementById('newPName').value.trim(), ph = document.getElementById('newPPhone').value.trim(); if(n && ph.length===10) { if(db.people.some(x=>x.phone===ph)) return alert("Exists!"); db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] }); saveDB(); document.getElementById('addModal').classList.add('hidden'); renderHome(); } else alert("Invalid Input!"); }
        function editTx(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); askPin(() => { const n = parseFloat(prompt("New Amt:", t.amount)); if(!t.history) t.history = []; t.history.push({ amt: t.amount, date: new Date().toLocaleString() }); t.amount = n; saveDB(); renderLedger(); }); }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function renderAll() { if(!document.getElementById('pageLedger').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function shareWA(amt, t, n) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro Receipt: '+n+'\n'+t+': Rs.'+amt)}`); }
        function shareApp() { window.open(`https://wa.me/?text=${encodeURIComponent('Manage your business with PayBook Pro: ' + window.location.href)}`); }
        function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function factoryReset() { if(confirm("Permanently Erase ALL data?")) { localStorage.clear(); location.reload(); } }
    </script>

    <!-- Modals (Settings) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-black text-[#861F41] mb-8 text-center uppercase tracking-widest">Management</h3>
            <button onclick="factoryReset()" class="w-full py-4 text-rose-500 font-bold border-2 border-rose-100 rounded-xl mb-4">FACTORY RESET</button>
            <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="axis-gradient text-white w-full py-4 rounded-xl font-bold uppercase tracking-widest">BACK</button>
        </div>
    </div>
</body>
</html>
