<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayBook Pro - Ultimate Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans pb-24 overflow-x-hidden">

    <!-- 1. Registration & Login Overlay -->
    <div id="authScreen" class="hidden fixed inset-0 bg-indigo-950 z-[200] flex flex-col items-center justify-center p-8 text-white overflow-y-auto">
        <h1 class="text-5xl font-black mb-2 italic tracking-tighter">PayBook<span class="text-indigo-500">.</span></h1>
        
        <div id="regBox" class="w-full space-y-4 mt-10">
            <p class="text-center text-xs opacity-60 uppercase tracking-widest mb-6">Create Admin Account</p>
            <input type="number" id="admPh" placeholder="মোবাইল নম্বর" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none">
            <input type="password" id="admPin" placeholder="৪ ডিজিট পিন সেট করুন" maxlength="4" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none text-center text-2xl tracking-[15px]">
            <input type="password" id="admPinConf" placeholder="আবার পিন দিন" maxlength="4" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none text-center text-2xl tracking-[15px]">
            <button onclick="handleReg()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-xl shadow-2xl">REGISTER ACCOUNT</button>
        </div>

        <div id="loginBox" class="hidden w-full text-center space-y-6">
            <p class="text-indigo-300 font-bold" id="welcomeUser"></p>
            <input type="password" id="loginPin" placeholder="পিন দিন" maxlength="4" class="w-full p-5 rounded-2xl bg-white/10 border border-white/20 outline-none text-center text-3xl tracking-[20px]">
            <button onclick="handleLogin()" class="w-full bg-emerald-600 py-5 rounded-2xl font-black text-xl">UNLOCK PAYBOOK</button>
            <button onclick="forgotPin()" class="text-xs text-indigo-400 underline uppercase tracking-widest">Forgot PIN? Reset via Phone</button>
        </div>
    </div>

    <!-- 2. Global PIN Modal (For Transactions & Secret Access) -->
    <div id="pinModal" class="hidden fixed inset-0 bg-black/80 z-[300] flex items-center justify-center p-6">
        <div class="bg-white w-full rounded-3xl p-8 text-center animate-bounce-in">
            <i class="fas fa-shield-alt text-4xl text-indigo-600 mb-4"></i>
            <h3 class="text-xl font-black mb-2">পাসওয়ার্ড দিন</h3>
            <p class="text-xs text-slate-400 mb-6">লেনদেন সম্পূর্ণ করতে আপনার সিক্রেট পিন দিন</p>
            <input type="password" id="confirmPin" maxlength="4" class="w-full p-4 bg-slate-100 rounded-2xl text-center text-3xl tracking-[20px] outline-none border-2 border-indigo-200">
            <div class="flex gap-3 mt-6">
                <button onclick="closePinModal()" class="flex-1 py-4 font-bold text-slate-400">CANCEL</button>
                <button id="pinSubmitBtn" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black">CONFIRM</button>
            </div>
        </div>
    </div>

    <!-- 3. Main UI -->
    <div id="appBody" class="hidden">
        <header class="bg-indigo-900 text-white p-6 sticky top-0 z-50 shadow-xl rounded-b-[40px]">
            <div class="flex justify-between items-center">
                <h1 onclick="location.reload()" class="text-2xl font-black italic tracking-tighter">PayBook</h1>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-file-invoice text-xl opacity-70" onclick="showFullReport()"></i>
                    <div id="modeIcon" class="w-10 h-10 bg-indigo-800 rounded-full flex items-center justify-center border border-white/20">
                        <i class="fas fa-user-shield text-xs"></i>
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-between items-center">
                <div>
                    <p class="text-[10px] uppercase font-bold text-indigo-300 tracking-widest">Main Net Balance</p>
                    <div class="flex items-center gap-2">
                        <span id="secretTrigger" class="text-4xl font-black select-none cursor-pointer active:scale-90 transition-transform">₹</span>
                        <h2 id="mainTotal" class="text-4xl font-black tracking-tighter">0.00</h2>
                    </div>
                </div>
                <div id="kacchaIndicator" class="hidden bg-rose-500 px-3 py-1 rounded-full text-[10px] font-black animate-pulse uppercase">Secret Mode</div>
            </div>
        </header>

        <!-- Pages -->
        <div id="pageHome" class="p-4 mt-4">
            <div class="flex bg-white p-1 rounded-2xl shadow-sm mb-6 border border-slate-100">
                <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-md">CUSTOMERS</button>
                <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-xl text-xs font-black text-slate-400">SUPPLIERS</button>
            </div>
            <div id="contactList" class="space-y-4"></div>
            <!-- Add Floating Btn -->
            <button onclick="openAddPerson()" class="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl active:scale-95 transition-all">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- Ledger Page -->
        <div id="pageLedger" class="hidden p-4">
            <div class="flex justify-between items-center mb-6">
                <i class="fas fa-arrow-left text-xl text-slate-400" onclick="goHome()"></i>
                <div class="text-center">
                    <h2 id="lName" class="text-xl font-black text-slate-800">Name</h2>
                    <p id="lPhone" class="text-[10px] text-slate-400 font-bold"></p>
                </div>
                <i class="fas fa-trash-alt text-lg text-rose-200" onclick="alert('Account cannot be deleted, only transfers allowed.')"></i>
            </div>

            <div id="ledgerList" class="space-y-3 pb-60"></div>

            <!-- Transaction Form -->
            <div class="fixed bottom-0 left-0 right-0 bg-white p-5 rounded-t-[40px] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] border-t border-slate-50">
                <div class="flex gap-2 mb-4">
                    <input type="number" id="txAmt" placeholder="0.00" class="flex-1 p-4 bg-slate-100 rounded-2xl font-black text-2xl outline-none focus:ring-2 ring-indigo-500">
                    <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center relative overflow-hidden border-2 border-dashed border-slate-300">
                        <i class="fas fa-camera text-slate-400 text-xl"></i>
                        <input type="file" id="txImg" accept="image/*" capture="camera" class="absolute inset-0 opacity-0">
                        <img id="imgPrev" class="hidden absolute inset-0 w-full h-full object-cover">
                    </div>
                </div>
                <input type="text" id="txNote" placeholder="কি বাবদ? (Note)" class="w-full p-4 bg-slate-100 rounded-2xl text-sm mb-4 outline-none">
                <div class="flex gap-3">
                    <button onclick="preSave('GIVEN')" class="flex-1 py-5 bg-rose-500 text-white rounded-2xl font-black shadow-lg shadow-rose-200">GIVEN</button>
                    <button onclick="preSave('RECEIVED')" class="flex-1 py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-200">RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/60 z-[150] flex items-end">
        <div class="bg-white w-full rounded-t-[50px] p-10 animate-slide-up">
            <h3 class="text-2xl font-black mb-6 text-indigo-900">New Account</h3>
            <input id="newPName" type="text" placeholder="নাম" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none border border-slate-200">
            <input id="newPPhone" type="number" placeholder="ফোন নম্বর" class="w-full p-4 bg-slate-100 rounded-2xl mb-8 outline-none border border-slate-200">
            <div class="flex gap-4">
                <button onclick="closeAdd()" class="flex-1 font-bold text-slate-400">CANCEL</button>
                <button onclick="confirmAdd()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl">CREATE</button>
            </div>
        </div>
    </div>

    <style>
        .tx-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tx-del { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.4s ease-out; }
        @keyframes bounce-in { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-bounce-in { animation: bounce-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>

    <script>
        // APP STATE
        let db = { admin: null, people: [], isSecretMode: false, currentFilter: 'CUSTOMER', activeId: null };
        let longPressTimer;

        // 1. Boot Logic
        window.onload = () => {
            const data = localStorage.getItem('pb_ultra_db');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) showLogin(); else showReg();
            } else { showReg(); }
            setupGestures();
        };

        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('welcomeUser').innerText = "স্বাগতম, " + db.admin.phone;
        }

        function handleReg() {
            const ph = document.getElementById('admPh').value;
            const pin = document.getElementById('admPin').value;
            const conf = document.getElementById('admPinConf').value;
            if(ph.length < 10 || pin.length < 4 || pin !== conf) return alert("সব তথ্য সঠিক দিন এবং পিন মিলিয়ে নিন!");
            db.admin = { phone: ph, pin: pin };
            saveDB();
            location.reload();
        }

        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("ভুল পিন!");
        }

        // 2. Secret Mode Gesture (Hold ₹ for 3 seconds)
        function setupGestures() {
            const trigger = document.getElementById('secretTrigger');
            trigger.addEventListener('touchstart', () => {
                longPressTimer = setTimeout(() => {
                    requestPin(() => {
                        db.isSecretMode = !db.isSecretMode;
                        document.getElementById('kacchaIndicator').classList.toggle('hidden');
                        document.getElementById('secretTrigger').classList.toggle('text-rose-500');
                        renderAll();
                        alert(db.isSecretMode ? "Secret Ledger Activated" : "Main Ledger Activated");
                    });
                }, 2000);
            });
            trigger.addEventListener('touchend', () => clearTimeout(longPressTimer));
        }

        // 3. Pin Request Modal
        function requestPin(callback) {
            document.getElementById('pinModal').classList.remove('hidden');
            document.getElementById('confirmPin').value = "";
            document.getElementById('pinSubmitBtn').onclick = () => {
                if(document.getElementById('confirmPin').value === db.admin.pin) {
                    closePinModal();
                    callback();
                } else alert("ভুল পিন!");
            };
        }
        function closePinModal() { document.getElementById('pinModal').classList.add('hidden'); }

        // 4. Ledger Core
        function switchTab(type) {
            db.currentFilter = type;
            document.getElementById('tabCust').className = type==='CUSTOMER' ? 'flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-md' : 'flex-1 py-3 rounded-xl text-xs font-black text-slate-400';
            document.getElementById('tabSupp').className = type==='SUPPLIER' ? 'flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-md' : 'flex-1 py-3 rounded-xl text-xs font-black text-slate-400';
            renderHome();
        }

        function renderHome() {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            let totalMain = 0;
            
            db.people.filter(p => p.type === db.currentFilter).forEach(p => {
                const bal = calcBal(p.transactions, false);
                totalMain += bal;
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-5 rounded-[30px] shadow-sm border border-slate-100 flex justify-between items-center active:bg-indigo-50 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-indigo-100 text-indigo-700 rounded-2xl flex items-center justify-center font-black text-xl">${p.name[0]}</div>
                            <div>
                                <h4 class="font-black text-slate-800">${p.name}</h4>
                                <p class="text-[10px] text-slate-400 font-bold tracking-widest">${p.phone}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h5 class="font-black ${bal < 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${Math.abs(bal).toLocaleString()}</h5>
                            <p class="text-[8px] uppercase font-bold text-slate-300">${bal < 0 ? 'Give' : 'Get'}</p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('mainTotal').innerText = totalMain.toLocaleString();
        }

        function openLedger(id) {
            db.activeId = id;
            const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('lPhone').innerText = p.phone;
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            renderLedger();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList');
            list.innerHTML = "";
            
            const txs = p.transactions.filter(t => t.isKaccha === db.isSecretMode);
            txs.forEach(t => {
                const isDel = t.status === 'deleted';
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm ${isDel ? 'tx-del' : ''}">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-[10px] italic text-slate-300">IMG</div>
                            <div>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">${t.date}</p>
                                <p class="text-sm font-black text-slate-700">${t.type}</p>
                                <p class="text-[10px] text-slate-400 italic">${t.note || ''}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h4 class="font-black ${t.type==='GIVEN'?'text-rose-500':'text-emerald-600'}">₹${t.amount.toLocaleString()}</h4>
                            ${!isDel ? `<button onclick="delTx(${t.id})" class="text-[8px] text-rose-300 font-bold uppercase">Delete</button>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function preSave(type) {
            requestPin(() => {
                const amt = parseFloat(document.getElementById('txAmt').value);
                if(!amt) return alert("অ্যামাউন্ট দিন");
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.unshift({
                    id: Date.now(),
                    amount: amt,
                    type: type,
                    isKaccha: db.isSecretMode,
                    date: new Date().toISOString().split('T')[0],
                    note: document.getElementById('txNote').value,
                    status: 'active'
                });
                saveDB();
                renderLedger();
                document.getElementById('txAmt').value = ""; document.getElementById('txNote').value = "";
            });
        }

        // Helpers
        function calcBal(txs, kaccha) {
            let b = 0;
            txs.filter(t => t.isKaccha === kaccha && t.status === 'active').forEach(t => {
                b += (t.type === 'RECEIVED' ? t.amount : -t.amount);
            });
            return b;
        }

        function delTx(tid) {
            if(confirm("বাতিল করতে চান?")) {
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.find(t => t.id === tid).status = 'deleted';
                saveDB(); renderLedger();
            }
        }

        function saveDB() { localStorage.setItem('pb_ultra_db', JSON.stringify(db)); }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('pageHome').classList.remove('hidden'); renderHome(); }
        function openAddPerson() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAdd() { document.getElementById('addModal').classList.add('hidden'); }
        function confirmAdd() {
            const n = document.getElementById('newPName').value;
            const ph = document.getElementById('newPPhone').value;
            if(!n || !ph) return alert("সব তথ্য দিন");
            db.people.unshift({ id: Date.now(), name: n, phone: ph, type: db.currentFilter, transactions: [] });
            saveDB(); closeAdd(); renderHome();
            document.getElementById('newPName').value = ""; document.getElementById('newPPhone').value = "";
        }

        function renderAll() {
            if(document.getElementById('pageHome').classList.contains('hidden')) renderLedger();
            else renderHome();
        }

        function forgotPin() {
            const ph = prompt("আপনার রেজিস্টার্ড মোবাইল নম্বর দিন:");
            if(ph === db.admin.phone) {
                const newPin = prompt("নতুন ৪ ডিজিট পিন দিন:");
                if(newPin.length === 4) {
                    db.admin.pin = newPin;
                    saveDB(); alert("পিন সফলভাবে পরিবর্তন হয়েছে!");
                }
            } else alert("নম্বর মেলেনি!");
        }

        function showFullReport() {
            requestPin(() => {
                let report = "Side-by-Side Report:\n\nName | Pakka | Kaccha\n----------------------\n";
                db.people.forEach(p => {
                    report += `${p.name} | ₹${calcBal(p.transactions, false)} | ₹${calcBal(p.transactions, true)}\n`;
                });
                alert(report);
            });
        }
    </script>
</body>
</html>
