<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Axis Slim Edition</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F1F5F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: white; color: #333; margin: 0; overflow: hidden; }
        
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        
        /* সুপার স্লিম হেডার */
        header { height: 60px; display: flex; align-items: center; padding: 0 15px; }
        
        /* কন্টেন্ট এরিয়া */
        #mainViewport { height: calc(100vh - 130px); overflow-y: auto; padding-bottom: 20px; }

        /* লেনদেনের বাবল ডিজাইন (OkCredit Style) */
        .bubble { max-width: 85%; position: relative; margin-bottom: 20px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .bubble-left { align-self: flex-start; background: #fff; }
        .bubble-right { align-self: flex-end; background: #fff; }
        
        .tx-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
        
        .running-bal { font-size: 10px; color: #94a3b8; font-weight: bold; margin-top: 4px; }
        
        /* বটম বাটন স্টিকি */
        .bottom-bar { height: 70px; display: flex; gap: 10px; padding: 10px 15px; background: white; border-top: 1px solid #f1f5f9; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        
        .hidden { display: none !important; }
        .axis-input { @apply w-full p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-[#861F41] bg-white; }
        
        /* ড্রয়ার এনিমেশন */
        #inputDrawer { transform: translateY(100%); transition: transform 0.3s ease-out; }
        #inputDrawer.open { transform: translateY(0); }
    </style>
</head>
<body>

    <!-- 1. AUTH SCREEN (Register/Login) -->
    <div id="authScreen" class="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-8">
        <div class="w-full max-w-md text-center">
            <div class="w-16 h-16 axis-gradient rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl font-bold">PB</div>
            <h1 class="text-2xl font-black text-[#861F41]">PayBook<span class="text-slate-300">Pro</span></h1>
            
            <div id="regBox" class="hidden mt-8 space-y-3">
                <input type="text" id="regName" placeholder="Owner Name" class="axis-input">
                <input type="number" id="regPhone" placeholder="Mobile Number" class="axis-input">
                <input type="password" id="regPin" placeholder="4-Digit PIN" maxlength="4" class="axis-input text-center">
                <button onclick="handleRegistration()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold">START NOW</button>
            </div>
            
            <div id="loginBox" class="hidden mt-8 space-y-6">
                <p id="displayPhone" class="text-lg font-bold text-slate-600"></p>
                <input type="password" id="loginPin" placeholder="PIN" maxlength="4" class="axis-input text-center text-3xl tracking-widest h-16">
                <button onclick="handleLogin()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold">UNLOCK</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP -->
    <div id="appBody" class="hidden min-h-screen flex flex-col">
        
        <!-- সুপার স্লিম হেডার -->
        <header class="axis-gradient text-white shadow-md">
            <div id="headerHome" class="flex justify-between items-center w-full">
                <h1 class="text-xl font-black italic">PayBook</h1>
                <div class="flex gap-5">
                    <i class="fas fa-file-pdf" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <i class="fas fa-arrow-left" onclick="goHome()"></i>
                    <h2 id="lName" class="text-md font-bold">Client</h2>
                </div>
                <div class="flex items-center gap-4">
                    <span id="mainTotal" class="font-black text-lg">0.00</span>
                    <span id="secretTrigger" class="text-xl font-black opacity-50">₹</span>
                </div>
            </div>
        </header>

        <!-- মেইন ভিউপোর্ট (লেনদেন দেখার জায়গা) -->
        <div id="mainViewport" class="flex-1 bg-slate-50">
            <!-- Home: Contact List -->
            <div id="pageHome" class="p-4 space-y-3">
                <div class="flex bg-white p-1 rounded-lg border mb-4">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-2 rounded text-[10px] font-bold bg-[#861F41] text-white uppercase">Customers</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-2 rounded text-[10px] font-bold text-slate-400 uppercase">Suppliers</button>
                </div>
                <div id="contactList" class="space-y-2"></div>
                <button onclick="openAddModal()" class="fixed bottom-20 right-6 w-14 h-14 axis-gradient text-white rounded-full shadow-2xl flex items-center justify-center text-xl border-2 border-white"><i class="fas fa-plus"></i></button>
            </div>

            <!-- Ledger: Transactions -->
            <div id="pageLedger" class="hidden flex flex-col p-3">
                <div id="ledgerList" class="flex flex-col"></div>
            </div>
        </div>

        <!-- ৩. স্টিকি বটম বাটন (শুধুমাত্র লেজার পেজে) -->
        <div id="ledgerFooter" class="hidden bottom-bar">
            <button onclick="openDrawer('RECEIVED')" class="flex-1 bg-emerald-600 text-white rounded-xl font-bold shadow-lg">↓ RECEIVED</button>
            <button onclick="openDrawer('GIVEN')" class="flex-1 bg-rose-600 text-white rounded-xl font-bold shadow-lg">↑ GIVEN</button>
        </div>
    </div>

    <!-- ৪. স্মার্ট ইনপুট ড্রয়ার -->
    <div id="inputDrawer" class="fixed inset-0 z-[500] flex flex-col justify-end bg-black/50 hidden">
        <div class="bg-white rounded-t-[2.5rem] p-6 shadow-2xl">
            <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-6" onclick="closeDrawer()"></div>
            <div class="flex gap-3 mb-4">
                <input type="number" id="txAmt" placeholder="0.00" class="flex-1 p-4 bg-slate-50 rounded-xl font-black text-3xl outline-none border">
                <label class="w-16 h-16 bg-slate-50 rounded-xl flex items-center justify-center relative border border-dashed border-slate-300">
                    <i class="fas fa-camera text-slate-300"></i>
                    <input type="file" id="txFile" accept="image/*" class="hidden">
                    <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-xl">
                </label>
            </div>
            <input type="text" id="txNote" placeholder="Notes (Optional)" class="axis-input bg-slate-50 border-none mb-6 text-sm">
            <div class="flex gap-3">
                <button onclick="closeDrawer()" class="flex-1 py-4 font-bold text-slate-400">CANCEL</button>
                <button id="drawerSaveBtn" class="flex-1 py-4 bg-[#861F41] text-white rounded-xl font-bold uppercase">Save Entry</button>
            </div>
        </div>
    </div>

    <!-- মোডাল (PIN, Settings) -->
    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[1000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl">
            <h3 class="font-black mb-4">ENTER PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-4 bg-slate-50 rounded-xl text-center text-4xl tracking-widest outline-none border">
            <button id="pinSubmitBtn" class="w-full py-4 mt-6 bg-[#861F41] text-white rounded-xl font-bold">CONFIRM</button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";

        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer, autoExitTimer;

        window.onload = () => {
            const data = localStorage.getItem('paybook_slim_v8');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) showLogin(); else showReg();
            } else showReg();
            initSecretGesture();
            document.getElementById('txFile').onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => { document.getElementById('imgPreview').src = ev.target.result; document.getElementById('imgPreview').classList.remove('hidden'); };
                reader.readAsDataURL(e.target.files[0]);
            };
        };

        // --- AUTH ---
        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden'); 
            document.getElementById('displayPhone').innerText = "+91 " + db.admin.phone;
            syncCloud();
        }
        async function syncCloud() {
            const doc = await db_fs.collection("ledgers").doc(db.admin.phone).get();
            if(doc.exists) { db = doc.data(); renderHome(); }
        }
        function saveDB() {
            localStorage.setItem('paybook_slim_v8', JSON.stringify(db));
            if(db.admin) db_fs.collection("ledgers").doc(db.admin.phone).set(db);
        }
        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value;
            if(!n || ph.length < 10) return alert("Invalid Data");
            db.admin = { name: n, phone: ph, pin: p };
            saveDB(); location.reload();
        }
        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin || document.getElementById('loginPin').value === MASTER_PIN) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("Wrong PIN!");
        }

        // --- CORE LOGIC ---
        function switchTab(t) {
            db.tab = t;
            document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-2 rounded text-[10px] font-bold bg-[#861F41] text-white uppercase' : 'flex-1 py-2 rounded text-[10px] font-bold text-slate-400 uppercase';
            document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-2 rounded text-[10px] font-bold bg-[#861F41] text-white uppercase' : 'flex-1 py-2 rounded text-[10px] font-bold text-slate-400 uppercase';
            renderHome();
        }

        function calcBal(txs, isSec) {
            let b = 0;
            txs.filter(t => t.status==='active' && !!t.secret === !!isSec).forEach(t => {
                b += (t.type==='RECEIVED'?t.amount:-t.amount);
            });
            return b;
        }

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerHome').classList.remove('hidden');
            document.getElementById('headerLedger').classList.add('hidden');
            
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-4 rounded-xl border border-slate-100 flex justify-between items-center active:scale-95 transition-all">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-50 text-[#861F41] rounded-full flex items-center justify-center font-black border text-xs">${p.name[0]}</div>
                            <div><h4 class="font-bold text-slate-800 text-sm">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">${p.phone}</p></div>
                        </div>
                        <div class="text-right">
                            <h5 class="font-black text-sm ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5>
                            <p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'Due' : 'Advance'}</p>
                        </div>
                    </div>`;
            });
        }

        function openLedger(id) {
            db.activeId = id; const p = db.people.find(x => x.id === id);
            document.getElementById('headerHome').classList.add('hidden');
            document.getElementById('headerLedger').classList.remove('hidden');
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            document.getElementById('ledgerFooter').classList.remove('hidden');
            renderLedger();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            let runningBal = 0;
            
            const net = calcBal(p.transactions, db.secret);
            document.getElementById('mainTotal').innerText = "₹" + (db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN'));
            document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isLeft = t.type === 'RECEIVED';
                const isDel = t.status === 'deleted';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                
                // আপনার শর্ত অনুযায়ী কালার লজিক
                let isRed = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');
                
                if(!isDel) runningBal += (t.type==='RECEIVED'?t.amount:-t.amount);

                list.innerHTML += `
                    <div class="flex flex-col ${isLeft ? 'items-start' : 'items-end'} w-full ${isDel ? 'tx-deleted' : ''}">
                        <div class="bubble ${isLeft ? 'bubble-left' : 'bubble-right'}">
                            <img src="${t.imgUrl || 'https://via.placeholder.com/200x120?text=Bill'}" class="tx-img" onclick="window.open(this.src)">
                            <div class="flex justify-between items-center gap-6">
                                <h3 class="text-lg font-black ${isRed?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3>
                                <p class="text-[8px] font-bold text-slate-300 uppercase">${t.date}</p>
                            </div>
                            <p class="text-[9px] text-slate-400 italic mt-1">${t.note || 'Reference Entry'}</p>
                            <div class="flex gap-4 mt-3 pt-2 border-t">
                                <i class="fas fa-trash text-rose-200 text-[10px]" onclick="deleteTx(${t.id})"></i>
                                <i class="fas fa-edit text-indigo-200 text-[10px]" onclick="editTx(${p.id}, ${t.id})"></i>
                                <i class="fab fa-whatsapp text-emerald-300 text-[10px] ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i>
                            </div>
                        </div>
                        <div class="running-bal px-2 mb-4">Balance: ₹${Math.abs(runningBal).toLocaleString()}</div>
                    </div>`;
            });
            setTimeout(() => { document.getElementById('mainViewport').scrollTop = list.scrollHeight; }, 100);
        }

        // --- GESTURES ---
        function openDrawer(type) {
            const d = document.getElementById('inputDrawer'); d.classList.remove('hidden');
            setTimeout(() => d.classList.add('open'), 10);
            document.getElementById('drawerTitle').innerText = type + " ENTRY";
            document.getElementById('drawerTitle').style.color = (type==='GIVEN'?'#e11d48':'#059669');
            document.getElementById('drawerSaveBtn').onclick = () => preSave(type);
        }
        function closeDrawer() { const d = document.getElementById('inputDrawer'); d.classList.remove('open'); setTimeout(() => d.classList.add('hidden'), 400); }

        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Enter Amount");
            const action = async () => {
                let imgUrl = ""; const file = document.getElementById('txFile').files[0];
                if(file) {
                    const fd = new FormData(); fd.append('image', file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                    const dat = await res.json(); imgUrl = dat.data.url;
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:new Date().toLocaleDateString('en-GB'), note:document.getElementById('txNote').value, imgUrl, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
                document.getElementById('txAmt').value = ""; document.getElementById('txNote').value = ""; document.getElementById('imgPreview').classList.add('hidden');
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
        }

        // --- UTILS ---
        function initSecretGesture() {
            const el = document.getElementById('secretTrigger');
            el.onpointerdown = () => { holdTimer = setTimeout(() => {
                askPin(() => { db.secret = true; document.getElementById('secretTrigger').classList.add('text-rose-500'); renderLedger(); startAutoExit(); });
            }, 2500); };
            el.onpointerup = () => clearTimeout(holdTimer);
        }
        function startAutoExit() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(() => { db.secret = false; document.getElementById('secretTrigger').classList.remove('text-rose-500'); renderLedger(); }, 10000); }
        function goHome() { 
            document.getElementById('pageLedger').classList.add('hidden'); 
            document.getElementById('ledgerFooter').classList.add('hidden');
            document.getElementById('pageHome').classList.remove('hidden'); 
            renderHome(); 
        }
        function openAddModal() { const n = prompt("Name:"), ph = prompt("10-Digit Mobile:"); if(n && ph.length===10) { db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] }); saveDB(); renderHome(); } }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("Wrong PIN!"); }; }
        function shareWA(amt, type, name) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro: '+name+'\n'+type+': Rs.'+amt)}`); }
        function handleSmartPdfDownload() { alert("Generating PDF... (Using previous logic)"); /* আপনার আগের পিডিএফ কোডটি এখানে থাকবে */ }
    </script>
</body>
</html>
