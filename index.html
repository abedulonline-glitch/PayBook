         // ১. ImgBB API Key (অবশ্যই আপনার কি এখানে দিন)
const IMGBB_API_KEY = '493904e927fb86161e0a4944d5b28de6';

// ২. ImgBB-তে ছবি আপলোড করার আসল ফাংশন
async function uploadToImgBB(file) {
    const formData = new FormData();
    formData.append('image', file);

    try {
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (data.success) {
            return data.data.url; // এটি অনলাইন ছবির লিঙ্ক দিবে
        } else {
            console.error("ImgBB Error:", data.error);
            return "";
        }
    } catch (err) {
        console.error("Upload failed:", err);
        return "";
    }
}

        const inputs = document.querySelectorAll('.pin-box');
inputs.forEach((input, index) => {
    input.oninput = () => {
        if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus();
    };
    input.onkeydown = (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
    };
});

// পিন কালেক্ট করার জন্য ফাংশন
function getPin() {
    return Array.from(inputs).map(i => i.value).join('');
}

        let lastScrollTop = 0;
const header = document.querySelector('header');
const footer = document.querySelector('.fixed.bottom-0'); // আপনার ট্রানজ্যাকশন ইনপুট বক্স

window.addEventListener('scroll', function() {
    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    
    if (scrollTop > lastScrollTop && scrollTop > 100) {
        // নিচে স্ক্রল করলে হাইড হবে
        header.style.transform = 'translateY(-100%)';
        footer.style.transform = 'translateY(100%)';
    } else {
        // উপরে স্ক্রল করলে ফিরে আসবে
        header.style.transform = 'translateY(0)';
        footer.style.transform = 'translateY(0)';
    }
    lastScrollTop = scrollTop;
}, false);
        

// ৩. ইমেজ প্রিভিউ হ্যান্ডলার (এটি আপনার ফাইলে চেক করুন)
document.getElementById('txFile').onchange = e => {
    const file = e.target.files[0];
    const preview = document.getElementById('imgPreview');
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            preview.src = event.target.result;
            preview.classList.remove('hidden'); // ছবি সিলেক্ট করলে প্রিভিউ দেখাবে
        };
        reader.readAsDataURL(file);
    }
};
        
        // APP LOGIC
        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer;

        window.onload = () => {
    const data = localStorage.getItem('pb_pro_ledger_v3');
    
    if (data) {
        db = JSON.parse(data);
        
        // --- পুরনো ১১ ডিজিটের নম্বর বা ভুল ডাটা পরিষ্কার করার লজিক ---
        if (db.admin && db.admin.phone) {
            // যদি ফোন নম্বর ১০ ডিজিটের না হয়, তবে সব ক্লিয়ার করে রিলোড হবে
            if (String(db.admin.phone).length !== 10) {
                localStorage.removeItem('pb_pro_ledger_v3');
                location.reload(); // পেজ রিলোড হবে যাতে নতুন রেজিস্ট্রেশন স্ক্রিন আসে
                return;
            }
        }

        if (db.admin) {
            showLogin();
            // গ্লোবাল সিঙ্কিং শুরু করা (যদি ফাংশনটি আপনার কোডে থাকে)
            if (typeof startGlobalSync === "function") startGlobalSync();
        } else {
            showReg();
        }
    } else {
        showReg();
    }
    
    // গেসচার এবং অন্যান্য সেটিংস ইনিশিয়েট করা
    if (typeof initGestures === "function") initGestures();
    
    // Image Preview Handler
    const fileInput = document.getElementById('txFile');
    if (fileInput) {
        fileInput.onchange = e => {
            const img = document.getElementById('imgPreview');
            if (e.target.files[0]) {
                img.src = URL.createObjectURL(e.target.files[0]);
                img.classList.remove('hidden');
            }
        };
    }
};
        

        function showReg() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('regBox').classList.remove('hidden'); 
            document.getElementById('authSubtitle').innerText = "Account Setup";
        }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('displayPhone').innerText = "Logged in as " + db.admin.phone;
            document.getElementById('userAvatar').innerText = db.admin.name.substring(0,2).toUpperCase();

        async function handleRegistration() {
    const n = document.getElementById('regName').value;
    const ph = document.getElementById('regPhone').value;
    const p1 = document.getElementById('regPin').value;
    const p2 = document.getElementById('regPinConf').value;

    if(!n || ph.length !== 10 || p1.length < 4 || p1 !== p2) {
        return alert("Please enter a valid 10-digit mobile number and matching PINs.");
    }
    
    const adminData = { name: n, phone: ph, pin: p1, createdAt: new Date() };

    // Firestore-এ ইউজার সেভ করা
    await fs.collection("users").doc(ph).set(adminData);
    
    db.admin = adminData;
    saveDB(); // লোকাল ব্যাকআপ
    location.reload();
}

        // ৪টি বক্স থেকে পিন একত্রে করার ফাংশন
function getPinFromBoxes() {
    const pinInputs = document.querySelectorAll('.pin-box');
    let pin = "";
    pinInputs.forEach(input => {
        pin += input.value;
    });
    return pin;
}

// সংশোধিত লগইন ফাংশন
function handleLogin()

        // Secret Toggle (Hold ₹ for 2s)
        function initGestures() {
            const el = document.getElementById('secretTrigger');
            el.onpointerdown = () => {
                holdTimer = setTimeout(() => {
                    askPin(() => {
                        db.secret = !db.secret;
                        document.getElementById('kacchaIndicator').classList.toggle('hidden');
                        document.getElementById('secretTrigger').classList.toggle('text-rose-500');
                        refresh();
                        alert(db.secret ? "Switched to Private Ledger" : "Switched to Main Ledger");
                    });
                }, 2000);
            };
            el.onpointerup = () => clearTimeout(holdTimer);
        }

        function askPin(callback) {
            const modal = document.getElementById('pinModal');
            modal.classList.remove('hidden');
            document.getElementById('confirmPinInput').value = "";
            document.getElementById('confirmPinInput').focus();
            document.getElementById('pinSubmitBtn').onclick = () => {
                if(document.getElementById('confirmPinInput').value === db.admin.pin) {
                    modal.classList.add('hidden');
                    callback();
                } else alert("Incorrect Security PIN!");
            };
        }

    const filter = db.tab || db.currentFilter || 'CUSTOMER';

function editTransaction(personId, txId) {
    const person = db.people.find(p => p.id === personId);
    const tx = person.transactions.find(t => t.id === txId);

    // এডিট করার জন্য পিন লাগবে
    askPin(() => {
        const newAmt = parseFloat(prompt("Enter New Amount:", tx.amount));
        const newDate = prompt("Enter New Date (DD/MM/YYYY):", tx.date);
        const newNote = prompt("Enter New Note:", tx.note || "");

        if (!isNaN(newAmt)) {
            // ১. হিস্ট্রি সেভ করা (যদি কোনো পরিবর্তন হয়)
            if (!tx.history) tx.history = [];
            tx.history.push({
                oldAmount: tx.amount,
                oldDate: tx.date,
                oldNote: tx.note,
                editedAt: new Date().toLocaleString()
            });

            // ২. মূল ডাটা আপডেট করা
            tx.amount = newAmt;
            tx.date = newDate;
            tx.note = newNote;

            saveDB();
            renderLedger();
            alert("Transaction Updated Successfully!");
        }
    });
}

function startGlobalSync() {
    const myPhone = db.admin.phone;

    // আমি যাকে দিয়েছি অথবা যে আমাকে দিয়েছে—উভয় ডাটা সিঙ্ক হবে
    fs.collection("ledger")
      .where("receiver", "==", myPhone)
      .onSnapshot((snapshot) => {
          snapshot.docChanges().forEach((change) => {
              if (change.type === "added") {
                  const data = change.doc.data();
                  processIncomingTransaction(data);
              }
          });
      });
}

        function showHistory(personId, txId) {
    const person = db.people.find(p => p.id === personId);
    const tx = person.transactions.find(t => t.id === txId);

    if (tx.history && tx.history.length > 0) {
        let historyMsg = "Edit History for this Bill:\n\n";
        tx.history.forEach((h, index) => {
            historyMsg += `${index + 1}. Date: ${h.oldDate} | Amt: ₹${h.oldAmount} | Note: ${h.oldNote}\n(Edited on: ${h.editedAt})\n\n`;
        });
        alert(historyMsg);
    }
}
        
        // ১. ইমেজকে চিরস্থায়ী ডাটাতে রূপান্তর করার ফাংশন
function fileToDataURL(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

// ২. আপডেট করা preSave ফাংশন (যা ইমেজ সেভ করবে)
async function preSave(type) {
    const amtInput = document.getElementById('txAmt');
    const amt = parseFloat(amtInput.value);
    if(!amt) return alert("Please enter amount");

    // এই ফাংশনটি এখন লোকাল এবং ক্লাউড—উভয় জায়গায় ডাটা সেভ করবে
    const saveAction = async () => {
        const fileInput = document.getElementById('txFile');
        let onlineImgUrl = "";
        
        // ১. ছবি থাকলে ImgBB-তে আপলোড করা
        if (fileInput.files && fileInput.files[0]) {
            onlineImgUrl = await uploadToImgBB(fileInput.files[0]);
        }

        const p = db.people.find(x => x.id === db.activeId);
        const txData = {
            id: Date.now(),
            amount: amt,
            type: type,
            secret: db.secret,
            date: new Date().toLocaleDateString('en-GB'),
            note: document.getElementById('txNote').value,
            imgUrl: onlineImgUrl,
            status: 'active'
        };

        // ২. লোকাল সেভ (আপনার ফোনের মেমোরিতে)
        p.transactions.unshift(txData);
        saveDB(); 

        // ৩. গ্লোবাল সেভ (Firebase Firestore-এ পাঠানো যাতে অন্যজন দেখতে পায়)
        try {
            await fs.collection("ledger").add({
                sender: db.admin.phone,   // আপনার নম্বর
                receiver: p.phone,        // কাস্টমার/সাপ্লায়ারের নম্বর
                ...txData,                // বাকি সব তথ্য (amount, type, note ইত্যাদি)
                serverTime: firebase.firestore.FieldValue.serverTimestamp()
            });
            console.log("Global Sync Success!");
        } catch (e) {
            console.error("Global Sync Failed: ", e);
        }

        renderLedger();
        
        // ফর্ম ক্লিয়ার করা
        amtInput.value = ""; 
        document.getElementById('txNote').value = "";
        document.getElementById('txFile').value = "";
        document.getElementById('imgPreview').classList.add('hidden');
    };

    // ৪. আপনার পিন চেক লজিক (অক্ষুণ্ণ রাখা হয়েছে)
    const currentTab = db.tab || db.currentFilter;
    if (db.secret === true && currentTab === 'CUSTOMER' && type === 'RECEIVED') {
        askPin(saveAction);
    } else {
        saveAction(); 
    }
}
         // সংশোধিত ডিলিট ফাংশন (পিন প্রোটেকশন সহ)
function deleteTx(tid) {
    // পিন চাওয়ার জন্য askPin কল করা হলো
    askPin(() => {
        // সঠিক পিন দেওয়ার পর এই অংশটি কাজ করবে
        if(confirm("Are you sure you want to cancel this entry? This action cannot be undone.")) {
            const p = db.people.find(x => x.id === db.activeId);
            const tx = p.transactions.find(t => t.id === tid);
            
            tx.status = 'deleted'; // হিসাব ধূসর (gray) হয়ে যাবে কিন্তু হিস্ট্রিতে থাকবে
            
            saveDB();
            renderLedger();
            alert("Entry successfully canceled with PIN verification!");
        }
    });
}

function handleSmartPdfDownload() {
    // চেক করা হচ্ছে ইউজার এখন লেজার পেজে আছে নাকি হোম পেজে
    const isLedgerPage = !document.getElementById('pageLedger').classList.contains('hidden');
    const isSecretMode = !!db.secret; // বর্তমানে অ্যাপ কোন মোডে আছে?

    if (isLedgerPage && db.activeId) {
        // ইন্ডিভিজুয়াল রিপোর্ট
        downloadPersonalLedgerPDF(db.activeId, isSecretMode);
    } else {
        // গ্লোবাল সামারি রিপোর্ট
        downloadBusinessSummaryPDF(isSecretMode);
    }
}

// ২. ইন্ডিভিজুয়াল লেজার পিডিএফ (পাক্কা মোডে কাঁচা হিসাব পুরোপুরি ভ্যানিশ থাকবে)
function downloadPersonalLedgerPDF(personId, isAppInSecretMode) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const person = db.people.find(p => p.id === personId);

    doc.setFontSize(20);
    doc.text(`${isAppInSecretMode ? 'Full' : 'Official'} Ledger: ${person.name}`, 14, 20);

    // ১. কলাম নির্ধারণ
    let headers = isAppInSecretMode 
        ? [['Date', 'Type', 'Note', 'Pakka Amt', 'Kaccha Amt']] 
        : [['Date', 'Type', 'Note', 'Amount (Pakka)']];

    const tableData = [];
    let totP = 0, totK = 0;

    person.transactions.forEach(t => {
        if (t.status === 'active') {
            const amt = t.amount;
            const change = (t.type === 'RECEIVED' ? amt : -amt);

            if (!isAppInSecretMode) {
                // পাকা মোড: কাঁচা ডাটা ফিল্টার আউট (সম্পূর্ণ ভ্যানিশ)
                if (!t.secret) {
                    totP += change;
                    tableData.push([t.date, t.type, t.note || "-", "Rs. " + amt.toLocaleString('en-IN')]);
                }
            } else {
                // কাঁচা মোড: পাকা ও কাঁচা পাশাপাশি
                let pVal = t.secret ? "-" : "Rs. " + amt.toLocaleString('en-IN');
                let kVal = t.secret ? "Rs. " + amt.toLocaleString('en-IN') : "-";
                if(t.secret) totK += change; else totP += change;
                tableData.push([t.date, t.type, t.note || "-", pVal, kVal]);
            }
        }
    });

    doc.autoTable({
        startY: 40,
        head: headers,
        body: tableData,
        theme: 'grid',
        headStyles: { fillColor: isAppInSecretMode ? [225, 29, 72] : [79, 70, 229] },
        styles: { fontSize: 8 }
    });
    doc.save(`${person.name}_Report.pdf`);
}

// ৩. গ্লোবাল বিজনেস সামারি পিডিএফ
function downloadBusinessSummaryPDF(isAppInSecretMode) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(`Business Summary (${isAppInSecretMode ? 'Full' : 'Pakka Only'})`, 14, 20);

    let headers = isAppInSecretMode 
        ? [['Name', 'Mobile', 'Type', 'Pakka Bal', 'Kaccha Bal']] 
        : [['Name', 'Mobile', 'Type', 'Balance (Pakka)']];

    const tableData = [];
    db.people.forEach(p => {
        let pB = 0, kB = 0;
        p.transactions.forEach(t => {
            if (t.status === 'active') {
                let v = (t.type === 'RECEIVED' ? t.amount : -t.amount);
                if (t.secret) kB += v; else pB += v;
            }
        });

        if (!isAppInSecretMode) {
            tableData.push([p.name, p.phone, p.type, "Rs. " + pB.toLocaleString('en-IN')]);
        } else {
            tableData.push([p.name, p.phone, p.type, "Rs. " + pB.toLocaleString('en-IN'), "Rs. " + kB.toLocaleString('en-IN')]);
        }
    });

    doc.autoTable({
        startY: 35,
        head: headers,
        body: tableData,
        theme: 'grid',
        headStyles: { fillColor: isAppInSecretMode ? [225, 29, 72] : [79, 70, 229] }
    });
    doc.save(`Business_Report.pdf`);
}
