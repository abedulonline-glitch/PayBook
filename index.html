<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Axis Premium Edition</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F4F7F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--axis-grey); color: #333; margin: 0; overflow: hidden; }
        
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        .axis-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .axis-input { @apply w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#861F41] bg-white; }
        
        /* Message Bubbles Style */
        .bubble { max-width: 85%; padding: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .bubble-left { align-self: flex-start; background: #fff; border-radius: 0 1.5rem 1.5rem 1.5rem; border-left: 5px solid #861F41; }
        .bubble-right { align-self: flex-end; background: #fff; border-radius: 1.5rem 0 1.5rem 1.5rem; border-right: 5px solid #10b981; }

        /* Full Screen Data Entry (Drawer) */
        #entryDrawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 600; }
        #entryDrawer.open { transform: translateY(0); }

        /* Media Selector (Bottom Sheet) */
        #mediaSheet { transform: translateY(100%); transition: transform 0.3s ease-out; z-index: 700; }
        #mediaSheet.open { transform: translateY(0); }

        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
        #mainViewport { height: calc(100vh - 60px); overflow-y: auto; scroll-behavior: smooth; }
    </style>
</head>
<body>

    <!-- 1. AUTH SYSTEM -->
    <div id="authScreen" class="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-8 overflow-y-auto">
        <div class="w-full max-w-md text-center">
            <div class="w-20 h-20 axis-gradient rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black">PB</div>
            <h1 class="text-3xl font-black text-[#861F41] mb-2">PayBook<span class="text-slate-300">Pro</span></h1>
            <p class="text-[10px] uppercase font-bold text-slate-400 tracking-[0.3em] mb-10">Premium Business Ledger</p>

            <div id="regBox" class="hidden space-y-4 text-left animate-fade">
                <input type="text" id="regName" placeholder="Owner Name" class="axis-input">
                <input type="number" id="regPhone" placeholder="10-Digit Mobile" class="axis-input">
                <input type="password" id="regPin" placeholder="Set PIN" maxlength="4" class="axis-input text-center tracking-widest">
                <button onclick="handleRegistration()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold mt-4 shadow-xl">CREATE ACCOUNT</button>
            </div>

            <div id="loginBox" class="hidden space-y-8 animate-fade">
                <div class="p-6 bg-slate-50 rounded-2xl border-l-8 border-[#861F41] text-left">
                    <p id="displayPhone" class="text-xl font-black text-[#861F41]"></p>
                </div>
                <input type="password" id="loginPin" placeholder="PIN" maxlength="4" class="axis-input text-center text-5xl tracking-widest h-24">
                <button onclick="handleLogin()" class="w-full py-5 bg-[#861F41] text-white rounded-2xl font-bold shadow-2xl">SECURE ACCESS</button>
            </div>
        </div>
    </div>

    <!-- সেটিংস মোডালের ভেতরে এই বাটনটি যোগ করুন -->
<button onclick="shareApp()" class="w-full p-6 bg-slate-50 rounded-3xl flex items-center justify-between font-bold mt-3">
    <span>Share App with Friends</span> <i class="fas fa-share-nodes text-emerald-500"></i>
</button>

    <!-- 2. MAIN APPLICATION UI -->
    <div id="appBody" class="hidden min-h-screen">
        <header class="axis-gradient text-white sticky top-0 z-[100] h-[60px] px-5 flex items-center justify-between shadow-lg">
            <div id="headerMain" class="flex justify-between items-center w-full">
                <h1 class="text-xl font-black italic">PayBook</h1>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-file-pdf opacity-80" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog opacity-80" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <i class="fas fa-arrow-left" onclick="goHome()"></i>
                    <div><h2 id="lName" class="text-sm font-bold leading-none">Client</h2><p id="balTypeLabel" class="text-[8px] opacity-60 uppercase">Portfolio</p></div>
                </div>
                <div class="flex items-center gap-3">
                    <span id="mainTotal" class="font-black text-lg tracking-tighter">0.00</span>
                    <span id="secretTrigger" class="text-xl font-black opacity-30 select-none">₹</span>
                </div>
            </div>
        </header>

        <div id="mainViewport" class="bg-slate-50">
            <!-- Page: Home (Contacts) -->
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl border mb-6 shadow-sm">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md transition-all">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400 transition-all">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-3"></div>
                <button onclick="openAddModal()" class="fixed bottom-10 right-6 w-16 h-16 axis-gradient text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl border-4 border-white"><i class="fas fa-plus"></i></button>
            </div>

            <!-- Page: Ledger (Transactions) -->
            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col"></div>
                <!-- Floating Entry Buttons -->
                <div class="fixed bottom-8 left-5 right-5 flex gap-3 z-[150]">
                    <button onclick="triggerDrawer('GIVEN')" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-2xl">↑ GIVEN</button>
                    <button onclick="triggerDrawer('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl">↓ RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. PREMIUM DATA ENTRY DRAWER (Like your screenshot) -->
    <div id="entryDrawer" class="fixed inset-0 bg-black/60 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3rem] p-8 shadow-2xl animate-fade-up">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-10" onclick="closeDrawer()"></div>
            
            <!-- Amount Entry Area -->
            <div class="text-center mb-10">
                <p id="drawerActionType" class="text-[10px] font-black uppercase text-slate-400 mb-2">AMOUNT TO ADD</p>
                <div class="flex items-center justify-center gap-2">
                    <span class="text-4xl font-black text-slate-300">₹</span>
                    <input type="number" id="txAmt" placeholder="0.00" class="text-5xl font-black text-[#861F41] bg-transparent outline-none w-2/3 text-center border-b-2 border-slate-100 focus:border-[#861F41] pb-2">
                </div>
            </div>

            <!-- Options Area -->
            <div class="space-y-4 mb-10">
                <div class="flex items-center bg-slate-50 p-4 rounded-2xl gap-4">
                    <i class="fas fa-file-lines text-slate-300"></i>
                    <input type="text" id="txNote" placeholder="Add Notes (What is this for?)" class="bg-transparent outline-none flex-1 text-sm">
                </div>
                
                <div class="flex items-center bg-slate-50 p-4 rounded-2xl gap-4" onclick="document.getElementById('txDate').showPicker()">
                    <i class="fas fa-calendar-alt text-slate-300"></i>
                    <input type="date" id="txDate" class="bg-transparent outline-none flex-1 text-sm font-bold text-slate-600">
                </div>

                <!-- Add Bills Section (Your Screenshot) -->
                <div class="bg-slate-50 p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <i class="fas fa-receipt text-slate-300"></i>
                        <p class="text-sm text-slate-500 font-bold">Add Bill Images</p>
                    </div>
                    <div class="flex gap-2">
                        <div id="billPreviewArea" class="hidden relative">
                            <img id="imgPreview" class="w-10 h-10 rounded-lg object-cover border">
                            <i class="fas fa-times-circle absolute -top-2 -right-2 text-rose-500 bg-white rounded-full" onclick="clearImage()"></i>
                        </div>
                        <button onclick="openMediaSelector()" class="w-10 h-10 bg-white border-2 border-dashed rounded-lg flex items-center justify-center text-slate-300">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button id="mainConfirmBtn" class="axis-btn w-full !bg-emerald-600 flex items-center justify-center gap-3">
                <i class="fas fa-check"></i> CONFIRM TRANSACTION
            </button>
        </div>
    </div>

    <!-- 4. MEDIA SELECTOR (Camera/Gallery) -->
    <div id="mediaSheet" class="fixed inset-0 bg-black/40 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] p-10 flex justify-around animate-fade-up">
            <button onclick="triggerCamera()" class="flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-2xl shadow-inner"><i class="fas fa-camera"></i></div>
                <span class="text-xs font-bold text-slate-500">Camera</span>
            </button>
            <button onclick="triggerGallery()" class="flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-2xl shadow-inner"><i class="fas fa-image"></i></div>
                <span class="text-xs font-bold text-slate-500">Gallery</span>
            </button>
            <input type="file" id="camInp" accept="image/*" capture="camera" class="hidden">
            <input type="file" id="galInp" accept="image/*" class="hidden">
        </div>
    </div>

    <!-- 5. OTHER MODALS (PIN, Settings) -->
    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[2000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl">
            <i class="fas fa-shield-halved text-5xl text-[#861F41] mb-8"></i>
            <h3 class="text-xl font-black mb-10 text-[#861F41] uppercase tracking-widest">Verify PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-4 bg-slate-50 rounded-2xl text-center text-4xl tracking-widest outline-none border mb-8">
            <button id="pinSubmitBtn" class="axis-btn w-full">VERIFY ACCOUNT</button>
        </div>
    </div>

    <script>
        // --- CORE CONFIG ---
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";

        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer, autoExitTimer, capturedImg = "";

        // --- STARTUP ---
        window.onload = () => {
            const data = loc9alStorage.getItem('paybook_v9_master');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) showLogin(); else showReg();
            } else showReg();
            initSecretGesture();
            
            // Image Handlers
            document.getElementById('camInp').onchange = e => handleImageFile(e.target.files[0]);
            document.getElementById('galInp').onchange = e => handleImageFile(e.target.files[0]);
        };

        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden'); 
            document.getElementById('displayPhone').innerText = "+91 " + db.admin.phone;
            syncCloud();
        }
        async function syncCloud() {
            const doc = await db_fs.collection("global_ledgers").doc(db.admin.phone).get();
            if(doc.exists) { db = doc.data(); renderHome(); }
        }
        function saveDB() {
            localStorage.setItem('paybook_v9_master', JSON.stringify(db));
            if(db.admin) db_fs.collection("global_ledgers").doc(db.admin.phone).set(db);
        }

        // --- AUTH ---
        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value;
            if(!n || ph.length < 10) return alert("Invalid Data");
            db.admin = { name: n, phone: ph, pin: p };
            saveDB(); location.reload();
        }
        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin || document.getElementById('loginPin').value === MASTER_PIN) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("Wrong Access PIN!");
        }

        // --- LEDGER LOGIC ---
        function switchTab(t) {
            db.tab = t;
            document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400';
            document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400';
            renderHome();
        }

        function calcBal(txs, isSec) {
    let b = 0;
    // এখানে !!isSec ব্যবহার করা হয়েছে যাতে Boolean (true/false) ১০০% নিশ্চিত হয়
    txs.filter(t => t.status === 'active' && !!t.secret === !!isSec).forEach(t => {
        // GIVEN বিয়োগ হবে, RECEIVED যোগ হবে (কাস্টমারের জন্য)
        // আপনি যদি বিপরীত চান তবে নিচের চিহ্ন বদলে দিতে পারেন
        b += (t.type === 'RECEIVED' ? t.amount : -t.amount);
    });
    return b;
}

        function renderHome() {
    const list = document.getElementById('contactList'); list.innerHTML = "";
    let totalPortfolio = 0;
    
    // হেডার লেবেল আপডেট
    document.getElementById('headerLedger').classList.add('hidden');
    document.getElementById('headerMain').classList.remove('hidden');

    db.people.filter(p => p.type === db.tab).forEach(p => {
        const bal = calcBal(p.transactions, db.secret);
        totalPortfolio += bal;
        
        // ১০০ দিয়ে ভাগ করার লজিক (শুধুমাত্র সিক্রেট মোডে)
        const dAmt = db.secret ? (Math.abs(bal) / 100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
        
        const isRed = bal > 0;
        list.innerHTML += `
            <div onclick="openLedger(${p.id})" class="axis-card p-5 flex justify-between items-center active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 axis-gradient text-white rounded-2xl flex items-center justify-center font-black text-xs shadow-lg">${p.name[0]}</div>
                    <div><h4 class="font-bold text-sm text-slate-800">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">${p.phone}</p></div>
                </div>
                <div class="text-right">
                    <h5 class="font-black text-sm ${isRed?'text-rose-500':'text-emerald-600'}">₹${dAmt}</h5>
                    <p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'YOU GET' : 'CLEAR'}</p>
                </div>
            </div>`;
    });
    
    // মেইন হেডার ব্যালেন্স এবং ১০০ দিয়ে ভাগ
    const mainTotalEl = document.getElementById('mainTotal');
    const finalTotal = db.secret ? (Math.abs(totalPortfolio) / 100).toFixed(2) : Math.abs(totalPortfolio).toLocaleString('en-IN');
    mainTotalEl.innerText = finalTotal;
    mainTotalEl.style.color = totalPortfolio > 0 ? '#f43f5e' : '#10b981';
}

        function openLedger(id) {
            db.activeId = id; const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('headerMain').classList.add('hidden');
            document.getElementById('headerLedger').classList.remove('hidden');
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            renderLedger();
            if(db.secret) startAutoExit();
        }

        function renderLedger() {
    const p = db.people.find(x => x.id === db.activeId);
    const list = document.getElementById('ledgerList'); list.innerHTML = "";
    
    const net = calcBal(p.transactions, db.secret);
    
    // হেডার আপডেট
    const displayHeaderTotal = db.secret ? (Math.abs(net) / 100).toFixed(2) : Math.abs(net).toLocaleString('en-IN');
    document.getElementById('mainTotal').innerText = displayHeaderTotal;
    document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

    // শুধুমাত্র বর্তমান মোড (পাকা বা কাঁচা) অনুযায়ী ফিল্টার
    p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
        const isR = t.type === 'RECEIVED', isDel = t.status === 'deleted';
        
        // ইন্ডিভিজুয়াল এন্ট্রি ১০০ দিয়ে ভাগ (সিক্রেট মোডে)
        const dAmt = t.secret ? (t.amount / 100).toFixed(2) : t.amount.toLocaleString('en-IN');
        
        let isRedCol = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');

        list.innerHTML += `
            <div class="flex flex-col ${isR ? 'items-end pr-2' : 'items-start pl-2'} w-full mb-10 ${isDel ? 'tx-deleted' : ''}">
                <div class="text-[8px] font-black text-slate-300 uppercase mb-2">${t.date}</div>
                <div class="bubble ${isR ? 'bubble-right' : 'bubble-left'}">
                    ${t.imgUrl ? `<img src="${t.imgUrl}" class="tx-img mb-3" onclick="window.open(this.src)">` : ''}
                    <div class="flex justify-between items-center gap-6">
                        <h3 class="text-xl font-black ${isRedCol?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3>
                        <p class="text-[8px] font-bold text-slate-300">${t.type}</p>
                    </div>
                    <p class="text-[10px] text-slate-500 italic mt-1">${t.note || 'Ref: PB-00'+t.id.toString().slice(-4)}</p>
                    <div class="flex gap-4 mt-4 pt-3 border-t">
                        <i class="fas fa-edit text-indigo-200 text-xs" onclick="editTx(${p.id}, ${t.id})"></i>
                        <i class="fas fa-trash text-rose-200 text-xs" onclick="deleteTx(${t.id})"></i>
                        <i class="fab fa-whatsapp text-emerald-300 text-xs ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i>
                    </div>
                </div>
            </div>`;
    });
}

        // --- DATA ENTRY DRAWER LOGIC ---
        function triggerDrawer(type) {
            const drawer = document.getElementById('entryDrawer');
            drawer.classList.remove('hidden');
            setTimeout(() => drawer.classList.add('open'), 10);
            
            document.getElementById('drawerActionType').innerText = type + " AMOUNT";
            document.getElementById('drawerActionType').style.color = (type==='GIVEN' ? '#e11d48' : '#059669');
            document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('mainConfirmBtn').onclick = () => preSave(type);
        }

        function closeDrawer() {
            const drawer = document.getElementById('entryDrawer');
            drawer.classList.remove('open');
            setTimeout(() => { drawer.classList.add('hidden'); clearImage(); document.getElementById('txAmt').value=""; document.getElementById('txNote').value=""; }, 400);
        }

        function openMediaSelector() { document.getElementById('mediaSheet').classList.remove('hidden'); setTimeout(() => document.getElementById('mediaSheet').classList.add('open'), 10); }
        function triggerCamera() { document.getElementById('camInp').click(); closeMedia(); }
        function triggerGallery() { document.getElementById('galInp').click(); closeMedia(); }
        function closeMedia() { document.getElementById('mediaSheet').classList.remove('open'); setTimeout(() => document.getElementById('mediaSheet').classList.add('hidden'), 300); }

        function handleImageFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => { 
                document.getElementById('imgPreview').src = ev.target.result;
                document.getElementById('billPreviewArea').classList.remove('hidden');
                capturedImg = file; 
            };
            reader.readAsDataURL(file);
        }
        function clearImage() { document.getElementById('billPreviewArea').classList.add('hidden'); capturedImg = ""; }

        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Enter Amount");
            const action = async () => {
                document.getElementById('mainConfirmBtn').innerText = "UPLOADING...";
                let imgUrl = "";
                if(capturedImg) {
                    const fd = new FormData(); fd.append('image', capturedImg);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                    const dat = await res.json(); if(dat.success) imgUrl = dat.data.url;
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:document.getElementById('txDate').value, note:document.getElementById('txNote').value, imgUrl, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
                document.getElementById('mainConfirmBtn').innerHTML = '<i class="fas fa-check"></i> CONFIRM TRANSACTION';
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
        }

        // --- UTILS & HELPERS ---
        function initSecretGesture() {
            const el = document.getElementById('secretTrigger');
            el.onpointerdown = () => { holdTimer = setTimeout(() => {
                askPin(() => { db.secret = true; document.getElementById('secretTrigger').classList.add('text-rose-500'); renderLedger(); startAutoExit(); });
            }, 2500); };
            el.onpointerup = () => clearTimeout(holdTimer);
        }
        function startAutoExit() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(() => { db.secret = false; document.getElementById('secretTrigger').classList.remove('text-rose-500'); renderLedger(); }, 10000); }
        
        function askPin(cb) {
            document.getElementById('pinModal').classList.remove('hidden');
            document.getElementById('confirmPinInput').value = "";
            document.getElementById('pinSubmitBtn').onclick = () => {
                if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) {
                    document.getElementById('pinModal').classList.add('hidden'); cb();
                } else alert("Invalid PIN!");
            };
        }

        function goHome() { 
            document.getElementById('pageLedger').classList.add('hidden'); 
            document.getElementById('headerLedger').classList.add('hidden');
            document.getElementById('headerMain').classList.remove('hidden');
            document.getElementById('pageHome').classList.remove('hidden'); 
            renderHome(); 
        }

        function openAddModal() { const n = prompt("Contact Name:"), ph = prompt("10-Digit Mobile:"); if(n && ph.length===10) { db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] }); saveDB(); renderHome(); } }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function shareWA(amt, type, name) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro Receipt: '+name+'\n'+type+': Rs.'+amt)}`); }
         // ১. স্মার্ট ডিসিশন মেকার (হেডার আইকনের জন্য)
function handleSmartPdfDownload() {
    const isLedgerPage = !document.getElementById('pageLedger').classList.contains('hidden');
    const isSecret = db.secret; // বর্তমানে আপনি কোন মোডে আছেন?

    if (isLedgerPage && db.activeId) {
        downloadPersonalLedgerPDF(db.activeId, isSecret);
    } else {
        downloadBusinessSummaryPDF(isSecret);
    }
}

// ২. পার্সোনাল লেজার পিডিএফ
function downloadPersonalLedgerPDF(personId, isSecret) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const person = db.people.find(p => p.id === personId);

    doc.setFontSize(18);
    doc.setTextColor(isSecret ? 134 : 15, isSecret ? 31 : 23, isSecret ? 65 : 42);
    doc.text(`${isSecret ? 'Detailed' : 'Official'} Ledger: ${person.name}`, 14, 20);
    
    doc.setFontSize(10);
    doc.text(`Mobile: ${person.phone} | Type: ${person.type}`, 14, 28);
    doc.text(`Date: ${new Date().toLocaleString()}`, 14, 33);

    // কলাম নির্ধারণ
    let headers = isSecret 
        ? [['Date', 'Type', 'Note', 'Pakka Rs.', 'Kaccha Rs.']] 
        : [['Date', 'Type', 'Note', 'Amount Rs.']];

    const tableData = [];
    let totP = 0, totK = 0;

    person.transactions.forEach(t => {
        if (t.status === 'active') {
            const amt = t.amount; // অরিজিনাল অ্যামাউন্ট
            let change = (t.type === 'RECEIVED' ? amt : -amt);

            if (!isSecret) {
                if (!t.secret) {
                    totP += change;
                    tableData.push([t.date, t.type, t.note || "-", amt.toLocaleString('en-IN')]);
                }
            } else {
                let pVal = t.secret ? "-" : amt.toLocaleString('en-IN');
                let kVal = t.secret ? amt.toLocaleString('en-IN') : "-";
                if(t.secret) totK += change; else totP += change;
                tableData.push([t.date, t.type, t.note || "-", pVal, kVal]);
            }
        }
    });

    doc.autoTable({
        startY: 40,
        head: headers,
        body: tableData,
        theme: 'grid',
        headStyles: { fillColor: isSecret ? [134, 31, 65] : [15, 23, 42] }
    });

    doc.save(`${person.name}_Ledger.pdf`);
}

// ৩. গ্লোবাল বিজনেস সামারি পিডিএফ
function downloadBusinessSummaryPDF(isSecret) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text(`Portfolio Summary (${isSecret ? 'Secret' : 'Pakka Only'})`, 14, 20);

    let headers = isSecret 
        ? [['Name', 'Mobile', 'Pakka Balance', 'Kaccha Balance']] 
        : [['Name', 'Mobile', 'Balance (Pakka)']];

    const tableData = [];
    db.people.forEach(p => {
        let pB = 0, kB = 0;
        p.transactions.filter(t => t.status === 'active').forEach(t => {
            let v = (t.type === 'RECEIVED' ? t.amount : -t.amount);
            if (t.secret) kB += v; else pB += v;
        });

        if (!isSecret) {
            tableData.push([p.name, p.phone, pB.toLocaleString('en-IN')]);
        } else {
            tableData.push([p.name, p.phone, pB.toLocaleString('en-IN'), kB.toLocaleString('en-IN')]);
        }
    });

    doc.autoTable({
        startY: 30,
        head: headers,
        body: tableData,
        headStyles: { fillColor: isSecret ? [134, 31, 65] : [15, 23, 42] }
    });

    doc.save(`Business_Summary.pdf`);
}
