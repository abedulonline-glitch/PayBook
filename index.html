<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayBook Pro - Professional Business Ledger</title>
    <!-- CSS & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; border-left: 4px solid #cbd5e1 !important; }
        .kaccha-card { border-left: 5px solid #fb7185 !important; background-color: #fff1f2; }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24 overflow-x-hidden selection:bg-indigo-100">

    <!-- ১. লোডিং ইন্ডিকেটর -->
    <div id="loader" class="fixed inset-0 bg-white z-[1000] flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-indigo-600"></div>
    </div>

    <!-- ২. পেন্ডিং অ্যাপ্রুভাল স্ক্রিন -->
    <div id="subScreen" class="hidden fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center p-10 text-center">
        <i class="fas fa-hourglass-half text-6xl text-amber-500 mb-6 animate-pulse"></i>
        <h2 class="text-2xl font-black mb-2 text-gray-800">অ্যাপ্রুভাল পেন্ডিং</h2>
        <p class="text-sm text-gray-500 mb-10">আপনার সাবস্ক্রিপশনটি সুপার অ্যাডমিন দ্বারা ভেরিফাই করা হচ্ছে।</p>
        <button onclick="shareApp()" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">Share App</button>
    </div>

    <!-- ৩. অ্যাডমিন রেজিস্ট্রেশন স্ক্রিন -->
    <div id="regScreen" class="hidden fixed inset-0 bg-indigo-950 z-[400] p-8 text-white overflow-y-auto">
        <h1 class="text-3xl font-black mb-10 italic tracking-tighter">PayBook Pro</h1>
        <div class="space-y-4">
            <input type="text" id="regName" placeholder="আপনার নাম" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none">
            <input type="number" id="regPhone" placeholder="মোবাইল নম্বর" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none">
            <input type="password" id="regPin" placeholder="পিন (৪ ডিজিট)" maxlength="4" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none text-center tracking-[15px]">
            <input type="password" id="regPinConf" placeholder="কনফার্ম পিন" maxlength="4" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none text-center tracking-[15px]">
            <button onclick="startRegistration()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-xl shadow-2xl">REGISTER & CONNECT DRIVE</button>
            <p class="text-[10px] opacity-50 text-center uppercase tracking-widest mt-4">Data will be stored in your Google Drive</p>
        </div>
    </div>

    <!-- ৪. মেইন অ্যাপ UI -->
    <div id="mainApp" class="hidden">
        <header class="bg-indigo-900 text-white p-6 sticky top-0 z-50 rounded-b-[40px] shadow-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="adminIcon" onclick="openAdminDashboard()" class="w-10 h-10 bg-indigo-700 rounded-full flex items-center justify-center font-bold border border-white/20">A</div>
                    <h1 class="text-2xl font-black italic tracking-tighter">PayBook</h1>
                </div>
                <div class="flex gap-4 items-center">
                    <i class="fas fa-share-alt" onclick="shareApp()"></i>
                    <div id="secretBadge" onclick="exitSecretMode()" class="hidden bg-rose-500 px-3 py-1 rounded-full text-[9px] font-black uppercase animate-pulse">Secret Mode</div>
                </div>
            </div>
            <div class="mt-8">
                <p class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Net Balance (Pakka View)</p>
                <div class="flex items-center gap-2">
                    <!-- ₹ চিহ্নে ৩ সেকেন্ড হোল্ড করলে সিক্রেট মোড আসবে -->
                    <span id="secretTrigger" class="text-4xl font-black select-none cursor-pointer">₹</span>
                    <h2 id="mainBalance" class="text-4xl font-black tracking-tighter">0.00</h2>
                </div>
            </div>
        </header>

        <!-- হোম পেজ (Customer/Supplier Tabs) -->
        <div id="homePage" class="p-4 mt-4">
            <div class="flex bg-white p-1 rounded-2xl shadow-sm mb-6 border border-gray-100">
                <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-md">CUSTOMERS</button>
                <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-xl text-xs font-black text-gray-400">SUPPLIERS</button>
            </div>
            <div id="contactList" class="space-y-4 pb-24"></div>
            <button onclick="openAddModal()" class="fixed bottom-10 right-6 w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- লেজার পেজ -->
        <div id="ledgerPage" class="hidden p-4">
            <div class="flex justify-between items-center mb-6 px-2">
                <i class="fas fa-chevron-left text-xl text-gray-400" onclick="goHome()"></i>
                <div class="text-center">
                    <h2 id="lpName" class="font-black text-gray-800 text-xl">Name</h2>
                    <p id="lpPhone" class="text-[10px] text-gray-400 font-bold tracking-widest"></p>
                </div>
                <i class="fas fa-file-pdf text-xl text-indigo-600" onclick="generatePDF()"></i>
            </div>
            <div id="txList" class="space-y-3 pb-80"></div>

            <!-- ট্রানজ্যাকশন ইনপুট -->
            <div class="fixed bottom-0 left-0 right-0 bg-white p-6 rounded-t-[50px] shadow-[0_-20px_60px_rgba(0,0,0,0.1)]">
                <div class="flex gap-3 mb-4">
                    <input type="number" id="txAmt" placeholder="0.00" class="flex-1 p-4 bg-gray-100 rounded-2xl text-2xl font-black outline-none focus:ring-2 ring-indigo-500">
                    <label class="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center cursor-pointer border-2 border-dashed border-gray-300">
                        <i class="fas fa-camera text-gray-400"></i>
                        <input type="file" id="txImg" accept="image/*" class="hidden">
                    </label>
                </div>
                <input type="text" id="txNote" placeholder="কি বাবদ? (Note)" class="w-full p-4 bg-gray-100 rounded-2xl text-sm mb-4 outline-none">
                <div class="flex gap-4">
                    <button onclick="preSave('GIVEN')" class="flex-1 py-5 bg-rose-500 text-white rounded-2xl font-black shadow-lg">GIVEN</button>
                    <button onclick="preSave('RECEIVED')" class="flex-1 py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- গ্লোবাল পিন মডাল -->
    <div id="pinModal" class="hidden fixed inset-0 bg-black/90 z-[700] flex items-center justify-center p-10">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 text-center animate-slide-up">
            <h3 class="text-xl font-black mb-4 text-gray-800">সিকিউরিটি পিন</h3>
            <input type="password" id="confirmPin" maxlength="4" class="w-full p-4 bg-gray-100 rounded-2xl text-center text-3xl tracking-[20px] outline-none border-2 border-indigo-100">
            <div class="flex gap-4 mt-8">
                <button onclick="closePinModal()" class="flex-1 font-bold text-gray-400">CANCEL</button>
                <button id="pinSubmit" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ",
            authDomain: "paybook-cc6be.firebaseapp.com",
            projectId: "paybook-cc6be",
            storageBucket: "paybook-cc6be.firebasestorage.app",
            messagingSenderId: "1000801647538",
            appId: "1:1000801647538:web:648ac804d8d75a0811c2ab"
        };
        firebase.initializeApp(firebaseConfig);
        const fs = firebase.firestore();
        const SUPER_ADMIN = "9851713487";

        // MASTER DATA STATE
        let db = { 
            admin: null, 
            people: [], 
            isSecret: false, 
            tab: 'CUSTOMER', 
            activeId: null 
        };

        // ১. অ্যাপ বুটআপ লজিক
        window.onload = async () => {
            const local = localStorage.getItem('pb_master_v5');
            if(local) {
                db = JSON.parse(local);
                if(db.admin) {
                    startApprovalListener(db.admin.phone);
                }
            }
            toggleScreens();
            document.getElementById('loader').classList.add('hidden');
            initSecretGesture();
        };

        function toggleScreens() {
            const { admin } = db;
            document.getElementById('regScreen').classList.toggle('hidden', !!admin);
            if(admin) {
                if(admin.status === 'approved') {
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('subScreen').classList.add('hidden');
                    renderHome();
                } else {
                    document.getElementById('subScreen').classList.remove('hidden');
                }
            }
        }

        // ২. রেজিস্ট্রেশন ফাংশন (Firestore-এ ডাটা পাঠাবে)
        async function startRegistration() {
            const name = document.getElementById('regName').value.trim();
            const ph = document.getElementById('regPhone').value.trim();
            const pin = document.getElementById('regPin').value.trim();
            const conf = document.getElementById('regPinConf').value.trim();

            if(!name || ph.length < 10 || pin.length < 4 || pin !== conf) {
                alert("সঠিক তথ্য দিন (নাম, ১০ ডিজিট ফোন এবং ৪ ডিজিট পিন)।");
                return;
            }

            try {
                const status = (ph === SUPER_ADMIN) ? "approved" : "pending";
                await fs.collection("users").doc(ph).set({
                    name, phone: ph, pin, status, regDate: new Date().toISOString()
                });

                db.admin = { name, phone: ph, pin, status };
                saveDB();
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        // ৩. রিয়েল-টাইম অ্যাপ্রুভাল লিসেনার
        function startApprovalListener(phone) {
            fs.collection("users").doc(phone).onSnapshot((doc) => {
                if (doc.exists()) {
                    const data = doc.data();
                    if (data.status === 'approved' && db.admin.status === 'pending') {
                        db.admin.status = 'approved';
                        saveDB();
                        alert("আপনার একাউন্টটি এপ্রুভ হয়েছে!");
                        location.reload();
                    }
                }
            });
        }

        // ৪. স্মার্ট জেস্টচার (₹ হোল্ড ৩ সেকেন্ড)
        function initSecretGesture() {
            let timer;
            const el = document.getElementById('secretTrigger');
            el.addEventListener('touchstart', () => {
                timer = setTimeout(() => {
                    askPin(() => {
                        db.isSecret = true;
                        document.getElementById('secretBadge').classList.remove('hidden');
                        document.getElementById('secretTrigger').classList.add('text-rose-500');
                        renderAll();
                        setTimeout(exitSecretMode, 5000); // ৫ সেকেন্ড পর অটো এক্সিট
                    });
                }, 3000);
            });
            el.addEventListener('touchend', () => clearTimeout(timer));
        }

        function exitSecretMode() {
            db.isSecret = false;
            document.getElementById('secretBadge').classList.add('hidden');
            document.getElementById('secretTrigger').classList.remove('text-rose-500');
            renderAll();
        }

        // ৫. পিন মডাল ফাংশন
        function askPin(callback) {
            document.getElementById('pinModal').classList.remove('hidden');
            document.getElementById('confirmPin').value = "";
            document.getElementById('pinSubmit').onclick = () => {
                if(document.getElementById('confirmPin').value === db.admin.pin) {
                    document.getElementById('pinModal').classList.add('hidden');
                    callback();
                } else alert("ভুল পিন!");
            };
        }
        function closePinModal() { document.getElementById('pinModal').classList.add('hidden'); }

        // ৬. কাস্টমার ও সাপ্লায়ার লজিক
        function switchTab(t) {
            db.tab = t;
            document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-md' : 'flex-1 py-3 rounded-xl text-xs font-black text-gray-400';
            document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white shadow-md' : 'flex-1 py-3 rounded-xl text-xs font-black text-gray-400';
            renderHome();
        }

        function renderHome() {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            let net = 0;
            const filtered = db.people.filter(p => p.type === db.tab);
            
            filtered.forEach(p => {
                const bal = calcBal(p.transactions, false);
                net += bal;
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-5 rounded-[35px] shadow-sm border border-gray-100 flex justify-between items-center active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center font-black text-xl uppercase">${p.name[0]}</div>
                            <div>
                                <h4 class="font-black text-gray-800">${p.name}</h4>
                                <p class="text-[10px] text-gray-400 font-bold">${p.phone}</p>
                            </div>
                        </div>
                        <h5 class="font-black ${bal < 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${Math.abs(bal).toLocaleString()}</h5>
                    </div>`;
            });
            document.getElementById('mainBalance').innerText = net.toLocaleString();
            if(filtered.length === 0) list.innerHTML = `<p class="text-center text-gray-300 mt-10">No ${db.tab} found.</p>`;
        }

        // ৭. লেনদেন লজিক
        function openLedger(id) {
            db.activeId = id;
            const p = db.people.find(x => x.id === id);
            document.getElementById('lpName').innerText = p.name;
            document.getElementById('lpPhone').innerText = p.phone;
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('ledgerPage').classList.remove('hidden');
            renderLedger();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('txList');
            list.innerHTML = "";

            p.transactions.forEach(t => {
                // পাকা লেজারে কাঁচা হিসাব হাইড থাকবে
                if(!db.isSecret && t.isKaccha) return;

                const isDel = t.status === 'deleted';
                // কাঁচা হিসাবে ১০০ দিয়ে ভাগ করে দেখানো
                const amtShow = t.isKaccha ? (t.amount / 100).toFixed(2) : t.amount.toLocaleString();

                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[30px] border border-gray-100 flex justify-between items-center shadow-sm ${isDel ? 'tx-deleted' : ''} ${t.isKaccha ? 'kaccha-card' : ''}">
                        <div>
                            <p class="text-[9px] font-black text-gray-400 uppercase">${t.date} ${t.isKaccha ? '● Secret' : ''}</p>
                            <h4 class="font-black text-gray-700 uppercase text-xs">${t.type}</h4>
                            <p class="text-[10px] text-gray-400 italic">${t.note || ''}</p>
                        </div>
                        <div class="text-right">
                            <h3 class="text-lg font-black ${t.type==='GIVEN'?'text-rose-500':'text-emerald-600'}">₹ ${amtShow}</h3>
                            <div class="flex gap-4 justify-end mt-2">
                                <button onclick="shareWA('${p.phone}', ${t.amount})" class="text-[8px] font-bold text-indigo-500 uppercase"><i class="fab fa-whatsapp"></i> Share</button>
                                ${!isDel ? `<button onclick="softDelete(${t.id})" class="text-[8px] font-bold text-gray-300 uppercase">Delete</button>` : '<span class="text-[8px] text-gray-300 italic">Deleted</span>'}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function preSave(type) {
            // কাঁচা মোডে অথবা টাকা পাওয়ার সময় পিন লাগবে
            if(db.isSecret || type === 'RECEIVED') {
                askPin(() => commitEntry(type));
            } else {
                commitEntry(type);
            }
        }

        function commitEntry(type) {
            const amt = parseFloat(document.getElementById('txAmt').value);
            if(!amt) return alert("অ্যামাউন্ট দিন");
            const p = db.people.find(x => x.id === db.activeId);
            p.transactions.unshift({
                id: Date.now(), 
                amount: amt, 
                type, 
                isKaccha: db.isSecret,
                date: new Date().toLocaleDateString('bn-BD'),
                note: document.getElementById('txNote').value, 
                status: 'active'
            });
            saveDB(); renderLedger();
            document.getElementById('txAmt').value = ""; document.getElementById('txNote').value = "";
        }

        // ৮. সুপার অ্যাডমিন ড্যাশবোর্ড
        window.openAdminDashboard = async function() {
            if(db.admin.phone !== SUPER_ADMIN) return;
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 bg-white z-[1000] p-6 overflow-y-auto";
            modal.innerHTML = `
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-2xl font-black italic">Approve Users</h2>
                    <i class="fas fa-times text-2xl text-gray-400" onclick="this.closest('div.fixed').remove()"></i>
                </div>
                <div id="uList" class="space-y-4">Loading...</div>
            `;
            document.body.appendChild(modal);

            const snap = await fs.collection("users").get();
            const cont = document.getElementById('uList');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                if(u.phone === SUPER_ADMIN) return;
                cont.innerHTML += `
                    <div class="p-5 bg-gray-50 rounded-[30px] border flex justify-between items-center">
                        <div>
                            <p class="font-black text-gray-800">${u.name}</p>
                            <p class="text-xs text-gray-400">${u.phone}</p>
                            <span class="text-[9px] font-black uppercase ${u.status==='approved'?'text-green-500':'text-amber-500'}">${u.status}</span>
                        </div>
                        ${u.status === 'pending' ? `<button onclick="approveUser('${u.phone}')" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-xs font-bold">Approve</button>` : '<i class="fas fa-check-circle text-green-500 text-xl"></i>'}
                    </div>`;
            });
        }

        window.approveUser = async function(ph) {
            await fs.collection("users").doc(ph).update({ status: 'approved' });
            alert("ইউজার এপ্রুভ হয়েছে!");
            document.querySelector('div.fixed.bg-white.z-\\[1000\\]').remove();
            openAdminDashboard();
        }

        // ৯. হেল্পার ফাংশনস
        function softDelete(tid) {
            const p = db.people.find(x => x.id === db.activeId);
            p.transactions.find(t => t.id === tid).status = 'deleted';
            saveDB(); renderLedger();
        }

        function shareWA(ph, amt) {
            const msg = `PayBook Pro: নতুন লেনদেন ₹${amt}. বিস্তারিত দেখতে অ্যাপ চেক করুন।`;
            window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`);
        }

        function calcBal(txs, kaccha) {
            let b = 0;
            txs.filter(t => t.status === 'active' && t.isKaccha === kaccha).forEach(t => b += (t.type === 'RECEIVED' ? t.amount : -t.amount));
            return b;
        }

        function saveDB() { localStorage.setItem('pb_master_v5', JSON.stringify(db)); }
        function goHome() { document.getElementById('ledgerPage').classList.add('hidden'); document.getElementById('homePage').classList.remove('hidden'); renderHome(); }
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function confirmAdd() {
            const n = document.getElementById('pName').value, ph = document.getElementById('pPhone').value;
            if(!n || !ph) return alert("তথ্য দিন");
            db.people.unshift({ id: Date.now(), name: n, phone: ph, type: db.tab, transactions: [] });
            saveDB(); closeAddModal(); renderHome();
            document.getElementById('pName').value = ""; document.getElementById('pPhone').value = "";
        }
        function renderAll() { if(document.getElementById('homePage').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function shareApp() { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro: আমার ব্যবসার ডিজিটাল লেজার। ট্রাই করুন!')}`); }
    </script>
</body>
</html>
