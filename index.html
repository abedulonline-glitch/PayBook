<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Axis Premium Edition</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F4F7F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--axis-grey); color: #333; margin: 0; overflow: hidden; }
        
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        .axis-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .axis-input { @apply w-full p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-[#861F41] transition-all bg-white; }
        
        /* Smart Drawer System */
        #inputDrawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #inputDrawer.open { transform: translateY(0); }

        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
        
        /* Chat Bubble Styles */
        .bubble-left { border-radius: 0 1.5rem 1.5rem 1.5rem; }
        .bubble-right { border-radius: 1.5rem 0 1.5rem 1.5rem; }

        #mainViewport { height: calc(100vh - 80px); overflow-y: auto; }
    </style>
</head>
<body>

    <!-- 1. AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-10 overflow-y-auto">
        <div class="w-full max-w-md text-center">
            <div class="mb-10 text-center">
                <div class="w-20 h-20 axis-gradient rounded-[2rem] mx-auto flex items-center justify-center shadow-2xl mb-4 text-white text-3xl font-black">PB</div>
                <h1 class="text-3xl font-black text-[#861F41]">PayBook<span class="text-slate-300">Pro</span></h1>
            </div>
            <!-- Box: Register -->
            <div id="regBox" class="hidden space-y-4">
                <input type="text" id="regName" placeholder="Business Owner Name" class="axis-input">
                <input type="number" id="regPhone" placeholder="10-Digit Mobile" class="axis-input">
                <input type="password" id="regPin" placeholder="Set 4-Digit PIN" maxlength="4" class="axis-input text-center tracking-[1em]">
                <button onclick="handleRegistration()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold mt-4">OPEN ACCOUNT</button>
            </div>
            <!-- Box: Login -->
            <div id="loginBox" class="hidden space-y-6 text-left">
                <div class="p-5 bg-slate-50 rounded-2xl border-l-8 border-[#861F41]">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Authenticated User</p>
                    <p id="displayPhone" class="text-xl font-black text-[#861F41]"></p>
                </div>
                <input type="password" id="loginPin" placeholder="Enter PIN" maxlength="4" class="axis-input text-center text-4xl tracking-[1em] h-20">
                <button onclick="handleLogin()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold">SECURE LOGIN</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APPLICATION -->
    <div id="appBody" class="hidden min-h-screen">
        
        <!-- Premium Header (Slim) -->
        <header class="axis-gradient text-white p-5 sticky top-0 z-[100] rounded-b-[2rem] shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div id="userIcon" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold border border-white/30 text-xs" onclick="showSettings()">AD</div>
                    <h2 id="ownerName" class="text-sm font-bold">User</h2>
                </div>
                <div class="flex gap-5">
                    <i class="fas fa-file-pdf text-xl opacity-80" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog text-xl opacity-80" onclick="showSettings()"></i>
                </div>
            </div>
            <div class="bg-white/10 p-4 rounded-2xl border border-white/10 flex justify-between items-center">
                <div>
                    <p id="balHeader" class="text-[8px] font-black uppercase tracking-widest text-white/50">Total Balance (Pakka)</p>
                    <div class="flex items-center gap-2">
                        <span id="secretTrigger" class="text-2xl font-black cursor-pointer select-none">₹</span>
                        <h2 id="mainTotal" class="text-3xl font-black">0.00</h2>
                    </div>
                </div>
                <div id="secretBadge" class="hidden bg-white text-[#861F41] px-3 py-1 rounded-full text-[8px] font-black uppercase animate-pulse">Secret Mode</div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div id="mainViewport">
            <!-- Home: Contacts -->
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl shadow-inner mb-6">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-4"></div>
                <button onclick="openAddModal()" class="fixed bottom-6 right-6 w-14 h-14 axis-gradient text-white rounded-2xl shadow-2xl flex items-center justify-center text-xl border-2 border-white"><i class="fas fa-plus"></i></button>
            </div>

            <!-- Ledger: Transactions -->
            <div id="pageLedger" class="hidden p-5">
                <div class="flex items-center gap-4 mb-6" onclick="goHome()">
                    <i class="fas fa-arrow-left text-[#861F41]"></i>
                    <div>
                        <h2 id="lName" class="text-lg font-black text-slate-800">Client</h2>
                        <p id="lPhone" class="text-[10px] text-slate-400 font-bold"></p>
                    </div>
                </div>
                <div id="ledgerList" class="space-y-6 pb-40"></div>
                
                <!-- Floating Action Buttons -->
                <div class="fixed bottom-6 left-5 right-5 flex gap-3 z-[150]">
                    <button onclick="openDrawer('GIVEN')" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-2xl">GIVEN</button>
                    <button onclick="openDrawer('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl">RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. SMART INPUT DRAWER -->
    <div id="inputDrawer" class="fixed inset-0 z-[500] flex flex-col justify-end bg-black/60 hidden">
        <div class="bg-white rounded-t-[3rem] p-8 shadow-2xl">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-8" onclick="closeDrawer()"></div>
            <h3 id="drawerTitle" class="text-center font-black text-xl mb-6 uppercase">NEW ENTRY</h3>
            <div class="flex gap-3 mb-6">
                <input type="number" id="txAmt" placeholder="0.00" class="flex-1 p-5 bg-slate-50 rounded-2xl font-black text-4xl outline-none border-2 focus:border-[#861F41]">
                <label class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center relative border-2 border-dashed border-slate-200">
                    <i class="fas fa-camera text-slate-300 text-2xl"></i>
                    <input type="file" id="txFile" accept="image/*" class="hidden">
                    <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-2xl">
                </label>
            </div>
            <input type="text" id="txNote" placeholder="Notes / Reference..." class="axis-input bg-slate-50 border-none mb-8">
            <div class="flex gap-4">
                <button onclick="closeDrawer()" class="flex-1 py-4 font-bold text-slate-400">CANCEL</button>
                <button id="drawerSaveBtn" class="flex-1 py-4 bg-[#861F41] text-white rounded-xl font-bold">CONFIRM SAVE</button>
            </div>
        </div>
    </div>

    <!-- 4. MODALS (PIN, SETTINGS, ZOOM) -->
    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[1000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl">
            <h3 class="text-xl font-black mb-6 text-[#861F41]">Enter Security PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-4 bg-slate-50 rounded-2xl text-center text-4xl tracking-widest outline-none">
            <button id="pinSubmitBtn" class="w-full py-4 mt-8 bg-[#861F41] text-white rounded-xl font-bold">VERIFY</button>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[600] flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-8">
            <h3 class="text-center font-black mb-6">SECURITY SETTINGS</h3>
            <div class="space-y-3">
                <button onclick="askPin(changePin)" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-bold">Change Login PIN</button>
                <button onclick="transferAcc()" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-bold">Transfer Account</button>
                <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="w-full py-4 text-slate-400 font-bold mt-4">Close</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black/60 z-[400] flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10">
            <h3 class="text-xl font-black mb-6 text-[#861F41]">New Contact</h3>
            <input id="newPName" type="text" placeholder="Name" class="axis-input mb-4">
            <input id="newPPhone" type="number" placeholder="10 Digit Phone" class="axis-input mb-8">
            <div class="flex gap-4">
                <button onclick="document.getElementById('addModal').classList.add('hidden')" class="flex-1 font-bold text-slate-400">EXIT</button>
                <button onclick="confirmAdd()" class="flex-1 py-4 bg-[#861F41] text-white rounded-xl font-bold">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIG & DB ---
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";

        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer, autoExitTimer, currentTxType = "";

        // --- 2. STARTUP ---
        window.onload = () => {
            const data = localStorage.getItem('paybook_pro_v7');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) showLogin(); else showReg();
            } else showReg();
            initGestures();
            document.getElementById('txFile').onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => { document.getElementById('imgPreview').src = ev.target.result; document.getElementById('imgPreview').classList.remove('hidden'); };
                reader.readAsDataURL(e.target.files[0]);
            };
        };

        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('loginBox').classList.remove('hidden'); document.getElementById('displayPhone').innerText = db.admin.phone; loadCloud(); }
        async function loadCloud() {
            const doc = await db_fs.collection("ledgers").doc(db.admin.phone).get();
            if(doc.exists) { db = doc.data(); renderHome(); }
        }
        function saveDB() {
            localStorage.setItem('paybook_pro_v7', JSON.stringify(db));
            if(db.admin) db_fs.collection("ledgers").doc(db.admin.phone).set(db);
        }

        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value;
            if(!n || ph.length !== 10 || p.length < 4) return alert("Invalid Data!");
            db.admin = { name: n, phone: ph, pin: p };
            saveDB(); location.reload();
        }

        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin || document.getElementById('loginPin').value === MASTER_PIN) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                document.getElementById('ownerName').innerText = db.admin.name;
                document.getElementById('userIcon').innerText = db.admin.name.substring(0,2).toUpperCase();
                renderHome();
            } else alert("Wrong PIN!");
        }

        // --- 3. SECRET MODE ---
        function initGestures() {
            const el = document.getElementById('secretTrigger');
            el.onpointerdown = () => {
                holdTimer = setTimeout(() => {
                    askPin(() => {
                        db.secret = true;
                        document.getElementById('secretBadge').classList.remove('hidden');
                        document.getElementById('secretTrigger').classList.add('text-rose-500');
                        document.getElementById('balHeader').innerText = "Total Balance (Secret)";
                        refreshView(); startTimer();
                    });
                }, 2500);
            };
            el.onpointerup = () => clearTimeout(holdTimer);
            document.getElementById('secretBadge').onclick = () => exitSecret();
        }

        function startTimer() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(exitSecret, 10000); }
        function exitSecret() { db.secret = false; document.getElementById('secretBadge').classList.add('hidden'); document.getElementById('secretTrigger').classList.remove('text-rose-500'); document.getElementById('balHeader').innerText = "Total Balance (Pakka)"; refreshView(); }

        // --- 4. CORE LOGIC ---
        function calcBal(txs, isSec) {
            let b = 0;
            txs.filter(t => t.status==='active' && !!t.secret === !!isSec).forEach(t => { b += (t.type==='RECEIVED'?t.amount:-t.amount); });
            return b;
        }

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            let net = 0;
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret); net += bal;
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="axis-card p-6 flex justify-between items-center active:scale-95 transition-all mb-4">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-slate-50 text-[#861F41] rounded-2xl flex items-center justify-center font-black border">${p.name[0]}</div>
                            <div><h4 class="font-black text-slate-800">${p.name}</h4><p class="text-[9px] text-slate-400 font-bold">${p.phone}</p></div>
                        </div>
                        <div class="text-right">
                            <h5 class="font-black ${bal > 0 ? 'text-rose-600' : 'text-emerald-600'}">₹${dAmt}</h5>
                            <p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'Due' : 'Advance'}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('mainTotal').innerText = db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN');
            document.getElementById('mainTotal').style.color = net > 0 ? '#e11d48' : '#059669';
        }

        function openLedger(id) {
            db.activeId = id; const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('lPhone').innerText = "+91 " + p.phone;
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            renderLedger();
            if(db.secret) startTimer();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            const net = calcBal(p.transactions, db.secret);
            document.getElementById('mainTotal').innerText = "₹ " + (db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN'));
            document.getElementById('mainTotal').style.color = net > 0 ? '#e11d48' : '#059669';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isG = t.type === 'GIVEN', isDel = t.status === 'deleted';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                let color = (p.type === 'CUSTOMER' ? (isG?'text-rose-600':'text-emerald-600') : (!isG?'text-rose-600':'text-emerald-600'));
                
                list.innerHTML += `
                    <div class="flex flex-col ${isG ? 'items-start pl-2' : 'items-end pr-2'} w-full mb-10 ${isDel ? 'tx-deleted' : ''}">
                        <div class="text-[8px] font-bold text-slate-300 uppercase mb-2">${t.date}</div>
                        <div class="bg-white w-[90%] axis-card p-4 border-t-4 ${isRed(p.type, t.type)?'border-rose-500':'border-emerald-500'}">
                            <img src="${t.imgUrl || 'https://via.placeholder.com/400x250?text=Bill'}" class="w-full h-44 object-cover rounded-2xl mb-4" onclick="window.open(this.src)">
                            <div class="flex justify-between items-center">
                                <h3 class="text-2xl font-black ${color}">₹${dAmt} ${isG?'↑':'↓'}</h3>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">${t.type}</p>
                            </div>
                            <p class="text-[10px] text-slate-500 mt-2 italic">${t.note || 'Ref-AX'+t.id.toString().slice(-4)}</p>
                            <div class="mt-4 flex gap-5 border-t pt-3 items-center">
                                <button onclick="deleteTx(${t.id})" class="text-[8px] font-black text-rose-300 uppercase">Delete</button>
                                <button onclick="editTx(${p.id}, ${t.id})" class="text-[8px] font-black text-[#861F41] uppercase">Edit</button>
                                <button onclick="shareWA(${t.amount},'${t.type}','${p.name}')" class="text-[10px] text-emerald-500 ml-auto"><i class="fab fa-whatsapp"></i></button>
                                ${t.history ? `<i class="fas fa-history text-slate-200" onclick="alert('Old: Rs.'+${t.history[0].amt})"></i>`:''}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function isRed(pType, txType) { return pType==='CUSTOMER' ? txType==='GIVEN' : txType==='RECEIVED'; }

        // --- 5. DRAWER LOGIC ---
        function openDrawer(type) {
            currentTxType = type;
            const d = document.getElementById('inputDrawer');
            d.classList.remove('hidden');
            setTimeout(() => d.classList.add('open'), 10);
            document.getElementById('drawerTitle').innerText = type + " ENTRY";
            document.getElementById('drawerTitle').style.color = (type==='GIVEN'?'#e11d48':'#059669');
            document.getElementById('drawerSaveBtn').onclick = () => preSave(type);
        }
        function closeDrawer() { const d = document.getElementById('inputDrawer'); d.classList.remove('open'); setTimeout(() => d.classList.add('hidden'), 400); }

        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Amt!");
            const saveAct = async () => {
                let imgUrl = ""; const file = document.getElementById('txFile').files[0];
                if(file) {
                    const fd = new FormData(); fd.append('image', file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                    const dat = await res.json(); imgUrl = dat.data.url;
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.unshift({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:new Date().toLocaleDateString('en-GB'), note:document.getElementById('txNote').value, imgUrl, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
                document.getElementById('txAmt').value = ""; document.getElementById('txNote').value = ""; document.getElementById('imgPreview').classList.add('hidden');
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(saveAct); else saveAct();
        }

        // --- 6. UTILS & SETTINGS ---
        function shareWA(amt, type, name) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro Receipt: '+name+'\n'+type+': Rs.'+amt)}`); }
        function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function changePin() { const p = prompt("New 4-Digit PIN:"); if(p && p.length===4) { db.admin.pin = p; saveDB(); alert("Updated!"); } }
        function transferAcc() { const v = prompt("Current Phone:"); if(v===db.admin.phone) { const n = prompt("New 10 Digit Phone:"); if(n && n.length===10) { db.admin.phone = n; saveDB(); location.reload(); } } }

        function askPin(cb) {
            document.getElementById('pinModal').classList.remove('hidden');
            document.getElementById('confirmPinInput').value = "";
            document.getElementById('pinSubmitBtn').onclick = () => {
                const val = document.getElementById('confirmPinInput').value;
                if(val === db.admin.pin || val === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("Wrong!");
            };
        }

        function handleSmartPdfDownload() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const isSec = db.secret;
            if(!document.getElementById('pageLedger').classList.contains('hidden')) {
                const p = db.people.find(x => x.id === db.activeId);
                doc.text(`Official Ledger: ${p.name}`, 14, 20);
                const head = isSec ? [['Date', 'Ref', 'Pakka Rs.', 'Kaccha Rs.']] : [['Date', 'Ref', 'Amount Rs.']];
                const rows = p.transactions.filter(t => t.status === 'active').map(t => {
                    if(!isSec && t.secret) return null;
                    return isSec ? [t.date, t.note||'Ref', t.secret?'-':t.amount, t.secret?t.amount:'-'] : [t.date, t.note||'Ref', t.amount];
                }).filter(x => x);
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} });
                doc.save(`${p.name}.pdf`);
            } else {
                doc.text(`Full Summary`, 14, 20);
                const head = isSec ? [['Name', 'Pakka', 'Kaccha']] : [['Name', 'Balance']];
                const rows = db.people.map(p => {
                    let pb = 0, kb = 0; p.transactions.filter(t => t.status==='active').forEach(t => { let v = (t.type==='RECEIVED'?t.amount:-t.amount); if(t.secret) kb+=v; else pb+=v; });
                    return isSec ? [p.name, pb, kb] : [p.name, pb];
                });
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} });
                doc.save("PayBook_Summary.pdf");
            }
        }

        function switchTab(t) { db.tab = t; document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; renderHome(); }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('pageHome').classList.remove('hidden'); renderHome(); }
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); document.getElementById('newPName').value=""; document.getElementById('newPPhone').value=""; }
        function refreshView() { if(db.activeId && !document.getElementById('pageLedger').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function confirmAdd() { const n = document.getElementById('newPName').value, ph = document.getElementById('newPPhone').value; if(n && ph.length===10) { if(db.people.some(x=>x.phone===ph)) return alert("Exists!"); db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] }); saveDB(); document.getElementById('addModal').classList.add('hidden'); renderHome(); } else alert("Invalid!"); }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function editTx(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); askPin(() => { const n = parseFloat(prompt("Original Amount:", t.amount)); if(!t.history) t.history = []; t.history.push({ amt: t.amount }); t.amount = n; saveDB(); renderLedger(); }); }
    </script>
</body>
</html>
