<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Ultimate Axis Edition</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F1F5F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: white; color: #333; margin: 0; overflow: hidden; }
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        
        header { height: 65px; display: flex; align-items: center; padding: 0 15px; }
        #mainViewport { height: calc(100vh - 135px); overflow-y: auto; padding-bottom: 20px; }

        .bubble { max-width: 85%; position: relative; margin-bottom: 15px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .bubble-left { align-self: flex-start; background: #fff; border-left: 5px solid #10b981; border-radius: 0 1.5rem 1.5rem 1.5rem; }
        .bubble-right { align-self: flex-end; background: #fff; border-right: 5px solid #f43f5e; border-radius: 1.5rem 0 1.5rem 1.5rem; }
        
        .tx-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; }
        .bottom-bar { height: 70px; display: flex; gap: 10px; padding: 10px 15px; background: white; border-top: 1px solid #eee; position: fixed; bottom: 0; width: 100%; z-index: 200; }
        
        #inputDrawer { transform: translateY(100%); transition: transform 0.3s ease-out; z-index: 600; }
        #inputDrawer.open { transform: translateY(0); }
        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-8">
        <div class="w-full max-w-md text-center">
            <div class="w-20 h-20 axis-gradient rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black">PB</div>
            <h1 class="text-3xl font-black text-[#861F41]">PayBook<span class="text-slate-300">Pro</span></h1>
            <div id="regBox" class="hidden mt-8 space-y-4 text-left">
                <input type="text" id="regName" placeholder="Business Owner Name" class="w-full p-4 rounded-xl border-2 outline-none">
                <input type="number" id="regPhone" placeholder="10 Digit Mobile" class="w-full p-4 rounded-xl border-2 outline-none">
                <input type="password" id="regPin" placeholder="4 Digit PIN" maxlength="4" class="w-full p-4 rounded-xl border-2 outline-none text-center">
                <button onclick="handleRegistration()" class="w-full py-4 axis-gradient text-white rounded-xl font-bold mt-4">OPEN ACCOUNT</button>
            </div>
            <div id="loginBox" class="hidden mt-8 space-y-6">
                <p id="displayPhone" class="text-xl font-black text-slate-700"></p>
                <input type="password" id="loginPin" placeholder="Enter PIN" maxlength="4" class="w-full p-5 rounded-2xl bg-slate-100 outline-none text-center text-4xl tracking-widest h-24">
                <button onclick="handleLogin()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold shadow-xl">SECURE LOGIN</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP UI -->
    <div id="appBody" class="hidden min-h-screen flex flex-col">
        <header class="axis-gradient text-white shadow-xl">
            <div id="headerHome" class="flex justify-between items-center w-full">
                <h1 class="text-2xl font-black italic">PayBook</h1>
                <div class="flex gap-6">
                    <i class="fas fa-file-pdf" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-4">
                    <i class="fas fa-arrow-left text-xl" onclick="goHome()"></i>
                    <div><h2 id="lName" class="text-md font-bold leading-none">Client</h2><p id="balLabel" class="text-[8px] opacity-60 uppercase mt-1">Portfolio</p></div>
                </div>
                <div class="flex items-center gap-3">
                    <h2 id="mainTotal" class="font-black text-xl">0.00</h2>
                    <span id="secretTrigger" class="text-2xl font-black opacity-30 select-none">₹</span>
                </div>
            </div>
        </header>

        <div id="mainViewport" class="flex-1 bg-slate-50">
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl border mb-6">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-3"></div>
                <button onclick="openAddModal()" class="fixed bottom-24 right-6 w-16 h-16 axis-gradient text-white rounded-full shadow-2xl flex items-center justify-center text-2xl border-4 border-white"><i class="fas fa-plus"></i></button>
            </div>

            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col"></div>
            </div>
        </div>

        <div id="ledgerFooter" class="hidden bottom-bar">
            <button onclick="openDrawer('GIVEN')" class="flex-1 bg-rose-600 text-white rounded-xl font-bold shadow-lg">↑ GIVEN</button>
            <button onclick="openDrawer('RECEIVED')" class="flex-1 bg-emerald-600 text-white rounded-xl font-bold shadow-lg">↓ RECEIVED</button>
        </div>
    </div>

    <!-- 3. DATA ENTRY DRAWER -->
    <div id="inputDrawer" class="fixed inset-0 bg-black/60 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3rem] p-10 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-10" onclick="closeDrawer()"></div>
            <div class="text-center mb-8">
                <p id="drawerTitle" class="text-[10px] font-black uppercase text-slate-400 mb-2">Transaction Amount</p>
                <input type="number" id="txAmt" placeholder="0.00" class="text-5xl font-black text-[#861F41] bg-transparent outline-none w-full text-center border-b-2 pb-2">
            </div>
            <div class="space-y-4 mb-10">
                <input type="text" id="txNote" placeholder="Add Note (Bill No/Ref)" class="w-full p-4 bg-slate-50 rounded-xl outline-none border">
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border">
                    <p class="text-sm font-bold text-slate-500">Bill Image</p>
                    <div id="imgPrevArea" class="hidden relative"><img id="imgPreview" class="w-12 h-12 rounded object-cover border"><i class="fas fa-times absolute -top-2 -right-2 text-red-500 bg-white rounded-full" onclick="clearImg()"></i></div>
                    <i class="fas fa-camera text-2xl text-slate-300" onclick="openMedia()"></i>
                </div>
            </div>
            <button id="saveBtn" class="w-full py-5 axis-gradient text-white rounded-2xl font-black shadow-xl">CONFIRM TRANSACTION</button>
        </div>
    </div>

    <!-- Media Sheet -->
    <div id="mediaSheet" class="fixed inset-0 bg-black/50 z-[700] hidden flex flex-col justify-end">
        <div class="bg-white p-10 rounded-t-[3rem] flex justify-around shadow-2xl">
            <button onclick="triggerCam()" class="flex flex-col items-center gap-2"><i class="fas fa-camera text-3xl text-[#861F41]"></i><span class="text-xs font-bold">Camera</span></button>
            <button onclick="triggerGal()" class="flex flex-col items-center gap-2"><i class="fas fa-image text-3xl text-[#861F41]"></i><span class="text-xs font-bold">Gallery</span></button>
        </div>
        <input type="file" id="camInp" accept="image/*" capture="camera" class="hidden">
        <input type="file" id="galInp" accept="image/*" class="hidden">
    </div>

    <!-- PIN Modal -->
    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[1000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-12 text-center shadow-2xl">
            <h3 class="font-black text-[#861F41] mb-6 uppercase tracking-widest">Verify PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-4 bg-slate-100 rounded-2xl text-center text-4xl tracking-widest outline-none border-2 mb-8">
            <button id="pinSubmitBtn" class="w-full py-4 axis-gradient text-white rounded-xl font-bold uppercase shadow-xl">Confirm</button>
        </div>
    </div>

    <script>
        // --- 1. DB & CONFIG ---
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";

        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer, autoExitTimer, capturedFile = null;

        // --- 2. STARTUP ---
        window.onload = () => {
            const data = localStorage.getItem('paybook_slim_v11');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) showLogin(); else showReg();
            } else showReg();
            initSecretGesture();
            
            document.getElementById('camInp').onchange = e => handleImg(e.target.files[0]);
            document.getElementById('galInp').onchange = e => handleImg(e.target.files[0]);
        };

        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('loginBox').classList.remove('hidden'); document.getElementById('displayPhone').innerText = "+91 " + db.admin.phone; syncCloud(); }
        async function syncCloud() { const doc = await db_fs.collection("global_ledgers").doc(db.admin.phone).get(); if(doc.exists) { db = doc.data(); renderHome(); } }
        function saveDB() { localStorage.setItem('paybook_slim_v11', JSON.stringify(db)); if(db.admin) db_fs.collection("global_ledgers").doc(db.admin.phone).set(db); }

        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value;
            if(!n || ph.length < 10) return alert("Valid Data!");
            db.admin = { name: n, phone: ph, pin: p };
            saveDB(); location.reload();
        }

        function handleLogin() {
            const pin = document.getElementById('loginPin').value;
            if(pin === db.admin.pin || pin === MASTER_PIN) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("Access Denied!");
        }

        // --- 3. CALCULATION & UI (Fix Isolation) ---
        function calcBal(txs, isSecMode, pType) {
            let b = 0;
            // পাক্কা এবং কাঁচা সম্পূর্ণ আলাদা রাখা হয়েছে (Isolation)
            txs.filter(t => t.status === 'active' && !!t.secret === !!isSecMode).forEach(t => {
                if (pType === 'CUSTOMER') b += (t.type === 'GIVEN' ? t.amount : -t.amount);
                else b += (t.type === 'RECEIVED' ? t.amount : -t.amount);
            });
            return b;
        }

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerMain').classList.remove('hidden');
            document.getElementById('headerLedger').classList.add('hidden');
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret, p.type);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-5 rounded-2xl border flex justify-between items-center active:scale-95 transition-all">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 axis-gradient text-white rounded-full flex items-center justify-center font-bold text-xs">${p.name[0]}</div>
                            <div><h4 class="font-bold text-sm">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase">${p.phone}</p></div>
                        </div>
                        <div class="text-right">
                            <h5 class="font-black text-sm ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5>
                            <p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? (p.type==='CUSTOMER'?'YOU GET':'YOU PAY') : 'ADVANCE'}</p>
                        </div>
                    </div>`;
            });
        }

        function openLedger(id) {
            db.activeId = id; const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('headerMain').classList.add('hidden');
            document.getElementById('headerLedger').classList.remove('hidden');
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            document.getElementById('ledgerFooter').classList.remove('hidden');
            renderLedger();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            const net = calcBal(p.transactions, db.secret, p.type);
            document.getElementById('mainTotal').innerText = "₹" + (db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN'));
            document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isLeft = t.type === 'RECEIVED';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                let isRed = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');

                list.innerHTML += `
                    <div class="flex flex-col ${isLeft ? 'items-start' : 'items-end'} w-full mb-8 ${t.status==='deleted'?'tx-deleted':''}">
                        <div class="text-[8px] font-bold text-slate-300 uppercase mb-2 px-2">${t.date}</div>
                        <div class="bubble ${isLeft ? 'bubble-left' : 'bubble-right'} bg-white">
                            ${t.imgUrl ? `<img src="${t.imgUrl}" class="tx-img" onclick="window.open(this.src)">` : ''}
                            <div class="flex justify-between items-center gap-6">
                                <h3 class="text-lg font-black ${isRed?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3>
                                <p class="text-[8px] font-bold text-slate-300">${t.type}</p>
                            </div>
                            <p class="text-[10px] text-slate-500 mt-2 italic">${t.note || 'Ref: PB-AX'+t.id.toString().slice(-4)}</p>
                            <div class="flex gap-6 mt-4 pt-3 border-t">
                                <i class="fas fa-trash text-rose-200 text-xs" onclick="deleteTx(${t.id})"></i>
                                <i class="fas fa-edit text-indigo-200 text-xs" onclick="editTx(${p.id}, ${t.id})"></i>
                                <i class="fab fa-whatsapp text-emerald-300 text-xs ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i>
                                ${t.history ? `<i class="fas fa-history text-slate-300 text-xs" onclick="showHistory(${p.id}, ${t.id})"></i>`:''}
                            </div>
                        </div>
                    </div>`;
            });
            setTimeout(() => { document.getElementById('mainViewport').scrollTop = list.scrollHeight; }, 100);
        }

        // --- 4. DATA ENTRY & SAVE ---
        function openDrawer(type) { 
            const d = document.getElementById('inputDrawer'); d.classList.remove('hidden'); 
            setTimeout(() => d.classList.add('open'), 10);
            document.getElementById('drawerTitle').style.color = (type==='GIVEN'?'#e11d48':'#059669');
            document.getElementById('saveBtn').onclick = () => preSave(type);
        }
        function closeDrawer() { const d = document.getElementById('inputDrawer'); d.classList.remove('open'); setTimeout(() => d.classList.add('hidden'), 300); clearTxForm(); }

        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Enter Amount!");
            const action = async () => {
                let imgUrl = ""; if(capturedFile) {
                    const fd = new FormData(); fd.append('image', capturedFile);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                    const dat = await res.json(); if(dat.success) imgUrl = dat.data.url;
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:new Date().toLocaleDateString('en-GB'), note:document.getElementById('txNote').value, imgUrl, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
        }

        // --- 5. EDIT & DELETE (Password Protected) ---
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        
        function editTx(pid, tid) {
            const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid);
            askPin(() => {
                const nAmt = parseFloat(prompt("New Original Amount:", t.amount));
                const nNote = prompt("Update Note:", t.note);
                if(!t.history) t.history = []; t.history.push({ amt: t.amount, note: t.note, date: new Date().toLocaleString() });
                t.amount = nAmt; t.note = nNote; saveDB(); renderLedger();
            });
        }

        function showHistory(pid, tid) {
            const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid);
            askPin(() => {
                let hMsg = "Transaction History:\n\n";
                t.history.forEach(h => hMsg += `Date: ${h.date}\nAmount: ₹${h.amt}\nNote: ${h.note}\n-----------\n`);
                alert(hMsg);
            });
        }

        // --- 6. GESTURES & TIMER (30 Seconds) ---
        function initSecretGesture() {
            const el = document.getElementById('secretTrigger');
            el.onpointerdown = () => { holdTimer = setTimeout(() => { askPin(() => { db.secret = true; document.getElementById('secretTrigger').classList.add('text-rose-500'); renderLedger(); startTimer(); }); }, 2500); };
            el.onpointerup = () => clearTimeout(holdTimer);
        }
        function startTimer() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(() => { db.secret = false; document.getElementById('secretTrigger').classList.remove('text-rose-500'); renderLedger(); }, 30000); } // 30s

        // --- 7. UTILS ---
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("Wrong!"); }; }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('ledgerFooter').classList.add('hidden'); document.getElementById('pageHome').classList.remove('hidden'); document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('headerLedger').classList.add('hidden'); renderHome(); }
        function switchTab(t) { db.tab = t; document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; renderHome(); }
        function openAddModal() { const n = prompt("Name:"), ph = prompt("10 Digit Mobile:"); if(n && ph.length===10) { db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] }); saveDB(); renderHome(); } }
        function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function handleImg(f) { if(!f) return; capturedFile = f; document.getElementById('imgPreview').src = URL.createObjectURL(f); document.getElementById('imgPrevArea').classList.remove('hidden'); document.getElementById('mediaSheet').classList.add('hidden'); }
        function openMedia() { document.getElementById('mediaSheet').classList.remove('hidden'); }
        function triggerCam() { document.getElementById('camInp').click(); }
        function triggerGal() { document.getElementById('galInp').click(); }
        function clearImg() { capturedFile = null; document.getElementById('imgPrevArea').classList.add('hidden'); }
        function clearTxForm() { document.getElementById('txAmt').value=""; document.getElementById('txNote').value=""; clearImg(); }
        function shareWA(amt, type, name) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro Receipt: '+name+'\n'+type+': Rs.'+amt)}`); }
        function shareApp() { window.open(`https://wa.me/?text=${encodeURIComponent('Download PayBook Pro: ' + window.location.href)}`); }
        function changePinProcess() { const n = prompt("New 4 Digit PIN:"); if(n && n.length===4) { db.admin.pin = n; saveDB(); alert("PIN Updated!"); } }

        function handleSmartPdfDownload() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const isSec = db.secret;
            if(!document.getElementById('pageLedger').classList.contains('hidden')) {
                const p = db.people.find(x => x.id === db.activeId); doc.text(`Ledger: ${p.name}`, 14, 20);
                const head = isSec ? [['Date', 'Note', 'Pakka', 'Kaccha']] : [['Date', 'Note', 'Amount']];
                const rows = p.transactions.filter(t => t.status === 'active').map(t => { if(!isSec && t.secret) return null; return isSec ? [t.date, t.note, t.secret?'-':t.amount, t.secret?t.amount:'-'] : [t.date, t.note, t.amount]; }).filter(x => x);
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} }); doc.save(`${p.name}_Report.pdf`);
            } else {
                doc.text(`Full Summary`, 14, 20);
                const head = isSec ? [['Name', 'Pakka', 'Kaccha']] : [['Name', 'Balance']];
                const rows = db.people.map(p => { let pb = 0, kb = 0; p.transactions.filter(t => t.status==='active').forEach(t => { let v = (t.type==='RECEIVED'?t.amount:-t.amount); if(t.secret) kb+=v; else pb+=v; }); return isSec ? [p.name, pb, kb] : [p.name, pb]; });
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} }); doc.save("Summary.pdf");
            }
        }
    </script>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10 shadow-2xl">
            <h3 class="text-xl font-black mb-8 text-[#861F41]">SECURITY CENTER</h3>
            <button onclick="askPin(changePinProcess)" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-bold mb-3 flex justify-between">Change Security PIN <i class="fas fa-key text-slate-300"></i></button>
            <button onclick="shareApp()" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-bold text-emerald-600 mb-8 flex justify-between">Share App with Friends <i class="fas fa-share-nodes"></i></button>
            <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="axis-gradient text-white w-full py-4 rounded-xl font-bold">CLOSE</button>
        </div>
    </div>
</body>
</html>
