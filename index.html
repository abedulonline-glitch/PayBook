<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayBook - Pro Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans pb-20">

    <!-- 1. Admin Registration Overlay -->
    <div id="regOverlay" class="hidden fixed inset-0 bg-indigo-900 z-[100] flex flex-col items-center justify-center p-8 text-white">
        <h1 class="text-4xl font-black mb-2 italic">PayBook</h1>
        <p class="text-indigo-200 mb-8 text-center uppercase tracking-widest text-xs">Admin Registration</p>
        <input type="number" id="adminPhone" placeholder="আপনার মোবাইল নম্বর দিন" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-xl outline-none mb-4">
        <button onclick="registerAdmin()" class="w-full bg-white text-indigo-900 py-4 rounded-2xl font-black shadow-2xl">REGISTER & START</button>
        <p class="mt-6 text-[10px] opacity-50 text-center">একবার রেজিস্টার হলে নম্বরটি পরিবর্তন করা কঠিন। এটি আপনার ইউনিক আইডি।</p>
    </div>

    <!-- 2. Main App Header -->
    <div id="mainApp" class="hidden">
        <header class="bg-indigo-800 text-white p-5 sticky top-0 z-50 shadow-lg">
            <div class="flex justify-between items-center">
                <div onclick="goHome()" class="cursor-pointer">
                    <h1 class="text-2xl font-black italic">PayBook</h1>
                    <p id="headerSub" class="text-[10px] opacity-70">Contacts List</p>
                </div>
                <div class="flex gap-4 items-center">
                    <i class="fas fa-file-invoice-dollar text-xl" onclick="showReport()"></i>
                    <div id="adminAvatar" class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-xs font-bold border border-white/30">A</div>
                </div>
            </div>
        </header>

        <!-- 3. Home Page: Contacts -->
        <div id="pageHome" class="p-4">
            <div class="flex gap-2 mb-4 bg-white p-1 rounded-xl shadow-inner">
                <button onclick="filterType('CUSTOMER')" id="btnCust" class="flex-1 py-2 rounded-lg text-xs font-black transition-all bg-indigo-600 text-white">CUSTOMERS</button>
                <button onclick="filterType('SUPPLIER')" id="btnSupp" class="flex-1 py-2 rounded-lg text-xs font-black transition-all text-slate-400">SUPPLIERS</button>
            </div>
            <div id="contactList" class="space-y-3">
                <!-- Contacts will load here -->
            </div>
            <!-- Floating Add Person Button -->
            <button onclick="openAddModal()" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl transition-transform active:scale-90">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- 4. Ledger Page: Individual Transactions -->
        <div id="pageLedger" class="hidden p-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 flex justify-between items-end border-b-4 border-indigo-500">
                <div>
                    <h2 id="activeName" class="text-xl font-black text-slate-800">Customer Name</h2>
                    <p id="activePhone" class="text-xs text-slate-400">9876543210</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] uppercase font-bold text-slate-400">Total Net (Pakka)</p>
                    <h3 id="activeBalance" class="text-xl font-black text-emerald-600">₹ 0.00</h3>
                </div>
            </div>

            <div id="txList" class="space-y-3 pb-40">
                <!-- Transactions load here -->
            </div>

            <!-- Transaction Form (Fixed at bottom) -->
            <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                <div class="flex gap-2 mb-3">
                    <input type="number" id="txAmount" placeholder="Amount (₹)" class="flex-1 p-3 bg-slate-100 rounded-xl font-bold outline-none focus:ring-2 ring-indigo-500">
                    <input type="date" id="txDate" class="p-3 bg-slate-100 rounded-xl text-xs">
                    <div class="flex items-center px-3 bg-slate-100 rounded-xl">
                        <input type="checkbox" id="isKaccha" class="w-4 h-4 accent-indigo-600">
                        <span class="text-[10px] font-bold ml-1">K?</span>
                    </div>
                </div>
                <input type="text" id="txNote" placeholder="কি বাবদ? (Note)" class="w-full p-3 bg-slate-100 rounded-xl text-sm mb-3 outline-none">
                <div class="flex gap-2">
                    <button onclick="saveTx('GIVEN')" class="flex-1 py-3 bg-rose-500 text-white rounded-xl font-black shadow-lg shadow-rose-200">GIVEN</button>
                    <button onclick="saveTx('RECEIVED')" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-black shadow-lg shadow-emerald-200">RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 5. Modals (Add Person & Report) -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end">
        <div class="w-full bg-white rounded-t-3xl p-6 animate-slide-up">
            <h3 id="addTitle" class="text-xl font-black mb-4">Add New Contact</h3>
            <input id="pName" type="text" placeholder="নাম" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <input id="pPhone" type="number" placeholder="মোবাইল (Unique)" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none">
            <div class="flex gap-2">
                <button onclick="closeAddModal()" class="flex-1 py-4 text-slate-400 font-bold">CANCEL</button>
                <button onclick="confirmAddPerson()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black">CONFIRM</button>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="hidden fixed inset-0 bg-white z-[110] p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic">Business Report</h2>
            <i class="fas fa-times text-2xl" onclick="closeReport()"></i>
        </div>
        <div id="reportContent" class="space-y-4">
            <!-- Table Side-by-Side Pakka/Kaccha -->
        </div>
    </div>

    <style>
        .tx-deleted { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); pointer-events: none; }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
    </style>

    <script>
        // CORE LOGIC
        const SECRET_PIN = "5555";
        let db = { admin: null, people: [], filter: 'CUSTOMER', activePerson: null };

        // 1. App Startup
        window.onload = () => {
            const savedData = localStorage.getItem('paybook_pro_db');
            if(savedData) {
                db = JSON.parse(savedData);
                if(db.admin) {
                    document.getElementById('mainApp').classList.remove('hidden');
                    renderHome();
                } else { document.getElementById('regOverlay').classList.remove('hidden'); }
            } else { document.getElementById('regOverlay').classList.remove('hidden'); }
        };

        function registerAdmin() {
            const phone = document.getElementById('adminPhone').value;
            if(phone.length < 10) return alert("সঠিক নম্বর দিন");
            db.admin = { phone: phone, regDate: new Date().toLocaleDateString() };
            saveDB();
            location.reload();
        }

        // 2. Home Page (Contact List)
        function filterType(type) {
            db.filter = type;
            document.getElementById('btnCust').className = type==='CUSTOMER' ? 'flex-1 py-2 rounded-lg text-xs font-black bg-indigo-600 text-white' : 'flex-1 py-2 rounded-lg text-xs font-black text-slate-400';
            document.getElementById('btnSupp').className = type==='SUPPLIER' ? 'flex-1 py-2 rounded-lg text-xs font-black bg-indigo-600 text-white' : 'flex-1 py-2 rounded-lg text-xs font-black text-slate-400';
            renderHome();
        }

        function renderHome() {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            const filtered = db.people.filter(p => p.type === db.filter);
            
            filtered.forEach(p => {
                let bal = calcBalance(p.transactions);
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-black">${p.name[0]}</div>
                            <div>
                                <h4 class="font-black text-slate-800">${p.name}</h4>
                                <p class="text-[10px] text-slate-400 uppercase font-bold">Last Update: ${new Date().toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-sm ${bal < 0 ? 'text-rose-500' : 'text-emerald-600'}">₹ ${Math.abs(bal).toLocaleString()}</p>
                            <p class="text-[8px] text-slate-400 uppercase font-bold">${bal < 0 ? 'You Give' : 'You Get'}</p>
                        </div>
                    </div>
                `;
            });
            if(filtered.length === 0) list.innerHTML = `<p class="text-center text-slate-400 mt-10">No ${db.filter} Found</p>`;
        }

        // 3. Ledger Logic
        function openLedger(id) {
            db.activePerson = id;
            const person = db.people.find(p => p.id === id);
            document.getElementById('activeName').innerText = person.name;
            document.getElementById('activePhone').innerText = person.phone;
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            document.getElementById('headerSub').innerText = "Personal Ledger";
            renderLedger();
        }

        function renderLedger() {
            const person = db.people.find(p => p.id === db.activePerson);
            const list = document.getElementById('txList');
            list.innerHTML = "";
            let bal = calcBalance(person.transactions);
            document.getElementById('activeBalance').innerText = "₹ " + bal.toLocaleString();

            person.transactions.forEach(t => {
                const isD = t.status === 'deleted';
                const showAmt = t.isKaccha ? (t.amount/100).toFixed(2) : t.amount.toLocaleString();
                
                list.innerHTML += `
                    <div class="p-4 bg-white rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center relative ${isD ? 'tx-deleted' : ''}"
                         oncontextmenu="event.preventDefault(); showReal(${t.id}, ${t.amount})">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-xs text-slate-400 italic">IMG</div>
                            <div>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">${t.date}</p>
                                <p class="text-sm font-black text-slate-700">${t.type}</p>
                                <p class="text-[10px] text-slate-500 italic">${t.note || ''}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h3 id="tx-${t.id}" class="text-lg font-black ${t.type==='GIVEN'?'text-rose-500':'text-emerald-600'}">₹ ${showAmt}</h3>
                            <div class="flex gap-2 justify-end mt-1">
                                ${!isD ? `<button onclick="delTx(${t.id})" class="text-[8px] text-rose-300 font-bold uppercase tracking-widest">Delete</button>` : ''}
                                <button onclick="shareWA(${t.amount}, '${t.type}')" class="text-[8px] text-indigo-400 font-bold uppercase tracking-widest"><i class="fab fa-whatsapp"></i> Share</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function saveTx(type) {
            const amt = parseFloat(document.getElementById('txAmount').value);
            if(!amt) return alert("অ্যামাউন্ট দিন");
            const person = db.people.find(p => p.id === db.activePerson);
            const tx = {
                id: Date.now(),
                amount: amt,
                type: type,
                date: document.getElementById('txDate').value || new Date().toISOString().split('T')[0],
                isKaccha: document.getElementById('isKaccha').checked,
                note: document.getElementById('txNote').value,
                status: 'active'
            };
            person.transactions.unshift(tx);
            saveDB();
            renderLedger();
            // Reset
            document.getElementById('txAmount').value = "";
            document.getElementById('txNote').value = "";
        }

        // 4. Secret Features
        function showReal(id, real) {
            if(prompt("সিক্রেট পিন দিন:") === SECRET_PIN) {
                const el = document.getElementById(`tx-${id}`);
                el.innerText = "₹ " + real.toLocaleString();
                el.classList.add("text-blue-600");
                setTimeout(() => renderLedger(), 8000);
            }
        }

        function delTx(id) {
            if(confirm("এটি বাতিল করতে চান? এডিট করা যাবে না।")) {
                const person = db.people.find(p => p.id === db.activePerson);
                const tx = person.transactions.find(t => t.id === id);
                tx.status = 'deleted';
                saveDB();
                renderLedger();
            }
        }

        function shareWA(amt, type) {
            const msg = `PayBook Update: ${type} Amount: ₹${amt}. Total Real Ledger.`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        // 5. Reports (Side by Side)
        function showReport() {
            document.getElementById('reportModal').classList.remove('hidden');
            const content = document.getElementById('reportContent');
            content.innerHTML = `
                <div class="grid grid-cols-3 bg-slate-100 p-4 rounded-xl font-black text-[10px] uppercase tracking-tighter text-slate-500">
                    <span>Contact Name</span>
                    <span class="text-right">Pakka View</span>
                    <span class="text-right">Kaccha View</span>
                </div>
            `;
            db.people.forEach(p => {
                let pakka = 0, kaccha = 0;
                p.transactions.forEach(t => {
                    if(t.status === 'active') {
                        let val = (t.type === 'RECEIVED' ? t.amount : -t.amount);
                        if(t.isKaccha) kaccha += (val/100); else pakka += val;
                    }
                });
                content.innerHTML += `
                    <div class="grid grid-cols-3 p-4 border-b border-slate-100 items-center">
                        <span class="font-bold text-slate-700 text-xs">${p.name}</span>
                        <span class="text-right font-black text-sm text-emerald-600">₹${pakka.toLocaleString()}</span>
                        <span class="text-right font-black text-sm text-rose-400 italic">₹${kaccha.toFixed(2)}</span>
                    </div>
                `;
            });
        }

        // Helpers
        function calcBalance(txs) {
            let b = 0;
            txs.forEach(t => { if(t.status === 'active' && !t.isKaccha) b += (t.type === 'RECEIVED' ? t.amount : -t.amount); });
            return b;
        }

        function saveDB() { localStorage.setItem('paybook_pro_db', JSON.stringify(db)); }
        function goHome() { 
            document.getElementById('pageLedger').classList.add('hidden'); 
            document.getElementById('pageHome').classList.remove('hidden'); 
            document.getElementById('headerSub').innerText = "Contacts List";
            renderHome();
        }
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); document.getElementById('addTitle').innerText = "Add " + db.filter; }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function closeReport() { document.getElementById('reportModal').classList.add('hidden'); }
        
        function confirmAddPerson() {
            const name = document.getElementById('pName').value;
            const phone = document.getElementById('pPhone').value;
            if(!name || !phone) return alert("সব তথ্য দিন");
            db.people.unshift({ id: Date.now(), name, phone, type: db.filter, transactions: [] });
            saveDB();
            closeAddModal();
            renderHome();
            document.getElementById('pName').value = ""; document.getElementById('pPhone').value = "";
        }
    </script>
</body>
</html>
