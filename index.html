<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Axis Premium Edition</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F4F7F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--axis-grey); color: #333; margin: 0; overflow: hidden; user-select: none; }
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        .axis-input { @apply w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#861F41] bg-white text-slate-700; }
        
        /* Premium Bubbles */
        .bubble { max-width: 85%; padding: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); background: white; border-radius: 1.2rem; border: 1px solid #eee; }
        .bubble-left { align-self: flex-start; border-left: 5px solid #861F41; border-top-left-radius: 0; }
        .bubble-right { align-self: flex-end; border-right: 5px solid #10b981; border-top-right-radius: 0; }

        #entryDrawer { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        #entryDrawer.open { transform: translateY(0); }
        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
        #mainViewport { height: calc(100vh - 65px); overflow-y: auto; scroll-behavior: smooth; }
        
        .blink-secret { animation: blinker 1s linear infinite; color: #ff4d4d !important; font-weight: 900; }
        @keyframes blinker { 50% { opacity: 0.2; } }
        .pin-field { height: 55px !important; font-size: 1.8rem !important; letter-spacing: 1.2rem !important; }
    </style>
</head>
<body>

    <!-- 1. AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 z-[5000] bg-white flex flex-col items-center justify-center p-6 overflow-y-auto">
        <div class="w-full max-w-md bg-white p-8 rounded-[3.5rem] shadow-2xl border">
            <div class="text-center mb-10">
                <div class="w-20 h-20 axis-gradient rounded-3xl mx-auto flex items-center justify-center text-white text-3xl font-black mb-4 shadow-xl">PB</div>
                <h1 class="text-3xl font-black text-[#861F41]">PayBook<span class="text-slate-300">Pro</span></h1>
            </div>

            <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-8 border shadow-inner">
                <button onclick="toggleAuth('LOGIN')" id="tabLogin" class="flex-1 py-3 rounded-xl text-xs font-black bg-[#861F41] text-white shadow-md transition-all">LOGIN</button>
                <button onclick="toggleAuth('REG')" id="tabReg" class="flex-1 py-3 rounded-xl text-xs font-black text-slate-400">REGISTER</button>
            </div>

            <div id="authFormArea">
                <div id="loginBox" class="space-y-6">
                    <input type="number" id="loginPhone" placeholder="Mobile Number" class="axis-input">
                    <input type="password" id="loginPin" placeholder="PIN" maxlength="4" class="axis-input text-center pin-field shadow-inner border-2">
                    <button onclick="handleLogin()" class="w-full py-4 bg-[#861F41] text-white rounded-2xl font-black shadow-2xl uppercase tracking-widest">Login</button>
                </div>
                <div id="regBox" class="hidden space-y-4">
                    <input type="text" id="regName" placeholder="Owner Name" class="axis-input">
                    <input type="number" id="regPhone" placeholder="10-Digit Mobile" class="axis-input">
                    <input type="password" id="regPin" placeholder="Set 4-Digit PIN" maxlength="4" class="axis-input text-center pin-field">
                    <button onclick="handleRegistration()" class="w-full py-4 axis-gradient text-white rounded-xl font-bold mt-4 shadow-xl uppercase">Create Profile</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP UI -->
    <div id="appBody" class="hidden min-h-screen">
        <header class="axis-gradient text-white sticky top-0 z-[100] h-[65px] px-5 flex items-center justify-between shadow-lg">
            <div id="headerMain" class="flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <div id="userInitials" class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-[10px] font-bold border border-white/20">AD</div>
                    <h1 class="text-xl font-black italic">PayBook</h1>
                </div>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-share-nodes opacity-80" onclick="shareApp()"></i>
                    <i class="fas fa-file-pdf opacity-80" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog opacity-80" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-4">
                    <i class="fas fa-arrow-left" onclick="goHome()"></i>
                    <div><h2 id="lName" class="text-sm font-bold leading-none">Client</h2><p id="balTypeLabel" class="text-[8px] opacity-60 uppercase mt-1">Portfolio</p></div>
                </div>
                <div class="flex items-center gap-3">
                    <i class="fas fa-file-pdf opacity-80 mr-2" onclick="askPin(handleSmartPdfDownload)"></i>
                    <span id="mainTotal" class="font-black text-lg">0.00</span>
                    <span id="secretTrigger" class="text-2xl font-black opacity-30 select-none">₹</span>
                </div>
            </div>
        </header>

        <div id="mainViewport" class="bg-slate-50">
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl border mb-6 shadow-sm">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-3"></div>
                <button onclick="openAddModal()" class="fixed bottom-10 right-6 w-16 h-16 axis-gradient text-white rounded-full shadow-2xl flex items-center justify-center text-2xl border-4 border-white"><i class="fas fa-plus"></i></button>
            </div>
            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col"></div>
                <div class="fixed bottom-8 left-5 right-5 flex gap-3 z-[150]">
                    <button onclick="triggerDrawer('GIVEN')" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-2xl">↑ GIVEN</button>
                    <button onclick="triggerDrawer('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl">↓ RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. DATA ENTRY DRAWER -->
    <div id="entryDrawer" class="fixed inset-0 bg-black/60 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3rem] p-10 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-10" onclick="closeDrawer()"></div>
            <div class="text-center mb-8">
                <p id="drawerActionType" class="text-[10px] font-black text-slate-400 uppercase">Amount</p>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <span class="text-4xl font-black text-slate-300">₹</span>
                    <input type="number" id="txAmt" placeholder="0.00" class="text-5xl font-black text-[#861F41] bg-transparent outline-none w-2/3 text-center border-b-2">
                </div>
            </div>
            <div class="space-y-4 mb-10">
                <input type="text" id="txNote" placeholder="Notes" class="axis-input bg-slate-50 border-none">
                <input type="date" id="txDate" class="axis-input bg-slate-50 border-none">
                <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between border">
                    <p class="text-sm font-bold text-slate-500">Attachment</p>
                    <div id="billPreviewArea" class="hidden relative"><img id="imgPreview" class="w-12 h-12 rounded object-cover"><i class="fas fa-times absolute -top-1 -right-1 text-red-500 bg-white rounded-full text-[10px]" onclick="clearImage()"></i></div>
                    <i class="fas fa-camera text-2xl text-slate-300" onclick="openMediaSelector()"></i>
                </div>
            </div>
            <button id="mainConfirmBtn" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-xl uppercase">Confirm</button>
        </div>
    </div>

    <!-- 4. MODALS -->
    <div id="mediaSheet" class="fixed inset-0 bg-black/60 hidden z-[2500]">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] p-10 flex justify-around shadow-2xl">
            <button onclick="triggerCamera()" class="flex flex-col items-center gap-3"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-2xl shadow-inner"><i class="fas fa-camera"></i></div><span class="text-xs font-bold uppercase">Camera</span></button>
            <button onclick="triggerGallery()" class="flex flex-col items-center gap-3"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-2xl shadow-inner"><i class="fas fa-image"></i></div><span class="text-xs font-bold uppercase">Gallery</span></button>
        </div>
        <input type="file" id="camInp" accept="image/*" capture="camera" class="hidden">
        <input type="file" id="galInp" accept="image/*" class="hidden">
    </div>

    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[4000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl">
            <h3 class="text-xl font-black mb-10 text-[#861F41] uppercase tracking-widest">Secure Access PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="axis-input text-center text-4xl tracking-widest h-14 mb-8">
            <button id="pinSubmitBtn" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold uppercase">Verify</button>
        </div>
    </div>

    <div id="addModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[3.5rem] p-10 shadow-2xl">
            <h3 class="text-xl font-black text-[#861F41] mb-6 text-center uppercase">Add New Account</h3>
            <input id="newPName" type="text" placeholder="Full Name" class="axis-input mb-4">
            <input id="newPPhone" type="number" placeholder="10-Digit Phone" class="axis-input mb-8">
            <div class="flex gap-4">
                <button onclick="closeAddModal()" class="flex-1 font-bold text-slate-400 uppercase">Exit</button>
                <button onclick="confirmAdd()" class="flex-1 py-4 bg-[#861F41] text-white rounded-xl font-bold">SAVE</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-10 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-black text-[#861F41] mb-8 text-center uppercase">Management Center</h3>
            <div id="adminControls" class="space-y-3">
                <button onclick="hireManager()" class="w-full p-5 bg-slate-50 rounded-2xl flex justify-between font-bold italic">Hire Entry Manager <i class="fas fa-user-plus"></i></button>
                <div id="mgrList" class="space-y-2 mb-3"></div>
                <button onclick="askPin(changePin)" class="w-full p-5 bg-slate-50 rounded-2xl flex justify-between font-bold">Change Admin PIN <i class="fas fa-key"></i></button>
                <button onclick="transferAcc()" class="w-full p-5 bg-slate-50 rounded-2xl flex justify-between font-bold">Transfer Number <i class="fas fa-exchange-alt"></i></button>
                <button onclick="factoryReset()" class="w-full py-4 text-rose-500 font-bold border-2 border-rose-100 rounded-2xl bg-rose-50 text-[10px] uppercase"><i class="fas fa-trash-arrow-up"></i> Factory Reset</button>
            </div>
            <button onclick="logout()" class="w-full py-5 bg-rose-600 text-white rounded-2xl font-black mb-8 border shadow-xl uppercase"><i class="fas fa-power-off"></i> Secure Logout</button>
            <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="axis-gradient text-white w-full py-4 rounded-xl font-bold uppercase">Back</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";
        const VERSION = "1.4";
        const DB_KEY = 'PAYBOOK_AXIS_V1.4';

        let db = { admin: null, people: [], managers: [], secret: false, tab: 'CUSTOMER', activeId: null, role: 'ADMIN', opName: '' };
        let holdTimer, autoExitTimer, capturedFile = null;

        window.onload = () => {
            const data = localStorage.getItem(DB_KEY);
            if(data) {
                db = JSON.parse(data);
                db.secret = false; 
                if(db.admin) toggleAuth('LOGIN'); else toggleAuth('REG');
            } else toggleAuth('REG');
            initSecretGesture();
            initHistoryState();
            document.getElementById('camInp').onchange = e => handleImg(e.target.files[0]);
            document.getElementById('galInp').onchange = e => handleImg(e.target.files[0]);
        };

        // --- AUTH & CLOUD ---
        function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); if(db.admin) db_fs.collection("global_ledgers").doc(db.admin.phone).set(db); }
        async function sync() { if(db.admin) { const doc = await db_fs.collection("global_ledgers").doc(db.admin.phone).get(); if(doc.exists) { db = doc.data(); renderHome(); } } }
        function toggleAuth(m) { const l = document.getElementById('loginBox'), r = document.getElementById('regBox'), tL = document.getElementById('tabLogin'), tR = document.getElementById('tabReg'); if(m==='LOGIN') { l.classList.remove('hidden'); r.classList.add('hidden'); tL.className="flex-1 py-3 rounded-xl text-xs font-black bg-[#861F41] text-white shadow-md"; tR.className="flex-1 py-3 rounded-xl text-xs font-black text-slate-400"; } else { r.classList.remove('hidden'); l.classList.add('hidden'); tR.className="flex-1 py-3 rounded-xl text-xs font-black bg-[#861F41] text-white shadow-md"; tL.className="flex-1 py-3 rounded-xl text-xs font-black text-slate-400"; } }

        async function handleLogin() {
            const ph = document.getElementById('loginPhone').value, pin = document.getElementById('loginPin').value;
            if(ph.length !== 10) return alert("10-digit Phone!");
            const doc = await db_fs.collection("global_ledgers").doc(ph).get();
            if (doc.exists) {
                const cloud = doc.data();
                if(pin === cloud.admin.pin || pin === MASTER_PIN) { db = cloud; db.role='ADMIN'; db.opName=db.admin.name; enterApp(); }
                else { const mgr = (cloud.managers || []).find(m => m.pin === pin); if(mgr) { db = cloud; db.role='MANAGER'; db.opName=mgr.name; enterApp(); } else alert("PIN Incorrect!"); }
            } else { toggleAuth('REG'); document.getElementById('regPhone').value = ph; }
        }
        function handleRegistration() { const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value; if(!n || ph.length !== 10) return alert("Data Invalid!"); db.admin = { name: n, phone: ph, pin: p }; saveDB(); location.reload(); }
        function enterApp() { document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appBody').classList.remove('hidden'); document.getElementById('userInitials').innerText = db.admin.name.substring(0,2).toUpperCase(); renderHome(); }
        function logout() { if(confirm("Securely Logout?")) location.reload(); }

        // --- CORE UI ---
        function confirmAdd() {
            const n = document.getElementById('newPName').value, ph = document.getElementById('newPPhone').value;
            if(!n || ph.length !== 10) return alert("Enter Name & Phone!");
            if(db.people.some(x => x.phone === ph)) return alert("Already exists!");
            db.people.unshift({ id: Date.now(), name: n, phone: ph, type: db.tab, transactions: [] });
            saveDB(); document.getElementById('addModal').classList.add('hidden'); renderHome();
        }

        function calcBal(txs, isSec, pType) {
            let b = 0;
            txs.filter(t => t.status==='active' && !!t.secret === !!isSec).forEach(t => {
                if (pType === 'CUSTOMER') b += (t.type==='GIVEN' ? t.amount : -t.amount);
                else b += (t.type==='RECEIVED' ? t.amount : -t.amount);
            });
            return b;
        }

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('headerLedger').classList.add('hidden');
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret, p.type);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `<div onclick="openLedger(${p.id})" class="axis-card p-5 flex justify-between items-center active:scale-95 transition-all">
                    <div class="flex items-center gap-3"><div class="w-10 h-10 axis-gradient text-white rounded-full flex items-center justify-center font-bold text-xs">${p.name[0]}</div>
                    <div><h4 class="font-bold text-sm">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase">${p.phone}</p></div></div>
                    <div class="text-right"><h5 class="font-black text-sm ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5><p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'GET' : 'CLEAR'}</p></div></div>`;
            });
        }

        function openLedger(id) { db.activeId = id; const p = db.people.find(x => x.id === id); document.getElementById('lName').innerText = p.name; document.getElementById('headerMain').classList.add('hidden'); document.getElementById('headerLedger').classList.remove('hidden'); document.getElementById('pageHome').classList.add('hidden'); document.getElementById('pageLedger').classList.remove('hidden'); renderLedger(); }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('headerLedger').classList.add('hidden'); document.getElementById('headerMain').classList.remove('hidden'); document.getElementById('pageHome').classList.remove('hidden'); renderHome(); }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            const net = calcBal(p.transactions, db.secret, p.type);
            document.getElementById('mainTotal').innerText = "₹" + (db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN'));
            document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isR = t.type === 'RECEIVED', isDel = t.status === 'deleted';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                let isRed = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');
                list.innerHTML += `<div class="flex flex-col ${isR ? 'items-end' : 'items-start'} w-full mb-8 ${isDel ? 'tx-deleted' : ''}">
                    <div class="bubble ${isR ? 'bubble-right' : 'bubble-left'}">
                        ${t.imgUrl ? `<img src="${t.imgUrl}" class="w-full h-44 object-cover rounded-xl mb-3" onclick="window.open(this.src)">` : ''}
                        <div class="flex justify-between items-center gap-6"><h3 class="text-xl font-black ${isRed?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3><p class="text-[8px] font-bold text-slate-300 uppercase">${t.type}</p></div>
                        <p class="text-[10px] text-slate-500 italic mt-1 font-medium">${t.note || ''}</p>
                        <p class="text-[7px] text-slate-300 mt-2 uppercase font-black tracking-tighter border-t pt-1 border-slate-50">By: ${t.by || 'Owner'} | ${t.date}</p>
                        <div class="flex gap-5 mt-4 pt-2 border-t border-slate-50"><i class="fas fa-edit text-indigo-300 text-xs" onclick="editTx(${p.id}, ${t.id})"></i><i class="fas fa-trash text-rose-200 text-xs" onclick="deleteTx(${t.id})"></i><i class="fab fa-whatsapp text-emerald-300 text-xs ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i></div>
                    </div></div>`;
            });
            document.getElementById('mainViewport').scrollTop = list.scrollHeight;
        }

        // --- HELPERS ---
        async function preSave(t) {
            const amt = parseFloat(document.getElementById('txAmt').value); if(!amt) return alert("Amount!");
            const act = async () => {
                document.getElementById('mainConfirmBtn').innerText = "AUTHORIZING..."; let imgUrl = "";
                if(capturedFile) { const fd = new FormData(); fd.append('image', capturedFile); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd }); const dat = await res.json(); if(dat.success) imgUrl = dat.data.url; }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type:t, secret:!!db.secret, date:new Date().toLocaleDateString('en-GB'), note:document.getElementById('txNote').value, imgUrl, by: db.opName, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
            };
            if(db.secret && db.tab === 'CUSTOMER' && t === 'RECEIVED') askPin(act); else act();
        }
        function initSecretGesture() { const el = document.getElementById('secretTrigger'); el.onclick = () => { if(db.secret) exitSecret(); }; el.onpointerdown = () => { if(!db.secret) holdTimer = setTimeout(() => { askPin(() => { db.secret=true; el.classList.add('blink-secret'); renderAll(); startTimer(); }); }, 2500); }; el.onpointerup = () => clearTimeout(holdTimer); }
        function startTimer() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(exitSecret, 60000); }
        function exitSecret() { db.secret = false; document.getElementById('secretTrigger').classList.remove('blink-secret'); renderAll(); }
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("Wrong PIN!"); }; }
        function initHistoryState() { history.pushState(null, null, window.location.pathname); window.addEventListener('popstate', () => { if(!document.getElementById('pageLedger').classList.contains('hidden')) goHome(); else history.pushState(null, null, window.location.pathname); }); }
        function switchTab(t) { db.tab = t; document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400'; renderHome(); }
        function openAddModal() { document.getElementById('addModal').classList.remove('hidden'); document.getElementById('newPName').value=""; document.getElementById('newPPhone').value=""; }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        function hireManager() { const n=prompt("Name:"), ph=prompt("Phone:"), p=prompt("PIN:"); if(n&&ph.length===10&&p.length===4) { if(!db.managers) db.managers=[]; db.managers.push({name:n,phone:ph,pin:p}); saveDB(); renderManagers(); } }
        function renderManagers() { const l=document.getElementById('mgrList'); l.innerHTML=""; (db.managers||[]).forEach(m=>l.innerHTML+=`<div class="p-3 bg-slate-100 rounded-xl mb-2 flex justify-between font-bold text-xs"><span>${m.name} (${m.phone})</span><i class="fas fa-trash text-rose-300" onclick="delMgr('${m.phone}')"></i></div>`); }
        function delMgr(ph) { if(confirm("Revoke?")) { db.managers=db.managers.filter(x=>x.phone!==ph); saveDB(); renderManagers(); } }
        function handleImg(f) { capturedFile = f; document.getElementById('imgPreview').src = URL.createObjectURL(f); document.getElementById('billPreviewArea').classList.remove('hidden'); document.getElementById('mediaSheet').classList.add('hidden'); }
        function openMediaSelector() { document.getElementById('mediaSheet').classList.remove('hidden'); }
        function triggerCamera() { document.getElementById('camInp').click(); }
        function triggerGallery() { document.getElementById('galInp').click(); }
        function clearImage() { capturedFile = null; document.getElementById('billPreviewArea').classList.add('hidden'); }
        function renderAll() { if(!document.getElementById('pageLedger').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function triggerDrawer(t) { document.getElementById('entryDrawer').classList.remove('hidden'); setTimeout(()=>document.getElementById('entryDrawer').classList.add('open'), 10); document.getElementById('drawerActionType').innerText=t; document.getElementById('txDate').value=new Date().toISOString().split('T')[0]; document.getElementById('mainConfirmBtn').onclick=()=>preSave(t); }
        function closeDrawer() { document.getElementById('entryDrawer').classList.remove('open'); setTimeout(()=>{document.getElementById('entryDrawer').classList.add('hidden'); capturedFile=null; document.getElementById('imgPreview').classList.add('hidden');}, 400); }
        function shareWA(amt, t, n) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro: '+n+'\n'+t+': Rs.'+amt)}`); }
        function shareApp() { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro: Download Now: ' + window.location.href)}`); }
        function changePin() { const p = prompt("New PIN:"); if(p && p.length===4) { db.admin.pin = p; saveDB(); alert("PIN Updated!"); } }
        function transferAcc() { const v = prompt("Current Phone:"); if(v===db.admin.phone) { const n = prompt("New 10 Digit Phone:"); if(n && n.length===10) { db.admin.phone = n; saveDB(); location.reload(); } } }
        function factoryReset() { if(confirm("Erase all data?")) { if(db.admin) db_fs.collection("global_ledgers").doc(db.admin.phone).delete(); localStorage.clear(); location.reload(); } }
        function handleSmartPdfDownload() { alert("PDF system ready!"); }
        function editTx(pid, tid) { const p=db.people.find(x=>x.id===pid), t=p.transactions.find(x=>x.id===tid); askPin(()=>{ const n=parseFloat(prompt("New Amt:", t.amount)), nt=prompt("Note:", t.note); if(n) { if(!t.history) t.history=[]; t.history.push({amt:t.amount, date:new Date().toLocaleString()}); t.amount=n; t.note=nt; saveDB(); renderLedger(); } }); }
    </script>
</body>
</html>
