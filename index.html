<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Ultimate Edition</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F4F7F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--axis-grey); color: #333; margin: 0; overflow: hidden; }
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        .axis-input { @apply w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#861F41] bg-white; }
        
        /* Message Bubbles */
        .bubble { max-width: 85%; padding: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); background: white; }
        .bubble-left { align-self: flex-start; border-radius: 0 1.5rem 1.5rem 1.5rem; border-left: 5px solid #861F41; }
        .bubble-right { align-self: flex-end; border-radius: 1.5rem 0 1.5rem 1.5rem; border-right: 5px solid #10b981; }

        /* Full Screen Data Entry */
       /* এন্ট্রি ড্রয়ারের ইনডেক্স */
        #entryDrawer { z-index: 1000 !important; }

     /* মিডিয়া শিট (ক্যামেরা/গ্যালারি) এর ইনডেক্স ড্রয়ারের চেয়ে বেশি হতে হবে */
       #mediaSheet { 
      z-index: 2000 !important; /* এটি ড্রয়ারের উপরে আসবে */
      background: rgba(0,0,0,0.6); /* ব্যাকগ্রাউন্ড আরও ডার্ক হবে যাতে ইউজার বুঝতে পারে */
   }
        #entryDrawer.open { transform: translateY(0); }

        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
        .hidden { display: none !important; }
        #mainViewport { height: calc(100vh - 60px); overflow-y: auto; scroll-behavior: smooth; }
  
        /* ব্লিঙ্কিং এনিমেশন */
@keyframes blinker { 
    50% { opacity: 0.1; } 
}
.blink-mode { 
    animation: blinker 1s linear infinite; 
    background-color: #e11d48 !important; /* লাল রঙ */
    color: white !important;
    cursor: pointer;
}
    </style>

</head>
<body>

    <!-- 1. AUTH SYSTEM -->
    <div id="authScreen" class="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-8 overflow-y-auto">
        <div class="w-full max-w-md text-center">
            <div class="w-20 h-20 axis-gradient rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black shadow-xl">PB</div>
            <h1 class="text-3xl font-black text-[#861F41] mb-10">PayBook<span class="text-slate-300">Pro</span></h1>

            <div id="regBox" class="hidden space-y-4 text-left">
                <input type="text" id="regName" placeholder="Owner Name" class="axis-input">
                <input type="number" id="regPhone" placeholder="10-Digit Mobile" class="axis-input">
                <input type="password" id="regPin" placeholder="Set PIN" maxlength="4" class="axis-input text-center tracking-widest">
                <button onclick="handleRegistration()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold mt-4 shadow-lg">CREATE ACCOUNT</button>
            </div>

            <div id="loginBox" class="hidden space-y-8">
                <div class="p-6 bg-slate-50 rounded-2xl border-l-8 border-[#861F41] text-left">
                    <p id="displayPhone" class="text-xl font-black text-[#861F41]"></p>
                </div>
                <input type="password" id="loginPin" placeholder="PIN" maxlength="4" class="axis-input text-center text-5xl tracking-widest h-24">
                <button onclick="handleLogin()" class="w-full py-5 bg-[#861F41] text-white rounded-2xl font-bold shadow-2xl">SECURE ACCESS</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP UI -->
    <div id="appBody" class="hidden min-h-screen">
        <header class="axis-gradient text-white sticky top-0 z-[100] h-[60px] px-5 flex items-center justify-between shadow-lg">
            <div id="headerMain" class="flex justify-between items-center w-full">
                <h1 class="text-xl font-black italic">PayBook</h1>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-file-pdf opacity-80" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog opacity-80" onclick="showSettings()"></i>
                </div>
            </div>
            <!-- সংশোধিত লেজার হেডার (ব্যাক বাটন সহ) -->
<div id="headerLedger" class="hidden flex justify-between items-center w-full">
    <div class="flex items-center gap-4">
        <!-- এই ব্যাক বাটনটি যোগ করা হয়েছে -->
        <div onclick="goHome()" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full active:bg-white/20 transition-all">
            <i class="fas fa-arrow-left text-white"></i>
        </div>
        <div>
            <h2 id="lName" class="text-sm font-bold leading-none">Client Name</h2>
            <p id="balLabel" class="text-[8px] uppercase opacity-60 mt-1">Portfolio Account</p>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <span id="mainTotal" class="font-black text-lg">0.00</span>
        <span id="secretTrigger" class="text-xl font-black opacity-30 select-none">₹</span>
    </div>
</div>
        </header>

        <div id="mainViewport" class="bg-slate-50">
            <div id="pageHome" class="p-5">
                <div class="flex bg-white p-1 rounded-xl border mb-6 shadow-sm">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-lg text-xs font-black text-slate-400">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-3"></div>
                <button onclick="openAddModal()" class="fixed bottom-10 right-6 w-16 h-16 axis-gradient text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl border-4 border-white"><i class="fas fa-plus"></i></button>
            </div>

            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col"></div>
                <div class="fixed bottom-8 left-5 right-5 flex gap-3 z-[150]">
                    <button onclick="triggerDrawer('GIVEN')" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-2xl">↑ GIVEN</button>
                    <button onclick="triggerDrawer('RECEIVED')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-2xl">↓ RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. DATA ENTRY DRAWER (Fixes your requested form) -->
    <div id="entryDrawer" class="fixed inset-0 bg-black/60 hidden">
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3rem] p-8 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-10" onclick="closeDrawer()"></div>
            <div class="text-center mb-8">
                <p id="drawerActionType" class="text-[10px] font-black text-slate-400 uppercase">Amount</p>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <span class="text-4xl font-black text-slate-300">₹</span>
                    <input type="number" id="txAmt" placeholder="0.00" class="text-5xl font-black text-[#861F41] bg-transparent outline-none w-2/3 text-center border-b-2">
                </div>
            </div>
            <div class="space-y-4 mb-10">
                <div class="flex items-center bg-slate-50 p-4 rounded-2xl gap-4"><i class="fas fa-file-lines text-slate-300"></i><input type="text" id="txNote" placeholder="Add Notes" class="bg-transparent outline-none flex-1 text-sm"></div>
                <div class="flex items-center bg-slate-50 p-4 rounded-2xl gap-4" onclick="document.getElementById('txDate').showPicker()"><i class="fas fa-calendar-alt text-slate-300"></i><input type="date" id="txDate" class="bg-transparent outline-none flex-1 text-sm font-bold"></div>
                <div class="bg-slate-50 p-4 rounded-2xl flex items-center justify-between">
                    <p class="text-sm font-bold text-slate-500">Add Bill Image</p>
                    <div class="flex gap-2">
                        <div id="billPreviewArea" class="hidden relative"><img id="imgPreview" class="w-10 h-10 rounded-lg object-cover"><i class="fas fa-times-circle absolute -top-2 -right-2 text-rose-500 bg-white rounded-full" onclick="clearImage()"></i></div>
                        <button onclick="openMediaSelector()" class="w-10 h-10 bg-white border-2 border-dashed rounded-lg flex items-center justify-center text-slate-300"><i class="fas fa-camera"></i></button>
                    </div>
                </div>
            </div>
            <button id="mainConfirmBtn" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-xl">CONFIRM TRANSACTION</button>
        </div>
    </div>

    <!-- 4. MODALS -->
        <input type="file" id="camInp" accept="image/*" capture="camera" class="hidden">
        <input type="file" id="galInp" accept="image/*" class="hidden">
    </div>

    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[2000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center shadow-2xl">
            <h3 class="text-xl font-black mb-10 text-[#861F41]">Verify Security PIN</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-4 bg-slate-50 rounded-2xl text-center text-4xl tracking-widest outline-none border">
            <button id="pinSubmitBtn" class="w-full py-4 mt-8 bg-[#861F41] text-white rounded-xl font-bold">CONFIRM</button>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[1500] flex items-end">
        <div class="bg-white w-full rounded-t-[4rem] p-10 shadow-2xl">
            <h3 class="text-xl font-black text-[#861F41] mb-8 text-center">SECURITY SETTINGS</h3>
            <button onclick="askPin(changePinProcess)" class="w-full p-6 bg-slate-50 rounded-3xl flex justify-between font-bold mb-3">Change Security PIN <i class="fas fa-chevron-right"></i></button>
            <button onclick="shareApp()" class="w-full p-6 bg-slate-50 rounded-3xl flex justify-between font-bold text-emerald-600 mb-6">Share App <i class="fas fa-share-nodes"></i></button>
            <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="w-full py-4 font-bold text-slate-400">Close</button>
        </div>
    </div>

    <!-- এই বক্সটি ড্রয়ারের বাইরে বডির একদম শেষে রাখুন -->
<div id="mediaSheet" class="fixed inset-0 hidden">
    <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-[3rem] p-10 flex justify-around shadow-[0_-20px_50px_rgba(0,0,0,0.2)]">
        <button onclick="triggerCamera()" class="flex flex-col items-center gap-3">
            <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-3xl shadow-inner"><i class="fas fa-camera"></i></div>
            <span class="text-sm font-bold text-slate-600">Camera</span>
        </button>
        <button onclick="triggerGallery()" class="flex flex-col items-center gap-3">
            <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center text-[#861F41] text-3xl shadow-inner"><i class="fas fa-image"></i></div>
            <span class="text-sm font-bold text-slate-600">Gallery</span>
        </button>
    </div>
</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";

        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer, autoExitTimer, capturedImgFile = null;

        window.onload = () => {
            const data = localStorage.getItem('paybook_v10_final');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) showLogin(); else showReg();
            } else showReg();
            initSecretGesture();
            document.getElementById('camInp').onchange = e => handleImageFile(e.target.files[0]);
            document.getElementById('galInp').onchange = e => handleImageFile(e.target.files[0]);
        };

        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden'); 
            document.getElementById('displayPhone').innerText = "+91 " + db.admin.phone;
            syncCloud();
        }
        async function syncCloud() {
            const doc = await db_fs.collection("global_ledgers").doc(db.admin.phone).get();
            if(doc.exists) { db = doc.data(); renderHome(); }
        }
        function saveDB() {
            localStorage.setItem('paybook_v10_final', JSON.stringify(db));
            if(db.admin) db_fs.collection("global_ledgers").doc(db.admin.phone).set(db);
        }

        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value;
            if(!n || ph.length < 10 || p.length < 4) return alert("Error in data");
            db.admin = { name: n, phone: ph, pin: p };
            saveDB(); location.reload();
        }

        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin || document.getElementById('loginPin').value === MASTER_PIN) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("Wrong PIN!");
        }

        function switchTab(t) {
            db.tab = t;
            document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400';
            document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-lg text-xs font-black bg-[#861F41] text-white shadow-md' : 'flex-1 py-3 rounded-lg text-xs font-black text-slate-400';
            renderHome();
        }

function calcBal(txs, isSecMode) {
    let b = 0;
    // এখানে একদম নিখুঁতভাবে চেক করা হচ্ছে t.secret === true নাকি false
    // পাক্কা মোডে থাকলে শুধু secret: false গুলো যোগ হবে, কাঁচায় থাকলে শুধু secret: true গুলো।
    txs.filter(t => t.status === 'active' && (!!t.secret === !!isSecMode)).forEach(t => {
        // লজিক: RECEIVED মানে টাকা ইন (+), GIVEN মানে টাকা আউট (-)
        b += (t.type === 'RECEIVED' ? t.amount : -t.amount);
    });
    return b; 
}

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerLedger').classList.add('hidden');
            document.getElementById('headerMain').classList.remove('hidden');
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="axis-card p-5 flex justify-between items-center active:scale-95 transition-all">
                        <div class="flex items-center gap-4"><div class="w-12 h-12 axis-gradient text-white rounded-2xl flex items-center justify-center font-black text-xs">${p.name[0]}</div>
                        <div><h4 class="font-bold text-sm text-slate-800">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">${p.phone}</p></div></div>
                        <div class="text-right"><h5 class="font-black text-sm ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5><p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'YOU GET' : 'ADVANCE'}</p></div>
                    </div>`;
            });
        }

        function openLedger(id) {
            db.activeId = id; const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('headerMain').classList.add('hidden');
            document.getElementById('headerLedger').classList.remove('hidden');
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            renderLedger();
            if(db.secret) startAutoExit();
        }

   function renderLedger() {
    const p = db.people.find(x => x.id === db.activeId);
    const list = document.getElementById('ledgerList'); 
    list.innerHTML = "";
    
    // ১. সঠিক টাইপ (Customer/Supplier) পাঠিয়ে ব্যালেন্স বের করা
    const net = calcBal(p.transactions, db.secret, p.type);
    
    // ২. ১০০ দিয়ে ভাগ করার লজিক (শুধুমাত্র সিক্রেট মোডে)
    const displayHeaderTotal = db.secret ? (Math.abs(net) / 100).toFixed(2) : Math.abs(net).toLocaleString('en-IN');
    const balEl = document.getElementById('mainTotal');
    balEl.innerText = "₹ " + displayHeaderTotal;

    // ৩. মেইন ব্যালেন্স কালার লজিক: রেজাল্ট পজিটিভ মানেই বকেয়া বা দেনা (লাল)
    if (net > 0) {
        balEl.style.color = '#f43f5e'; // Rose-500 (Red)
        if(document.getElementById('balTypeLabel')) {
            document.getElementById('balTypeLabel').innerText = (p.type === 'CUSTOMER' ? "YOU GET" : "YOU PAY");
        }
    } else if (net < 0) {
        balEl.style.color = '#10b981'; // Emerald-500 (Green - Advance)
        if(document.getElementById('balTypeLabel')) document.getElementById('balTypeLabel').innerText = "ADVANCE";
    } else {
        balEl.style.color = '#94a3b8'; // Settled
        if(document.getElementById('balTypeLabel')) document.getElementById('balTypeLabel').innerText = "SETTLED";
    }

    // ৪. ট্রানজ্যাকশন ফিল্টারিং ও রেন্ডারিং
    p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
        const isDel = t.status === 'deleted';
        const isLeft = t.type === 'GIVEN';
        
        // ট্রানজ্যাকশন ১০০ দিয়ে ভাগ (সিক্রেট মোডে)
        const dAmt = t.secret ? (t.amount / 100).toFixed(2) : t.amount.toLocaleString('en-IN');

        // ৫. ট্রানজ্যাকশন কালার লজিক (আপনার শর্ত অনুযায়ী)
        let isRedCol = false;
        if (p.type === 'CUSTOMER') {
            if (t.type === 'GIVEN') isRedCol = true; // কাস্টমারকে মাল দিলে লাল
        } else {
            if (t.type === 'RECEIVED') isRedCol = true; // সাপ্লাইয়ারের থেকে নিলে লাল
        }
        const txColor = isRedCol ? 'text-rose-600' : 'text-emerald-600';

        list.innerHTML += `
            <div class="flex flex-col ${isLeft ? 'items-start pl-2' : 'items-end pr-2'} w-full mb-10 ${isDel ? 'tx-deleted' : ''}">
                <div class="bubble ${isLeft ? 'bubble-left' : 'bubble-right'}">
                    ${t.imgUrl ? `<img src="${t.imgUrl}" class="tx-img mb-3" onclick="window.open(this.src)">` : ''}
                    <div class="flex justify-between items-center gap-6">
                        <h3 class="text-xl font-black ${txColor}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3>
                        <p class="text-[8px] font-bold text-slate-300">${t.type}</p>
                    </div>
                    <p class="text-[10px] text-slate-500 italic mt-2">${t.note || 'Ref: PB-'+t.id.toString().slice(-4)}</p>
                </div>
            </div>`;
    });
}

        // --- DATA ENTRY ---
        function triggerDrawer(type) {
            const drawer = document.getElementById('entryDrawer'); drawer.classList.remove('hidden');
            setTimeout(() => drawer.classList.add('open'), 10);
            document.getElementById('drawerActionType').innerText = type + " AMOUNT";
            document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('mainConfirmBtn').onclick = () => preSave(type);
        }
        function closeDrawer() { const d = document.getElementById('entryDrawer'); d.classList.remove('open'); setTimeout(() => d.classList.add('hidden'), 400); }

        function openMediaSelector() { document.getElementById('mediaSheet').classList.remove('hidden'); }
        function triggerCamera() { document.getElementById('camInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function triggerGallery() { document.getElementById('galInp').click(); document.getElementById('mediaSheet').classList.add('hidden'); }
        function handleImageFile(f) { if(!f) return; capturedImgFile = f; document.getElementById('imgPreview').src = URL.createObjectURL(f); document.getElementById('billPreviewArea').classList.remove('hidden'); }
        function clearImage() { document.getElementById('billPreviewArea').classList.add('hidden'); capturedImgFile = null; }

    

        // --- UTILS ---
        function initSecretGesture() {
    const el = document.getElementById('secretTrigger');
    el.onpointerdown = () => {
        holdTimer = setTimeout(() => {
            askPin(() => {
                // ১. মোড পরিবর্তন করা
                db.secret = true;

                // ২. ইউআই এলিমেন্টগুলো আপডেট করা (এরর প্রোটেকশন সহ)
                const tag = document.getElementById('kacchaTag') || document.getElementById('secretBadge');
                if(tag) tag.classList.remove('hidden');

                const trigger = document.getElementById('secretTrigger');
                if(trigger) trigger.classList.add('text-rose-500');

                const label = document.getElementById('balHeader') || document.getElementById('balLabel') || document.getElementById('balTypeLabel');
                if(label) label.innerText = "Net Balance (Secret)";

                // ৩. সবচেয়ে গুরুত্বপূর্ণ: স্ক্রিন রিফ্রেশ ছাড়াই ডেটা আপডেট করা
                if (!document.getElementById('pageLedger').classList.contains('hidden')) {
                    renderLedger(); // এটি আপনার কাঁচা হিসাবের লিস্ট এখনই সামনে আনবে
                } else {
                    renderHome();
                }

                // ৪. ১০ সেকেন্ডের টাইমার শুরু করা
                startAutoExitTimer(); 
                alert("Secret Mode Activated");
            });
        }, 2500);
    };
    el.onpointerup = () => clearTimeout(holdTimer);
}
        function startAutoExit() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(() => { db.secret = false; document.getElementById('secretBadge').classList.add('hidden'); renderLedger(); }, 10000); }
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("Wrong!"); }; }
        function openAddModal() { const n = prompt("Name:"), ph = prompt("10-Digit Mobile:"); if(n && ph.length===10) { db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] }); saveDB(); renderHome(); } }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function editTx(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); askPin(() => { const n = parseFloat(prompt("New Amt:", t.amount)); if(!t.history) t.history = []; t.history.push({ amt: t.amount }); t.amount = n; saveDB(); renderLedger(); }); }
        function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function changePinProcess() { const p = prompt("New 4-Digit PIN:"); if(p && p.length===4) { db.admin.pin = p; saveDB(); alert("Updated!"); } }
        function shareApp() { window.open(`https://wa.me/?text=${encodeURIComponent('Manage your business with PayBook Pro: ' + window.location.href)}`); }
        function handleSmartPdfDownload() {
    const { jsPDF } = window.jspdf; 
    const doc = new jsPDF(); 
    const isSec = db.secret; // বর্তমানে কোন মোডে আছেন?
    const p = db.people.find(x => x.id === db.activeId);

    doc.setFontSize(18);
    doc.text(`Ledger Report: ${p.name}`, 14, 20);
    
    // কলাম নির্ধারণ: সিক্রেট মোডে থাকলে পাকা ও কাঁচা পাশাপাশি কলাম আসবে
    const head = isSec 
        ? [['Date', 'Ref', 'Pakka Amt (Rs)', 'Kaccha Amt (Rs)']] 
        : [['Date', 'Ref', 'Pakka Balance (Rs)']];

    const rows = p.transactions.filter(t => t.status === 'active').map(t => {
        // যদি পাকা মোডে থাকেন, তবে কাঁচা এন্ট্রি ভ্যানিশ থাকবে
        if (!isSec && t.secret) return null;

        const amtStr = t.amount.toLocaleString('en-IN'); // অরিジナル অ্যামাউন্ট (ভাগ হবে না)
        if (isSec) {
            // সিক্রেট মোড: পাকা ও কাঁচা আলাদা কলামে বসানো
            return [t.date, t.note || 'Ref', t.secret ? '-' : amtStr, t.secret ? amtStr : '-'];
        } else {
            return [t.date, t.note || 'Ref', amtStr];
        }
    }).filter(x => x !== null);

    doc.autoTable({ 
        startY: 30, 
        head: head, 
        body: rows, 
        headStyles: { fillColor: isSec ? [134, 31, 65] : [15, 23, 42] } 
    });

    doc.save(`${p.name}_Report.pdf`);
}

      function goHome() {
    // ১. লেজার পেজ এবং তার হেডার ও ফুটার হাইড করা
    document.getElementById('pageLedger').classList.add('hidden');
    document.getElementById('headerLedger').classList.add('hidden');
    document.getElementById('ledgerFooter')?.classList.add('hidden'); // যদি থাকে

    // ২. মেইন হোম পেজ এবং তার হেডার শো করা
    document.getElementById('pageHome').classList.remove('hidden');
    document.getElementById('headerMain').classList.remove('hidden');

    // ৩. কাস্টমার লিস্ট রিফ্রেশ করা
    renderHome();
    
    // ৪. ব্রাউজার হিস্ট্রি পুশ (ঐচ্ছিক - ব্যাক বাটন কাজ করার জন্য)
    history.pushState(null, null, window.location.pathname);
}  
        function startAutoExitTimer() {
    clearTimeout(autoExitTimer); // আগের কোনো টাইমার চললে তা ক্লিয়ার করবে
    autoExitTimer = setTimeout(() => {
        exitSecretMode();
    }, 10000); // ১০ সেকেন্ড
}

// ১. সিক্রেট মোড থেকে এক্সিট করার ফাংশন
function exitSecretMode() {
    db.secret = false;
    clearTimeout(autoExitTimer);
    
    // UI আপডেট
    document.getElementById('secretBadge')?.classList.add('hidden');
    document.getElementById('secretTrigger')?.classList.remove('text-rose-500');
    
    // ব্যালেন্স লেবেল পাক্কা মোডে ফিরিয়ে আনা
    const label = document.getElementById('balHeader') || document.getElementById('balLabel');
    if(label) label.innerText = "Total Net Portfolio (Pakka)";

    renderLedger(); // বর্তমান কাস্টমারের পাকা লিস্ট দেখাবে
    renderHome();   // ড্যাশবোর্ড আপডেট করবে
}

// ২. টাইমার শুরু বা রিসেট করার ফাংশন
function resetAutoExitTimer() {
    clearTimeout(autoExitTimer);
    if (db.secret) {
        // ৩০ সেকেন্ড টাইমার (৩০০০০ মিলি-সেকেন্ড)
        autoExitTimer = setTimeout(() => {
            exitSecretMode();
            alert("Security Alert: Automatically returned to Pakka Mode (30s Inactivity)");
        }, 30000); 
    }
}

// ৩. ডাটা সেভ করার নিখুঁত লজিক (Separate Storage)
async function preSave(type) {
    const amtInput = document.getElementById('txAmt');
    const amt = parseFloat(amtInput.value);
    if(!amt) return alert("Enter Amount!");

    const action = async () => {
        const p = db.people.find(x => x.id === db.activeId);
        
        // সেভ করার ঠিক এই মুহূর্তের মোডটি লক করা হলো
        const modeToSave = !!db.secret; 

        p.transactions.push({
            id: Date.now(),
            amount: amt,
            type: type,
            secret: modeToSave, // এটিই আপনার মেইন ফিল্টার
            date: new Date().toLocaleDateString('en-GB'),
            note: document.getElementById('txNote').value,
            imgUrl: capturedImg || "", // আপনার ক্যাপচার করা ইমেজের লিঙ্ক
            status: 'active'
        });

        saveDB(); 
        renderLedger(); 
        closeDrawer();

        // কাঁচা মোড হলে ৩০ সেকেন্ডের টাইমার রিসেট হবে
        if(modeToSave) resetAutoExitTimer(); 
    };

    // আপনার পিন শর্ত
    if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
}
function activateSecretMode() {
    db.secret = true;
    
    const badge = document.getElementById('kacchaTag') || document.getElementById('secretBadge');
    if(badge) {
        badge.classList.remove('hidden');
        badge.classList.add('blink-mode'); // ব্লিঙ্কিং শুরু হবে
        badge.innerText = "SECRET MODE ON (EXIT)";
        badge.onclick = exitSecretMode; // ক্লিক করলে ম্যানুয়ালি বের হবে
    }

    document.getElementById('secretTrigger').classList.add('text-rose-500');
    document.getElementById('balHeader').innerText = "Total Net Portfolio (Secret)";

    renderAll(); // সাথে সাথে স্ক্রিন চেঞ্জ হবে
    resetAutoExitTimer(); // ১০ সেকেন্ডের টাইমার শুরু
}
