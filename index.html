<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PayBook Pro | Axis Slim</title>
    
    <!-- Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;900&display=swap');
        :root { --axis-burgundy: #861F41; --axis-grey: #F1F5F9; }
        body { font-family: 'Public Sans', sans-serif; background-color: white; color: #333; margin: 0; overflow: hidden; }
        .axis-gradient { background: linear-gradient(135deg, #861F41 0%, #631430 100%); }
        header { height: 60px; display: flex; align-items: center; padding: 0 15px; }
        #mainViewport { height: calc(100vh - 130px); overflow-y: auto; padding-bottom: 20px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; position: relative; margin-bottom: 15px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .bubble-left { align-self: flex-start; background: #fff; border-left: 4px solid #10b981; }
        .bubble-right { align-self: flex-end; background: #fff; border-right: 4px solid #f43f5e; }
        .tx-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
        .running-bal { font-size: 9px; color: #94a3b8; font-weight: bold; margin-bottom: 10px; }
        .bottom-bar { height: 70px; display: flex; gap: 10px; padding: 10px 15px; background: white; border-top: 1px solid #f1f5f9; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); position: fixed; bottom: 0; width: 100%; }
        .hidden { display: none !important; }
        .axis-input { @apply w-full p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-[#861F41] bg-white; }
        #inputDrawer { transform: translateY(100%); transition: transform 0.3s ease-out; }
        #inputDrawer.open { transform: translateY(0); }
        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
    </style>
</head>
<body>

    <!-- 1. AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-8">
        <div class="w-full max-w-md text-center">
            <div class="w-16 h-16 axis-gradient rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl font-bold">PB</div>
            <h1 class="text-2xl font-black text-[#861F41]">PayBook<span class="text-slate-300">Pro</span></h1>
            <div id="regBox" class="hidden mt-8 space-y-3 text-left">
                <input type="text" id="regName" placeholder="Owner Name" class="axis-input">
                <input type="number" id="regPhone" placeholder="10-Digit Phone" class="axis-input">
                <input type="password" id="regPin" placeholder="4-Digit PIN" maxlength="4" class="axis-input text-center">
                <button onclick="handleRegistration()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold">CREATE ACCOUNT</button>
            </div>
            <div id="loginBox" class="hidden mt-8 space-y-6">
                <p id="displayPhone" class="text-lg font-bold text-slate-600"></p>
                <input type="password" id="loginPin" placeholder="Enter PIN" maxlength="4" class="axis-input text-center text-3xl tracking-widest h-16">
                <button onclick="handleLogin()" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold">UNLOCK APP</button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP -->
    <div id="appBody" class="hidden min-h-screen flex flex-col">
        <header class="axis-gradient text-white shadow-md z-[100]">
            <div id="headerHome" class="flex justify-between items-center w-full">
                <h1 class="text-xl font-black italic">PayBook</h1>
                <div class="flex gap-5">
                    <i class="fas fa-file-pdf" onclick="askPin(handleSmartPdfDownload)"></i>
                    <i class="fas fa-cog" onclick="showSettings()"></i>
                </div>
            </div>
            <div id="headerLedger" class="hidden flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <i class="fas fa-arrow-left" onclick="goHome()"></i>
                    <div>
                        <h2 id="lName" class="text-sm font-bold leading-none">Client</h2>
                        <span id="balLabel" class="text-[8px] uppercase opacity-60">Portfolio Balance</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span id="mainTotal" class="font-black text-xl">0.00</span>
                    <span id="secretTrigger" class="text-xl font-black opacity-40 select-none">₹</span>
                </div>
            </div>
        </header>

        <div id="mainViewport" class="flex-1 bg-slate-50">
            <!-- Home: People List -->
            <div id="pageHome" class="p-4 space-y-3">
                <div class="flex bg-white p-1 rounded-lg border mb-4 shadow-sm">
                    <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-2 rounded text-[10px] font-black bg-[#861F41] text-white">CUSTOMERS</button>
                    <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-2 rounded text-[10px] font-black text-slate-400">SUPPLIERS</button>
                </div>
                <div id="contactList" class="space-y-2"></div>
                <button onclick="openAddModal()" class="fixed bottom-24 right-6 w-14 h-14 axis-gradient text-white rounded-full shadow-2xl flex items-center justify-center text-xl border-2 border-white"><i class="fas fa-plus"></i></button>
            </div>
            <!-- Ledger: Transactions -->
            <div id="pageLedger" class="hidden flex flex-col p-4">
                <div id="ledgerList" class="flex flex-col"></div>
            </div>
        </div>

        <div id="ledgerFooter" class="hidden bottom-bar z-[150]">
            <button onclick="openDrawer('RECEIVED')" class="flex-1 bg-emerald-600 text-white rounded-xl font-bold shadow-lg">↓ RECEIVED</button>
            <button onclick="openDrawer('GIVEN')" class="flex-1 bg-rose-600 text-white rounded-xl font-bold shadow-lg">↑ GIVEN</button>
        </div>
    </div>

    <!-- 3. INPUT DRAWER -->
    <div id="inputDrawer" class="fixed inset-0 z-[500] flex flex-col justify-end bg-black/50 hidden">
        <div class="bg-white rounded-t-[2.5rem] p-6 shadow-2xl">
            <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-6" onclick="closeDrawer()"></div>
            <h3 id="drawerTitle" class="text-center font-black text-sm mb-6 uppercase">NEW ENTRY</h3>
            <div class="flex gap-3 mb-4">
                <input type="number" id="txAmt" placeholder="0.00" class="flex-1 p-5 bg-slate-50 rounded-xl font-black text-4xl outline-none border focus:border-[#861F41]">
                <label class="w-16 h-16 bg-slate-50 rounded-xl flex items-center justify-center relative border border-dashed border-slate-300">
                    <i class="fas fa-camera text-slate-300"></i>
                    <input type="file" id="txFile" accept="image/*" class="hidden">
                    <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-xl">
                </label>
            </div>
            <input type="text" id="txNote" placeholder="Notes (Ref/Details)" class="axis-input bg-slate-50 border-none mb-6">
            <div class="flex gap-3">
                <button onclick="closeDrawer()" class="flex-1 py-4 font-bold text-slate-400">CANCEL</button>
                <button id="drawerSaveBtn" class="flex-1 py-4 bg-[#861F41] text-white rounded-xl font-bold">CONFIRM</button>
            </div>
        </div>
    </div>

    <!-- 4. MODALS (PIN, SETTINGS) -->
    <div id="pinModal" class="hidden fixed inset-0 bg-[#861F41]/95 z-[1000] flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl">
            <h3 class="font-black mb-4 uppercase">Verification</h3>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-4 bg-slate-50 rounded-xl text-center text-4xl tracking-widest outline-none border mb-6">
            <button id="pinSubmitBtn" class="w-full py-4 bg-[#861F41] text-white rounded-xl font-bold">CONFIRM PIN</button>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 z-[600] flex items-end" onclick="this.classList.add('hidden')">
        <div class="bg-white w-full rounded-t-[2.5rem] p-8" onclick="event.stopPropagation()">
            <h3 class="font-black text-center mb-6">SECURITY CENTER</h3>
            <button onclick="askPin(changePin)" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-bold mb-3 flex justify-between">Change PIN <i class="fas fa-key"></i></button>
            <button onclick="transferAcc()" class="w-full p-5 bg-slate-50 rounded-2xl text-left font-bold flex justify-between">Transfer Account <i class="fas fa-exchange-alt"></i></button>
        </div>
    </div>

    <script>
        // --- CONFIG & BOOT ---
        const firebaseConfig = { apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ", authDomain: "paybook-cc6be.firebaseapp.com", projectId: "paybook-cc6be", storageBucket: "paybook-cc6be.firebasestorage.app", messagingSenderId: "1000801647538", appId: "1:1000801647538:web:648ac804d8d75a0811c2ab" };
        firebase.initializeApp(firebaseConfig);
        const db_fs = firebase.firestore();
        const IMGBB_KEY = '493904e927fb86161e0a4944d5b28de6';
        const MASTER_PIN = "5000";

        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer, autoExitTimer;

        window.onload = () => {
            const data = localStorage.getItem('paybook_v8_final');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) showLogin(); else showReg();
            } else showReg();
            initSecretGesture();
            document.getElementById('txFile').onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => { document.getElementById('imgPreview').src = ev.target.result; document.getElementById('imgPreview').classList.remove('hidden'); };
                reader.readAsDataURL(e.target.files[0]);
            };
        };

        // --- AUTH LOGIC ---
        function showReg() { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden'); 
            document.getElementById('displayPhone').innerText = "+91 " + db.admin.phone;
            syncCloud();
        }
        async function syncCloud() {
            const doc = await db_fs.collection("ledgers").doc(db.admin.phone).get();
            if(doc.exists) { db = doc.data(); renderHome(); }
        }
        function saveDB() {
            localStorage.setItem('paybook_v8_final', JSON.stringify(db));
            if(db.admin) db_fs.collection("ledgers").doc(db.admin.phone).set(db);
        }
        function handleRegistration() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, p = document.getElementById('regPin').value;
            if(!n || ph.length < 10) return alert("Invalid Data");
            db.admin = { name: n, phone: ph, pin: p };
            saveDB(); location.reload();
        }
        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin || document.getElementById('loginPin').value === MASTER_PIN) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("Wrong PIN!");
        }

        // --- CORE UI LOGIC ---
        function switchTab(t) {
            db.tab = t;
            document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-2 rounded text-[10px] font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-2 rounded text-[10px] font-black text-slate-400';
            document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-2 rounded text-[10px] font-black bg-[#861F41] text-white shadow-lg' : 'flex-1 py-2 rounded text-[10px] font-black text-slate-400';
            renderHome();
        }

        function calcBal(txs, isSec) {
            let b = 0;
            txs.filter(t => t.status==='active' && !!t.secret === !!isSec).forEach(t => { b += (t.type==='RECEIVED'?t.amount:-t.amount); });
            return b;
        }

        function renderHome() {
            const list = document.getElementById('contactList'); list.innerHTML = "";
            document.getElementById('headerHome').classList.remove('hidden');
            document.getElementById('headerLedger').classList.add('hidden');
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBal(p.transactions, db.secret);
                const dAmt = db.secret ? (Math.abs(bal)/100).toFixed(2) : Math.abs(bal).toLocaleString('en-IN');
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-4 rounded-xl border border-slate-100 flex justify-between items-center active:bg-slate-50">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-50 text-[#861F41] rounded-full flex items-center justify-center font-black border text-xs">${p.name[0]}</div>
                            <div><h4 class="font-bold text-sm text-slate-800">${p.name}</h4><p class="text-[8px] text-slate-400 font-bold uppercase">${p.phone}</p></div>
                        </div>
                        <div class="text-right">
                            <h5 class="font-black text-sm ${bal > 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${dAmt}</h5>
                            <p class="text-[7px] font-bold text-slate-300 uppercase">${bal > 0 ? 'Due' : 'Advance'}</p>
                        </div>
                    </div>`;
            });
        }

        function openLedger(id) {
            db.activeId = id; const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('headerHome').classList.add('hidden');
            document.getElementById('headerLedger').classList.remove('hidden');
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            document.getElementById('ledgerFooter').classList.remove('hidden');
            renderLedger();
            if(db.secret) startAutoExit();
        }

        function renderLedger() {
            const p = db.people.find(x => x.id === db.activeId);
            const list = document.getElementById('ledgerList'); list.innerHTML = "";
            let runningBal = 0;
            const net = calcBal(p.transactions, db.secret);
            document.getElementById('mainTotal').innerText = "₹" + (db.secret ? (Math.abs(net)/100).toFixed(2) : Math.abs(net).toLocaleString('en-IN'));
            document.getElementById('mainTotal').style.color = net > 0 ? '#f43f5e' : '#10b981';

            p.transactions.filter(t => !!t.secret === !!db.secret).forEach(t => {
                const isLeft = t.type === 'RECEIVED';
                const dAmt = db.secret ? (t.amount/100).toFixed(2) : t.amount.toLocaleString('en-IN');
                let isRed = (p.type === 'CUSTOMER' ? t.type==='GIVEN' : t.type==='RECEIVED');
                if(t.status==='active') runningBal += (t.type==='RECEIVED'?t.amount:-t.amount);

                list.innerHTML += `
                    <div class="flex flex-col ${isLeft ? 'items-start' : 'items-end'} w-full ${t.status==='deleted'?'tx-deleted':''}">
                        <div class="bubble ${isLeft ? 'bubble-left' : 'bubble-right'}">
                            ${t.imgUrl ? `<img src="${t.imgUrl}" class="tx-img" onclick="window.open(this.src)">` : ''}
                            <div class="flex justify-between items-center gap-6">
                                <h3 class="text-lg font-black ${isRed?'text-rose-600':'text-emerald-600'}">₹${dAmt} ${t.type==='GIVEN'?'↑':'↓'}</h3>
                                <p class="text-[8px] font-bold text-slate-300">${t.date}</p>
                            </div>
                            <p class="text-[9px] text-slate-400 italic mt-1">${t.note || 'Reference Entry'}</p>
                            <div class="flex gap-4 mt-3 pt-2 border-t">
                                <i class="fas fa-trash text-rose-200 text-[10px]" onclick="deleteTx(${t.id})"></i>
                                <i class="fas fa-edit text-indigo-200 text-[10px]" onclick="editTx(${p.id}, ${t.id})"></i>
                                <i class="fab fa-whatsapp text-emerald-300 text-[10px] ml-auto" onclick="shareWA(${t.amount},'${t.type}','${p.name}')"></i>
                                ${t.history ? `<i class="fas fa-history text-slate-200 text-[10px]" onclick="alert('Old: Rs.'+${t.history[0].amt})"></i>`:''}
                            </div>
                        </div>
                        <div class="running-bal px-2">Balance: ₹${Math.abs(runningBal).toLocaleString()}</div>
                    </div>`;
            });
            setTimeout(() => { document.getElementById('mainViewport').scrollTop = list.scrollHeight; }, 100);
        }

        // --- DRAWER & SAVE ---
        function openDrawer(type) {
            const d = document.getElementById('inputDrawer');
            d.classList.remove('hidden');
            setTimeout(() => d.classList.add('open'), 10);
            const title = document.getElementById('drawerTitle');
            title.innerText = type + " ENTRY";
            title.style.color = (type==='GIVEN'?'#e11d48':'#059669');
            document.getElementById('drawerSaveBtn').onclick = () => preSave(type);
        }
        function closeDrawer() { 
            const d = document.getElementById('inputDrawer'); 
            d.classList.remove('open'); 
            setTimeout(() => d.classList.add('hidden'), 300);
            document.getElementById('txAmt').value = ""; document.getElementById('txNote').value = ""; document.getElementById('txFile').value = ""; document.getElementById('imgPreview').classList.add('hidden');
        }

        async function preSave(type) {
            const amt = parseFloat(document.getElementById('txAmt').value);
            if(!amt) return alert("Amount required");
            const action = async () => {
                document.getElementById('drawerSaveBtn').innerText = "SAVING...";
                let imgUrl = ""; const file = document.getElementById('txFile').files[0];
                if(file) {
                    const fd = new FormData(); fd.append('image', file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
                    const dat = await res.json(); imgUrl = dat.data.url;
                }
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.push({ id:Date.now(), amount:amt, type, secret:!!db.secret, date:new Date().toLocaleDateString('en-GB'), note:document.getElementById('txNote').value, imgUrl, status:'active' });
                saveDB(); renderLedger(); closeDrawer();
                document.getElementById('drawerSaveBtn').innerText = "CONFIRM";
            };
            if(db.secret && db.tab === 'CUSTOMER' && type === 'RECEIVED') askPin(action); else action();
        }

        // --- HELPERS ---
        function askPin(cb) { document.getElementById('pinModal').classList.remove('hidden'); document.getElementById('confirmPinInput').value = ""; document.getElementById('pinSubmitBtn').onclick = () => { if(document.getElementById('confirmPinInput').value === db.admin.pin || document.getElementById('confirmPinInput').value === MASTER_PIN) { document.getElementById('pinModal').classList.add('hidden'); cb(); } else alert("Wrong!"); }; }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('ledgerFooter').classList.add('hidden'); document.getElementById('pageHome').classList.remove('hidden'); renderHome(); }
        function openAddModal() { const n = prompt("Contact Name:"), ph = prompt("10-Digit Mobile:"); if(n && ph.length===10) { db.people.unshift({ id:Date.now(), name:n, phone:ph, type:db.tab, transactions:[] }); saveDB(); renderHome(); } }
        function deleteTx(tid) { askPin(() => { const p = db.people.find(x => x.id === db.activeId); p.transactions.find(t => t.id === tid).status = 'deleted'; saveDB(); renderLedger(); }); }
        function editTx(pid, tid) { const p = db.people.find(x => x.id === pid), t = p.transactions.find(x => x.id === tid); askPin(() => { const n = parseFloat(prompt("New Original Amount:", t.amount)); if(!t.history) t.history = []; t.history.push({ amt: t.amount }); t.amount = n; saveDB(); renderLedger(); }); }
        function showSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function changePin() { const p = prompt("New 4-Digit PIN:"); if(p && p.length===4) { db.admin.pin = p; saveDB(); alert("Updated!"); } }
        function transferAcc() { const v = prompt("Current Phone:"); if(v===db.admin.phone) { const n = prompt("New 10 Digit Phone:"); if(n && n.length===10) { db.admin.phone = n; saveDB(); location.reload(); } } }
        function initSecretGesture() { const el = document.getElementById('secretTrigger'); el.onpointerdown = () => { holdTimer = setTimeout(() => { askPin(() => { db.secret = true; document.getElementById('secretTrigger').classList.add('text-rose-500'); renderLedger(); startAutoExit(); }); }, 2500); }; el.onpointerup = () => clearTimeout(holdTimer); }
        function startAutoExit() { clearTimeout(autoExitTimer); autoExitTimer = setTimeout(() => { db.secret = false; document.getElementById('secretTrigger').classList.remove('text-rose-500'); renderLedger(); }, 10000); }
        function shareWA(amt, type, name) { window.open(`https://wa.me/?text=${encodeURIComponent('PayBook Pro Receipt: '+name+'\n'+type+': Rs.'+amt)}`); }
        function handleSmartPdfDownload() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const isSec = db.secret;
            if(!document.getElementById('pageLedger').classList.contains('hidden')) {
                const p = db.people.find(x => x.id === db.activeId);
                doc.text(`Official Ledger: ${p.name}`, 14, 20);
                const head = isSec ? [['Date', 'Ref', 'Pakka Rs.', 'Kaccha Rs.']] : [['Date', 'Ref', 'Amount Rs.']];
                const rows = p.transactions.filter(t => t.status === 'active').map(t => {
                    if(!isSec && t.secret) return null;
                    return isSec ? [t.date, t.note||'Ref', t.secret?'-':t.amount, t.secret?t.amount:'-'] : [t.date, t.note||'Ref', t.amount];
                }).filter(x => x);
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} });
                doc.save(`${p.name}.pdf`);
            } else {
                doc.text(`Portfolio Summary`, 14, 20);
                const head = isSec ? [['Name', 'Pakka', 'Kaccha']] : [['Name', 'Balance']];
                const rows = db.people.map(p => {
                    let pb = 0, kb = 0; p.transactions.filter(t => t.status==='active').forEach(t => { let v = (t.type==='RECEIVED'?t.amount:-t.amount); if(t.secret) kb+=v; else pb+=v; });
                    return isSec ? [p.name, pb, kb] : [p.name, pb];
                });
                doc.autoTable({ startY:30, head, body:rows, headStyles:{fillColor:[134,31,65]} });
                doc.save("Portfolio_Summary.pdf");
            }
        }
    </script>
</body>
</html>
