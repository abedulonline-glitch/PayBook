<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayBook Pro - Ultimate Ledger</title>
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDK (Compat Version for Browser) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <!-- PDF & Excel Support -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-50 font-sans pb-24 overflow-x-hidden selection:bg-indigo-100">

    <!-- ১. লোডিং স্ক্রিন -->
    <div id="loader" class="fixed inset-0 bg-white z-[1000] flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-indigo-600"></div>
    </div>

    <!-- ২. সাবস্ক্রিপশন ও অ্যাপ্রুভাল স্ক্রিন -->
    <div id="subScreen" class="hidden fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center p-10 text-center">
        <i class="fas fa-hourglass-half text-6xl text-amber-500 mb-6 animate-pulse"></i>
        <h2 class="text-2xl font-black mb-2 text-gray-800">অ্যাপ্রুভাল পেন্ডিং</h2>
        <p class="text-sm text-gray-500">আপনার একাউন্টটি সুপার অ্যাডমিন ভেরিফাই করছে। এপ্রুভ হলে অটোমেটিক অ্যাপটি খুলে যাবে।</p>
        <button onclick="shareApp()" class="mt-8 bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold flex items-center gap-2">
            <i class="fas fa-share-alt"></i> Share App
        </button>
    </div>

    <!-- ৩. অ্যাডমিন রেজিস্ট্রেশন স্ক্রিন -->
    <div id="regScreen" class="hidden fixed inset-0 bg-indigo-950 z-[400] p-8 text-white overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic">PayBook Pro</h1>
            <i class="fas fa-share-alt text-xl" onclick="shareApp()"></i>
        </div>
        <div class="space-y-4">
            <input type="text" id="regName" placeholder="আপনার নাম" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none">
            <input type="number" id="regPhone" placeholder="মোবাইল নম্বর" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none">
            <input type="password" id="regPin" placeholder="পিন (৪ ডিজিট)" maxlength="4" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none text-center text-2xl tracking-[15px]">
            <input type="password" id="regPinConf" placeholder="কনফার্ম পিন" maxlength="4" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none text-center text-2xl tracking-[15px]">
            
            <div class="p-4 bg-white/5 rounded-2xl text-[10px] opacity-70">
                <i class="fas fa-database mr-1"></i> এটি ক্লিক করলে আপনার Google Drive-এর সাথে কানেক্ট হবে এবং ব্যাকআপ পারমিশন নিবে।
            </div>
            <button onclick="startRegistration()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-xl shadow-2xl">REGISTER & CONNECT DRIVE</button>
        </div>
    </div>

    <!-- ৪. গ্লোবাল পিন মডাল (শুধুমাত্র সিক্রেট মোডের জন্য) -->
    <div id="pinModal" class="hidden fixed inset-0 bg-black/90 z-[600] flex items-center justify-center p-10">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 text-center animate-bounce-in">
            <h3 class="text-xl font-black mb-4">সিক্রেট পিন</h3>
            <input type="password" id="confirmPin" maxlength="4" class="w-full p-4 bg-gray-100 rounded-2xl text-center text-3xl tracking-[20px] outline-none">
            <div class="flex gap-4 mt-8">
                <button onclick="closePinModal()" class="flex-1 font-bold text-gray-400">CANCEL</button>
                <button id="pinSubmitBtn" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black">CONFIRM</button>
            </div>
        </div>
    </div>

    <!-- ৫. মেইন অ্যাপ UI -->
    <div id="mainApp" class="hidden">
        <header class="bg-indigo-900 text-white p-6 sticky top-0 z-50 rounded-b-[40px] shadow-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="adminInitial" onclick="showSettings()" class="w-10 h-10 bg-indigo-700 rounded-full flex items-center justify-center font-bold border border-white/30">A</div>
                    <h1 class="text-2xl font-black italic tracking-tighter">PayBook</h1>
                </div>
                <div class="flex gap-4 items-center">
                    <i class="fas fa-users-cog text-lg hidden" id="adminPanelBtn" onclick="openAdminDashboard()"></i>
                    <div id="secretBadge" onclick="exitSecretMode()" class="hidden bg-rose-500 px-3 py-1 rounded-full text-[9px] font-black animate-pulse uppercase">Secret Mode</div>
                </div>
            </div>
            <div class="mt-8">
                <p class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Net Balance (Pakka)</p>
                <div class="flex items-center gap-2">
                    <!-- এই ₹ চিহ্নে ৩ সেকেন্ড হোল্ড করলে সিক্রেট মোড আসবে -->
                    <span id="secretTrigger" class="text-4xl font-black cursor-pointer select-none">₹</span>
                    <h2 id="mainTotal" class="text-4xl font-black tracking-tighter">0.00</h2>
                </div>
            </div>
        </header>

        <!-- হোম পেজ (কন্টাক্ট লিস্ট) -->
        <div id="homePage" class="p-4 mt-4">
            <div class="flex bg-white p-1 rounded-2xl shadow-sm mb-6 border border-gray-100">
                <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white">CUSTOMERS</button>
                <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-xl text-xs font-black text-gray-400">SUPPLIERS</button>
            </div>
            <div id="contactList" class="space-y-4 pb-20"></div>
            <button onclick="openAddPersonModal()" class="fixed bottom-10 right-6 w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- লেজার পেজ -->
        <div id="ledgerPage" class="hidden p-4">
            <div class="flex justify-between items-center mb-6 px-2">
                <i class="fas fa-chevron-left text-xl text-gray-400" onclick="goHome()"></i>
                <div class="text-center">
                    <h2 id="activePersonName" class="font-black text-gray-800">Customer Name</h2>
                    <p id="activePersonPhone" class="text-[10px] text-gray-400 font-bold tracking-widest"></p>
                </div>
                <div class="flex gap-4">
                    <i class="fas fa-file-pdf text-xl text-indigo-600" onclick="generatePDF()"></i>
                </div>
            </div>

            <div id="txList" class="space-y-3 pb-72"></div>

            <!-- ট্রানজ্যাকশন ইনপুট -->
            <div class="fixed bottom-0 left-0 right-0 bg-white p-6 rounded-t-[50px] shadow-[0_-20px_60px_rgba(0,0,0,0.1)]">
                <div class="flex gap-3 mb-4">
                    <input type="number" id="txAmt" placeholder="0.00" class="flex-1 p-4 bg-gray-100 rounded-2xl text-2xl font-black outline-none focus:ring-2 ring-indigo-500">
                    <label class="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center cursor-pointer border-2 border-dashed border-gray-300 relative overflow-hidden">
                        <i class="fas fa-camera text-gray-400 text-xl"></i>
                        <input type="file" id="txImg" accept="image/*" class="hidden">
                        <img id="prevImg" class="hidden absolute inset-0 w-full h-full object-cover">
                    </label>
                </div>
                <input type="text" id="txNote" placeholder="কি বাবদ? (Note)" class="w-full p-4 bg-gray-100 rounded-2xl text-sm mb-4 outline-none">
                <div class="flex gap-4">
                    <button onclick="saveEntry('GIVEN')" class="flex-1 py-5 bg-rose-500 text-white rounded-2xl font-black shadow-lg">GIVEN</button>
                    <button onclick="saveEntry('RECEIVED')" class="flex-1 py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">RECEIVED</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ৭. মডালস (Add Person, Settings) -->
    <div id="addPersonModal" class="hidden fixed inset-0 bg-black/60 z-[300] flex items-end">
        <div class="bg-white w-full rounded-t-[50px] p-10 animate-slide-up">
            <h3 id="modalTitle" class="text-2xl font-black mb-6 text-indigo-900 uppercase italic">Add Contact</h3>
            <input id="newName" type="text" placeholder="নাম" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 outline-none border border-gray-200">
            <input id="newPhone" type="number" placeholder="ফোন নম্বর" class="w-full p-4 bg-gray-50 rounded-2xl mb-8 outline-none border border-gray-200">
            <div class="flex gap-4">
                <button onclick="closeModals()" class="flex-1 font-bold text-gray-400">CANCEL</button>
                <button onclick="confirmAddPerson()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black">CONFIRM</button>
            </div>
        </div>
    </div>

    <script>
        // ১. ফায়ারবেস ইনিশিয়ালাইজেশন
        const firebaseConfig = {
            apiKey: "AIzaSyD0j438UHEozebvHUnoJK58-YT3Sv4JbQQ",
            authDomain: "paybook-cc6be.firebaseapp.com",
            projectId: "paybook-cc6be",
            storageBucket: "paybook-cc6be.firebasestorage.app",
            messagingSenderId: "1000801647538",
            appId: "1:1000801647538:web:648ac804d8d75a0811c2ab"
        };

        firebase.initializeApp(firebaseConfig);
        const fs = firebase.firestore();
        const db_fs = firebase.firestore();
        const SUPER_ADMIN = "9851713487";

        let appData = { admin: null, people: [], secretMode: false, currentTab: 'CUSTOMER', activeId: null };
        let longPressTimer;

        // ২. অ্যাপ স্টার্টআপ চেক
        // ১. অ্যাপ ওপেন হওয়ার সময় এই লজিকটি কাজ করবে
window.onload = async () => {
    const saved = localStorage.getItem('pb_vFinal'); // আপনার লেটেস্ট লোকাল স্টোরেজ কী (Key)
    if(saved) {
        db = JSON.parse(saved);
        if(db.admin) {
            // যদি ইউজার রেজিস্টার্ড থাকে কিন্তু এপ্রুভড না হয়, তবে লিসেনার চালু হবে
            if(!db.approved) {
                startApprovalListener(db.admin.phone);
            }
            refreshView(); // স্ক্রিন দেখাবে (পেন্ডিং বা মেইন অ্যাপ)
        }
    } else {
        document.getElementById('regScreen').classList.remove('hidden');
    }
    document.getElementById('loader').classList.add('hidden');
    initSecretGesture();
};

// ২. রিয়েল-টাইম লিসেনার ফাংশন (এটি যাদুর মতো কাজ করবে!)
function startApprovalListener(phone) {
    console.log("Listening for approval for: " + phone);
    
    // Firestore-এর onSnapshot ব্যবহার করা হয়েছে যা ডাটাবেস পরিবর্তনের সাথে সাথে কাজ করে
    fs.collection("users").doc(phone).onSnapshot((doc) => {
        if (doc.exists()) {
            const userData = doc.data();
            if (userData.status === 'approved') {
                console.log("User Approved! Unlocking app...");
                
                // লোকাল ডাটা আপডেট করা
                db.approved = true;
                if(db.admin) db.admin.status = 'approved';
                
                saveDB(); // লোকাল স্টোরেজে সেভ করা
                
                // ১ সেকেন্ড অপেক্ষা করে অ্যাপ রিলোড দেওয়া যাতে ইউজার বুঝতে পারে
                setTimeout(() => {
                    alert("অভিনন্দন! আপনার অ্যাকাউন্টটি এপ্রুভ করা হয়েছে।");
                    location.reload(); 
                }, 1000);
            }
        }
    }, (error) => {
        console.error("Listener Error: ", error);
    });
}

        function toggleScreens() {
            const { admin } = appData;
            document.getElementById('regScreen').classList.toggle('hidden', !!admin);
            if(admin) {
                if(appData.admin.status === 'approved') {
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('subScreen').classList.add('hidden');
                    renderHome();
                    if(admin.phone === SUPER_ADMIN) document.getElementById('adminPanelBtn').classList.remove('hidden');
                } else {
                    document.getElementById('subScreen').classList.remove('hidden');
                }
            }
        }

        // ৩. রেজিস্ট্রেশন ফাংশন (Firestore-এ ডাটা পাঠাবে)
        async function startRegistration() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const pin = document.getElementById('regPin').value.trim();
    const conf = document.getElementById('regPinConf').value.trim();

    // ভ্যালিডেশন চেক এবং এরর মেসেজ
    if (!name) {
        alert("দয়া করে আপনার নাম লিখুন");
        return;
    }
    if (phone.length < 10) {
        alert("মোবাইল নম্বরটি কমপক্ষে ১০ ডিজিটের হতে হবে");
        return;
    }
    if (pin.length < 4) {
        alert("পিন অবশ্যই ৪ ডিজিটের হতে হবে");
        return;
    }
    if (pin !== conf) {
        alert("পিন এবং কনফার্ম পিন মেলেনি! আবার চেক করুন।");
        return;
    }

    try {
        // লোডিং বাটন টেক্সট পরিবর্তন
        const btn = event.target;
        btn.innerText = "Processing...";
        btn.disabled = true;

        // সুপার অ্যাডমিন হলে সরাসরি এপ্রুভড হবে
        const status = (phone === SUPER_ADMIN_PHONE) ? "approved" : "pending";
        
        // ফায়ারবেস ফায়ারস্টোর-এ ডাটা সেভ করা
        await fs.collection("users").doc(phone).set({
            name: name,
            phone: phone,
            pin: pin,
            status: status,
            regDate: new Date().toISOString()
        });

        // লোকাল স্টোরেজে ডাটা সেভ করা
        db.admin = { name, phone, pin, status };
        db.approved = (status === 'approved');
        
        saveDB(); // লোকাল স্টোরেজে সেভ করার ফাংশন

        alert("রেজিস্ট্রেশন সফল হয়েছে!");
        location.reload(); // অ্যাপ রিলোড হবে

    } catch (e) {
        console.error("Registration Error: ", e);
        alert("রেজিস্ট্রেশন করা যায়নি। ইন্টার্নেট কানেকশন চেক করুন।");
        event.target.innerText = "REGISTER & CONNECT DRIVE";
        event.target.disabled = false;
    }
}

        async function syncApprovalStatus() {
            try {
                const doc = await db_fs.collection("users").doc(appData.admin.phone).get();
                if(doc.exists()) {
                    appData.admin.status = doc.data().status;
                    saveLocal();
                }
            } catch (e) { console.error(e); }
        }

        // ৪. স্মার্ট জেস্টচার (₹ চিহ্নে ৩ সেকেন্ড হোল্ড)
        function setupSecretGesture() {
            const el = document.getElementById('secretTrigger');
            el.addEventListener('touchstart', () => {
                longPressTimer = setTimeout(() => {
                    askPin(() => {
                        appData.secretMode = true;
                        document.getElementById('secretBadge').classList.remove('hidden');
                        document.getElementById('secretTrigger').classList.add('text-rose-500');
                        renderAll();
                        // ৫ সেকেন্ডে অটো এক্সিট
                        setTimeout(exitSecretMode, 5000);
                    });
                }, 3000);
            });
            el.addEventListener('touchend', () => clearTimeout(longPressTimer));
        }

        function exitSecretMode() {
            appData.secretMode = false;
            document.getElementById('secretBadge').classList.add('hidden');
            document.getElementById('secretTrigger').classList.remove('text-rose-500');
            renderAll();
        }

        // ৫. পিন মডাল লজিক
        function askPin(callback) {
            document.getElementById('pinModal').classList.remove('hidden');
            document.getElementById('confirmPin').value = "";
            document.getElementById('pinSubmitBtn').onclick = () => {
                if(document.getElementById('confirmPin').value === appData.admin.pin) {
                    closePinModal();
                    callback();
                } else alert("ভুল পিন!");
            };
        }
        function closePinModal() { document.getElementById('pinModal').classList.add('hidden'); }

        // ৬. ট্রানজ্যাকশন লজিক
        function saveEntry(type) {
            // সিক্রেট মোড অথবা রিসিভড হলে পিন লাগবে
            if(appData.secretMode || type === 'RECEIVED') {
                askPin(() => commitEntry(type));
            } else {
                commitEntry(type);
            }
        }

        function commitEntry(type) {
            const amt = parseFloat(document.getElementById('txAmt').value);
            if(!amt) return alert("অ্যামাউন্ট দিন");

            const person = appData.people.find(p => p.id === appData.activeId);
            const entry = {
                id: Date.now(),
                amount: amt,
                type: type,
                date: new Date().toLocaleDateString('bn-BD'),
                isKaccha: appData.secretMode,
                note: document.getElementById('txNote').value,
                status: 'active'
            };

            person.transactions.unshift(entry);
            saveLocal();
            renderLedger();
            // Reset fields
            document.getElementById('txAmt').value = "";
            document.getElementById('txNote').value = "";
        }

        // ৭. রেন্ডার লজিক (Home & Ledger)
        function renderHome() {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            let net = 0;

            const filtered = appData.people.filter(p => p.type === appData.currentTab);
            filtered.forEach(p => {
                const bal = calcBal(p.transactions, false);
                net += bal;
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-5 rounded-[35px] shadow-sm border border-gray-100 flex justify-between items-center active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center font-black text-xl">${p.name[0]}</div>
                            <div>
                                <h4 class="font-black text-gray-800">${p.name}</h4>
                                <p class="text-[10px] text-gray-400 font-bold">${p.phone}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h5 class="font-black ${bal < 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${Math.abs(bal).toLocaleString()}</h5>
                            <p class="text-[8px] uppercase font-bold text-gray-300">${bal < 0 ? 'Due' : 'Get'}</p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('mainTotal').innerText = net.toLocaleString();
        }

        function renderLedger() {
            const person = appData.people.find(p => p.id === appData.activeId);
            const list = document.getElementById('txList');
            list.innerHTML = "";

            person.transactions.forEach(t => {
                // স্মার্ট ফিল্টার: পাকা লেজারে শুধু পাকা, কাঁচা লেজারে সব
                if(!appData.secretMode && t.isKaccha) return;

                const isDel = t.status === 'deleted';
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[30px] border border-gray-100 flex justify-between items-center shadow-sm ${isDel ? 'opacity-30' : ''} ${t.isKaccha ? 'border-l-4 border-l-rose-400' : ''}">
                        <div>
                            <p class="text-[9px] font-black text-gray-400 uppercase">${t.date} ${t.isKaccha ? '● Secret' : ''}</p>
                            <h4 class="font-black text-gray-700">${t.type}</h4>
                            <p class="text-[10px] text-gray-400 italic">${t.note || ''}</p>
                        </div>
                        <div class="text-right">
                            <h3 class="text-xl font-black ${t.type==='GIVEN'?'text-rose-500':'text-emerald-600'}">₹${t.amount.toLocaleString()}</h3>
                            ${!isDel ? `<button onclick="softDelete(${t.id})" class="text-[8px] text-gray-300 font-bold uppercase">Delete</button>` : '<span class="text-[8px] text-gray-300 italic">Canceled</span>'}
                        </div>
                    </div>
                `;
            });
        }

        // ৮. সুপার অ্যাডমিন ড্যাশবোর্ড
        // সংশোধিত অ্যাডমিন ড্যাশবোর্ড ফাংশন
async function openAdminDashboard() {
    try {
        // চেক করুন fs এবং SUPER_ADMIN তৈরি আছে কি না
        if (typeof fs === "undefined") {
            alert("Error: Firebase Firestore (fs) is not initialized!");
            return;
        }

        const modal = document.createElement('div');
        modal.className = "fixed inset-0 bg-white z-[1000] p-6 overflow-y-auto";
        modal.innerHTML = `
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic text-indigo-900">Approve Users</h2>
                <i class="fas fa-times text-2xl text-gray-400" onclick="this.closest('div.fixed').remove()"></i>
            </div>
            <div id="uList" class="space-y-4">Loading Users...</div>
        `;
        document.body.appendChild(modal);

        // ডাটাবেস থেকে ইউজার নিয়ে আসা
        const snap = await fs.collection("users").get();
        const cont = document.getElementById('uList');
        cont.innerHTML = "";

        if (snap.empty) {
            cont.innerHTML = "<p class='text-center text-gray-400'>কোন ইউজার পাওয়া যায়নি।</p>";
            return;
        }

        snap.forEach(doc => {
            const u = doc.data();
            if (u.phone === SUPER_ADMIN) return;

            cont.innerHTML += `
                <div class="p-5 bg-gray-50 rounded-[25px] border border-gray-100 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-black text-gray-800">${u.name}</p>
                        <p class="text-xs text-gray-400">${u.phone}</p>
                        <span class="text-[9px] font-black uppercase ${u.status === 'approved' ? 'text-emerald-500' : 'text-amber-500'}">
                            Status: ${u.status}
                        </span>
                    </div>
                    <div>
                        ${u.status === 'pending' ? 
                          `<button onclick="approveUser('${u.phone}')" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-lg">Approve</button>` : 
                          `<i class="fas fa-check-circle text-emerald-500 text-xl"></i>`}
                    </div>
                </div>`;
        });
    } catch (error) {
        alert("ড্যাশবোর্ড খুলতে সমস্যা হচ্ছে: " + error.message);
    }
}

// সংশোধিত অ্যাপ্রুভ ফাংশন
// এই ফাংশনটি নিশ্চিত করুন যে স্ক্রিপ্টের একদম মেইন লেভেলে (বাইরে) আছে
window.approveUser = async function(ph) {
    try {
        console.log("Approve request for: " + ph);
        
        // ১. লোডিং ইন্ডিকেটর (অপশনাল কিন্তু ভালো)
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "Processing...";
        btn.disabled = true;

        // ২. ফায়ারবেস ডাটাবেসে স্ট্যাটাস আপডেট
        // ph যেহেতু ডক আইডি, তাই সরাসরি এক্সেস করা হচ্ছে
        await fs.collection("users").doc(ph.toString()).update({
            status: 'approved'
        });

        alert("ইউজার " + ph + " সফলভাবে এপ্রুভ হয়েছে!");
        
        // ৩. ড্যাশবোর্ড রিফ্রেশ করা
        // আমরা সরাসরি প্যানেলটি রিমুভ করে আবার লোড করছি
        const currentModal = document.querySelector('div.fixed.inset-0.bg-white.z-\\[1000\\]');
        if (currentModal) currentModal.remove();
        
        // পুনরায় অ্যাডমিন ড্যাশবোর্ড ওপেন করা যাতে আপডেট দেখা যায়
        openAdminDashboard();

    } catch (error) {
        console.error("Approval error:", error);
        alert("অ্যাপ্রুভ করা যায়নি। এরর: " + error.message);
        
        // বাটন ঠিক করা যদি এরর হয়
        const btn = event.target;
        btn.innerText = "Approve";
        btn.disabled = false;
    }
};

        async function approveUser(ph) {
            await db_fs.collection("users").doc(ph).update({ status: 'approved' });
            alert("ইউজার এপ্রুভ হয়েছে!");
            openAdminDashboard();
        }

        // ৯. পিডিএফ জেনারেশন
        function generatePDF() {
            const person = appData.people.find(p => p.id === appData.activeId);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`PayBook Report: ${person.name}`, 14, 20);
            doc.save(`${person.name}_Ledger.pdf`);
        }

        // হেল্পার ফাংশনস
        function saveLocal() { localStorage.setItem('pb_v4_store', JSON.stringify(appData)); }
        function switchTab(t) { appData.currentTab = t; renderHome(); }
        function openLedger(id) { 
            appData.activeId = id; 
            const p = appData.people.find(x => x.id === id);
            document.getElementById('activePersonName').innerText = p.name;
            document.getElementById('activePersonPhone').innerText = p.phone;
            document.getElementById('homePage').classList.add('hidden'); 
            document.getElementById('ledgerPage').classList.remove('hidden'); 
            renderLedger(); 
        }
        function goHome() { document.getElementById('ledgerPage').classList.add('hidden'); document.getElementById('homePage').classList.remove('hidden'); renderHome(); }
        function openAddPersonModal() { document.getElementById('addPersonModal').classList.remove('hidden'); }
        function closeModals() { document.getElementById('addPersonModal').classList.add('hidden'); }
        function confirmAddPerson() {
            const name = document.getElementById('newName').value;
            const phone = document.getElementById('newPhone').value;
            if(!name || !phone) return alert("তথ্য দিন");
            appData.people.unshift({ id: Date.now(), name, phone, type: appData.currentTab, transactions: [] });
            saveLocal(); closeModals(); renderHome();
        }
        function calcBal(txs, kaccha) {
            let b = 0;
            txs.filter(t => t.status === 'active' && t.isKaccha === kaccha).forEach(t => b += (t.type === 'RECEIVED' ? t.amount : -t.amount));
            return b;
        }
        function softDelete(tid) {
            const p = appData.people.find(x => x.id === appData.activeId);
            p.transactions.find(t => t.id === tid).status = 'deleted';
            saveLocal(); renderLedger();
        }
        function renderAll() { if(document.getElementById('homePage').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function shareApp() {
            const msg = `PayBook Pro: আমার ব্যবসার ডিজিটাল লেজার। ট্রাই করে দেখুন! https://paybook-cc6be.web.app`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
