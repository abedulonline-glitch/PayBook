<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayBook Pro - Professional Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-field { @apply w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none focus:border-indigo-500 transition-all text-white placeholder-slate-400; }
        .btn-primary { @apply w-full py-5 rounded-2xl font-black text-lg shadow-2xl active:scale-95 transition-all; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tx-deleted { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; pointer-events: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 overflow-x-hidden">

    <!-- 1. AUTH SCREEN (Register & Login) -->
    <div id="authScreen" class="hidden fixed inset-0 z-[200] flex flex-col items-center justify-center p-8 bg-[#0f172a]">
        <div class="w-full max-w-md space-y-8 animate-fade-in">
            <div class="text-center">
                <h1 class="text-5xl font-black italic tracking-tighter text-white">PayBook<span class="text-indigo-500">.</span></h1>
                <p id="authSubtitle" class="text-xs uppercase tracking-[0.2em] text-slate-500 mt-2 font-bold">Secure Business Ledger</p>
            </div>

            <!-- Registration Form -->
            <div id="regBox" class="hidden space-y-4">
                <input type="text" id="regName" placeholder="Business/Admin Name" class="input-field">
                <input type="number" id="regPhone" placeholder="Mobile Number" class="input-field">
                <div class="grid grid-cols-2 gap-3">
                    <input type="password" id="regPin" placeholder="4-Digit PIN" maxlength="4" class="input-field text-center tracking-widest">
                    <input type="password" id="regPinConf" placeholder="Confirm PIN" maxlength="4" class="input-field text-center tracking-widest">
                </div>
                <button onclick="handleRegistration()" class="btn-primary bg-indigo-600 text-white mt-4">CREATE ACCOUNT</button>
            </div>

            <!-- Login Form -->
            <div id="loginBox" class="hidden space-y-6">
                <div class="text-center space-y-1">
                    <p class="text-indigo-400 font-bold" id="welcomeMsg">Welcome Back</p>
                    <p id="displayPhone" class="text-xs text-slate-500"></p>
                </div>
                <input type="password" id="loginPin" placeholder="Enter PIN" maxlength="4" class="input-field text-center text-3xl tracking-[1.5em] h-20">
                <button onclick="handleLogin()" class="btn-primary bg-emerald-600 text-white">UNLOCK APP</button>
                <div class="text-center">
                    <button onclick="forgotPin()" class="text-[10px] text-slate-500 uppercase tracking-widest hover:text-indigo-400 transition-colors">Forgot PIN? Reset via Phone</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP CONTENT -->
    <div id="appBody" class="hidden min-h-screen bg-slate-50 text-slate-900 pb-24">
        <!-- Modern Header -->
        <header class="bg-indigo-900 text-white p-6 sticky top-0 z-50 rounded-b-[40px] shadow-2xl">
            <div class="flex justify-between items-center">
                <h1 onclick="location.reload()" class="text-2xl font-black italic tracking-tighter">PayBook</h1>
                <div class="flex gap-5 items-center">
                    <i class="fas fa-chart-pie text-xl opacity-70" onclick="showFullReport()"></i>
                    <div id="userAvatar" class="w-10 h-10 bg-indigo-800 rounded-full flex items-center justify-center border border-white/20 font-bold text-xs">AD</div>
                </div>
            </div>
            <div class="mt-8 flex justify-between items-end">
                <div>
                    <p class="text-[10px] uppercase font-bold text-indigo-300 tracking-widest mb-1">Net Balance (Pakka)</p>
                    <div class="flex items-center gap-3">
                        <span id="secretTrigger" class="text-4xl font-black select-none cursor-pointer transition-all active:scale-75">₹</span>
                        <h2 id="mainTotal" class="text-4xl font-extrabold tracking-tighter">0.00</h2>
                    </div>
                </div>
                <div id="kacchaIndicator" class="hidden bg-rose-500 px-3 py-1 rounded-full text-[10px] font-black animate-pulse uppercase text-white mb-2">Secret Mode</div>
            </div>
        </header>

        <!-- Home: Contact List -->
        <div id="pageHome" class="p-5 animate-fade-in">
            <div class="flex bg-white p-1 rounded-2xl shadow-sm mb-6 border border-slate-100">
                <button onclick="switchTab('CUSTOMER')" id="tabCust" class="flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white transition-all">CUSTOMERS</button>
                <button onclick="switchTab('SUPPLIER')" id="tabSupp" class="flex-1 py-3 rounded-xl text-xs font-black text-slate-400">SUPPLIERS</button>
            </div>
            <div id="contactList" class="space-y-4"></div>
            <!-- FAB -->
            <button onclick="openAddModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-2xl shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-all">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- Ledger Screen -->
        <div id="pageLedger" class="hidden p-5 animate-fade-in">
            <div class="flex justify-between items-center mb-6 px-1">
                <i class="fas fa-chevron-left text-xl text-slate-400" onclick="goHome()"></i>
                <div class="text-center">
                    <h2 id="lName" class="text-xl font-extrabold text-slate-800 tracking-tight">Name</h2>
                    <p id="lPhone" class="text-[10px] text-slate-400 font-bold tracking-widest"></p>
                </div>
                <i class="fas fa-info-circle text-lg text-slate-300"></i>
            </div>
            <div id="ledgerList" class="space-y-4 pb-72"></div>

            <!-- Transaction Dock -->
            <div class="fixed bottom-0 left-0 right-0 bg-white p-6 rounded-t-[40px] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] border-t border-slate-100">
                <div class="flex gap-3 mb-4">
                    <div class="flex-1 relative">
                        <input type="number" id="txAmt" placeholder="0.00" class="w-full p-5 bg-slate-100 rounded-2xl font-black text-3xl outline-none border-2 border-transparent focus:border-indigo-500">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₹</span>
                    </div>
                    <!-- Combined Camera & Gallery Support -->
                    <label class="w-20 h-20 bg-slate-100 rounded-2xl flex items-center justify-center relative cursor-pointer active:bg-slate-200 transition-all border-2 border-dashed border-slate-300">
                        <i class="fas fa-camera text-slate-400 text-2xl"></i>
                        <input type="file" id="txFile" accept="image/*" class="hidden">
                        <img id="imgPreview" class="hidden absolute inset-0 w-full h-full object-cover rounded-2xl">
                    </label>
                </div>
                <input type="text" id="txNote" placeholder="What is this for? (Optional Note)" class="w-full p-4 bg-slate-100 rounded-2xl text-sm mb-5 outline-none">
                <div class="flex gap-3">
                    <button onclick="preSave('GIVEN')" class="flex-1 py-5 bg-rose-500 text-white rounded-2xl font-black shadow-lg shadow-rose-200 uppercase tracking-widest">Given</button>
                    <button onclick="preSave('RECEIVED')" class="flex-1 py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-200 uppercase tracking-widest">Received</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PIN MODAL (Universal) -->
    <div id="pinModal" class="hidden fixed inset-0 bg-slate-900/90 z-[300] backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 text-center shadow-2xl">
            <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6 text-indigo-600 text-3xl">
                <i class="fas fa-lock"></i>
            </div>
            <h3 class="text-xl font-extrabold text-slate-800 mb-2">Security Verification</h3>
            <p class="text-xs text-slate-400 mb-8 px-4 leading-relaxed">Please enter your 4-digit secret PIN to authorize this action.</p>
            <input type="password" id="confirmPinInput" maxlength="4" class="w-full p-5 bg-slate-100 rounded-2xl text-center text-4xl tracking-[1em] outline-none border-2 border-transparent focus:border-indigo-500">
            <div class="flex gap-4 mt-10">
                <button onclick="closePinModal()" class="flex-1 font-bold text-slate-400 uppercase tracking-widest text-[10px]">Cancel</button>
                <button id="pinSubmitBtn" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100">CONFIRM</button>
            </div>
        </div>
    </div>

    <!-- Image Zoom Modal -->
<div id="zoomModal" class="hidden fixed inset-0 bg-black/95 z-[500] flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
    <img id="zoomImg" src="" class="max-w-full max-h-full rounded-lg shadow-2xl transition-transform duration-300">
    <div class="absolute top-10 right-10 text-white text-3xl"><i class="fas fa-times"></i></div>
</div>

    <!-- ADD PERSON MODAL -->
    <div id="addModal" class="hidden fixed inset-0 bg-slate-900/60 z-[150] backdrop-blur-sm flex items-end">
        <div class="bg-white w-full rounded-t-[50px] p-10 shadow-2xl">
            <h3 id="addModalTitle" class="text-2xl font-black mb-8 text-slate-800 tracking-tight text-center">New Customer Account</h3>
            <div class="space-y-4">
                <input id="newPName" type="text" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl outline-none">
                <input id="newPPhone" type="number" placeholder="Unique Mobile Number" class="w-full p-5 bg-slate-100 rounded-2xl outline-none">
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeAddModal()" class="flex-1 font-bold text-slate-400 uppercase tracking-widest text-[10px]">Cancel</button>
                <button onclick="confirmAdd()" class="flex-1 py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 uppercase tracking-widest">Create Profile</button>
            </div>
        </div>
    </div>

    <script>
         // ১. ImgBB API Key (অবশ্যই আপনার কি এখানে দিন)
const IMGBB_API_KEY = '493904e927fb86161e0a4944d5b28de6';

// ২. ImgBB-তে ছবি আপলোড করার আসল ফাংশন
async function uploadToImgBB(file) {
    const formData = new FormData();
    formData.append('image', file);

    try {
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        if (data.success) {
            return data.data.url; // এটি অনলাইন ছবির লিঙ্ক দিবে
        } else {
            console.error("ImgBB Error:", data.error);
            return "";
        }
    } catch (err) {
        console.error("Upload failed:", err);
        return "";
    }
}

// ৩. ইমেজ প্রিভিউ হ্যান্ডলার (এটি আপনার ফাইলে চেক করুন)
document.getElementById('txFile').onchange = e => {
    const file = e.target.files[0];
    const preview = document.getElementById('imgPreview');
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            preview.src = event.target.result;
            preview.classList.remove('hidden'); // ছবি সিলেক্ট করলে প্রিভিউ দেখাবে
        };
        reader.readAsDataURL(file);
    }
};
        
        // APP LOGIC
        let db = { admin: null, people: [], secret: false, tab: 'CUSTOMER', activeId: null };
        let holdTimer;

        window.onload = () => {
            const data = localStorage.getItem('pb_pro_ledger_v3');
            if(data) {
                db = JSON.parse(data);
                if(db.admin) {
                    showLogin();
                } else showReg();
            } else showReg();
            
            initGestures();
            
            // Image Preview Handler
            document.getElementById('txFile').onchange = e => {
                const img = document.getElementById('imgPreview');
                if(e.target.files[0]) {
                    img.src = URL.createObjectURL(e.target.files[0]);
                    img.classList.remove('hidden');
                }
            };
        };

        function showReg() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('regBox').classList.remove('hidden'); 
            document.getElementById('authSubtitle').innerText = "Account Setup";
        }
        function showLogin() { 
            document.getElementById('authScreen').classList.remove('hidden'); 
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('displayPhone').innerText = "Logged in as " + db.admin.phone;
            document.getElementById('userAvatar').innerText = db.admin.name.substring(0,2).toUpperCase();
        }

        async function handleRegistration() {
            const n = document.getElementById('regName').value;
            const ph = document.getElementById('regPhone').value;
            const p1 = document.getElementById('regPin').value;
            const p2 = document.getElementById('regPinConf').value;

            if(!n || ph.length < 10 || p1.length < 4 || p1 !== p2) return alert("Please fill all fields correctly. PINs must match.");
            
            db.admin = { name: n, phone: ph, pin: p1 };
            saveDB();
            location.reload();
        }

        function handleLogin() {
            if(document.getElementById('loginPin').value === db.admin.pin) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appBody').classList.remove('hidden');
                renderHome();
            } else alert("Invalid PIN. Please try again.");
        }

        // Secret Toggle (Hold ₹ for 2s)
        function initGestures() {
            const el = document.getElementById('secretTrigger');
            el.onpointerdown = () => {
                holdTimer = setTimeout(() => {
                    askPin(() => {
                        db.secret = !db.secret;
                        document.getElementById('kacchaIndicator').classList.toggle('hidden');
                        document.getElementById('secretTrigger').classList.toggle('text-rose-500');
                        refresh();
                        alert(db.secret ? "Switched to Private Ledger" : "Switched to Main Ledger");
                    });
                }, 2000);
            };
            el.onpointerup = () => clearTimeout(holdTimer);
        }

        function askPin(callback) {
            const modal = document.getElementById('pinModal');
            modal.classList.remove('hidden');
            document.getElementById('confirmPinInput').value = "";
            document.getElementById('confirmPinInput').focus();
            document.getElementById('pinSubmitBtn').onclick = () => {
                if(document.getElementById('confirmPinInput').value === db.admin.pin) {
                    modal.classList.add('hidden');
                    callback();
                } else alert("Incorrect Security PIN!");
            };
        }
        function closePinModal() { document.getElementById('pinModal').classList.add('hidden'); }

        // Core Functions
        function switchTab(t) {
            db.tab = t;
            document.getElementById('tabCust').className = t==='CUSTOMER' ? 'flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white' : 'flex-1 py-3 rounded-xl text-xs font-black text-slate-400';
            document.getElementById('tabSupp').className = t==='SUPPLIER' ? 'flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white' : 'flex-1 py-3 rounded-xl text-xs font-black text-slate-400';
            renderHome();
        }

        function renderHome() {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            let netTotal = 0;
            
            db.people.filter(p => p.type === db.tab).forEach(p => {
                const bal = calcBalance(p.transactions, false);
                netTotal += bal;
                list.innerHTML += `
                    <div onclick="openLedger(${p.id})" class="bg-white p-6 rounded-[35px] border border-slate-100 flex justify-between items-center shadow-sm active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-indigo-50 text-indigo-700 rounded-2xl flex items-center justify-center font-black text-xl">${p.name[0]}</div>
                            <div>
                                <h4 class="font-extrabold text-slate-800">${p.name}</h4>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${p.phone}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <h5 class="font-black ${bal < 0 ? 'text-rose-500' : 'text-emerald-600'}">₹${Math.abs(bal).toLocaleString()}</h5>
                            <p class="text-[7px] uppercase font-bold text-slate-300 tracking-widest">${bal < 0 ? 'You Pay' : 'You Get'}</p>
                        </div>
                    </div>
                `;
            });
            document.getElementById('mainTotal').innerText = netTotal.toLocaleString();
        }

        function openLedger(id) {
            db.activeId = id;
            const p = db.people.find(x => x.id === id);
            document.getElementById('lName').innerText = p.name;
            document.getElementById('lPhone').innerText = p.phone;
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageLedger').classList.remove('hidden');
            renderLedger();
        }

        function renderLedger() {
    const p = db.people.find(x => x.id === db.activeId);
    const list = document.getElementById('ledgerList');
    list.innerHTML = "";
    
    const netBal = calcBalance(p.transactions, db.secret, p.type);
    const balEl = document.getElementById('mainTotal');
    balEl.innerText = "₹ " + Math.abs(netBal).toLocaleString();
    
    // মেইন ব্যালেন্স কালার লজিক
    if (p.type === 'SUPPLIER') {
        balEl.style.color = netBal > 0 ? '#f43f5e' : '#10b981'; // দেনা লাল, অগ্রিম সবুজ
    } else {
        balEl.style.color = netBal > 0 ? '#10b981' : '#f43f5e'; // পাওনা সবুজ, অ্যাডভান্স লাল
    }

    const txs = p.transactions.filter(t => t.secret === db.secret);
    
    txs.forEach(t => {
        const isDel = t.status === 'deleted';
        
        // বাটন অনুযায়ী এলাইনমেন্ট: GIVEN বামে (Left), RECEIVED ডানে (Right)
        const isLeft = t.type === 'GIVEN';
        const alignClass = isLeft ? 'items-start pl-2' : 'items-end pr-2';
        
        // বাবল স্টাইল (বামে ও ডানের জন্য আলাদা কর্নার রাউন্ডিং)
        const bubbleStyle = isLeft ? 'rounded-tr-3xl rounded-bl-3xl rounded-br-3xl' 
                                   : 'rounded-tl-3xl rounded-bl-3xl rounded-br-3xl text-right';

        // কালার লজিক (সাপ্লায়ার ও কাস্টমার ভেদে আলাদা)
        let txColor = "";
        let txArrow = t.type === 'GIVEN' ? '<i class="fas fa-arrow-up ml-1 text-xs"></i>' : '<i class="fas fa-arrow-down mr-1 text-xs"></i>';
        
        if (p.type === 'SUPPLIER') {
            txColor = t.type === 'GIVEN' ? 'text-emerald-600' : 'text-rose-500'; // মহাজনকে দিলে সবুজ, মাল নিলে লাল
        } else {
            txColor = t.type === 'GIVEN' ? 'text-rose-500' : 'text-emerald-600'; // খদ্দেরকে মাল দিলে লাল, টাকা পেলে সবুজ
        }

        list.innerHTML += `
            <div class="flex flex-col ${alignClass} mb-8 w-full animate-fade-in ${isDel ? 'tx-deleted' : ''}">
                <!-- Date Badge -->
                <div class="text-[9px] font-black bg-slate-100 text-slate-400 px-4 py-1 rounded-full mb-3 uppercase tracking-widest">
                    ${t.date}
                </div>

                <!-- Transaction Card -->
                <div class="w-[85%] max-w-[400px] ${bubbleStyle} bg-white shadow-md p-2 border border-slate-100">
                    <!-- Image Box (বড় করে দেখানোর জন্য) -->
                    <div class="relative overflow-hidden rounded-2xl bg-slate-50 aspect-[4/3] mb-3">
                        <img src="${t.imgUrl || 'https://via.placeholder.com/400x300?text=No+Bill+Attached'}" 
                             class="w-full h-full object-cover cursor-zoom-in"
                             onclick="zoomImage(this.src)">
                        <div class="absolute bottom-2 ${isLeft ? 'right-2' : 'left-2'} bg-black/30 text-white p-1 rounded-lg text-[7px] uppercase">
                            <i class="fas fa-expand"></i> Tap to Zoom
                        </div>
                    </div>

                    <!-- Details Area -->
                    <div class="px-3 pb-2">
                        <div class="flex ${isLeft ? 'justify-start' : 'justify-end'} items-center mb-1">
                            ${isLeft ? '' : txArrow}
                            <h3 class="text-2xl font-black text-slate-800 tracking-tighter">₹${t.amount.toLocaleString()}</h3>
                            ${isLeft ? txArrow : ''}
                        </div>
                        
                        <div class="flex ${isLeft ? 'justify-start' : 'justify-end'} items-center gap-3">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${t.type}</p>
                            <span class="text-[8px] text-slate-300">Sent <i class="fas fa-check-double text-indigo-400"></i></span>
                        </div>

                        ${t.note ? `<div class="mt-3 p-3 bg-slate-50 rounded-xl text-[10px] text-slate-500 italic border-l-2 border-indigo-100">${t.note}</div>` : ''}
                        
                        <div class="mt-4 flex gap-4 ${isLeft ? 'justify-start' : 'justify-end'} border-t border-slate-50 pt-2">
                            <button onclick="deleteTx(${t.id})" class="text-[8px] font-bold text-rose-300 hover:text-rose-500 uppercase">Delete</button>
                            <button onclick="shareWA(${t.amount}, '${t.type}')" class="text-[8px] font-bold text-indigo-500 uppercase tracking-widest">Share Bill</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
}
        // ১. ইমেজকে চিরস্থায়ী ডাটাতে রূপান্তর করার ফাংশন
function fileToDataURL(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
        reader.readAsDataURL(file);
    });
}

// ২. আপডেট করা preSave ফাংশন (যা ইমেজ সেভ করবে)
async function preSave(type) {
    const amtInput = document.getElementById('txAmt');
    const amt = parseFloat(amtInput.value);
    
    if(!amt) return alert("Please enter an amount");

    // এই ফাংশনটি আসলে ডাটা সেভ এবং আপলোড করবে
    const saveAction = async () => {
        // লোডিং বাটন আপডেট (ঐচ্ছিক)
        const saveBtn = document.getElementById('pinSubmitBtn');
        if(saveBtn) saveBtn.innerText = "Processing...";
        
        const fileInput = document.getElementById('txFile');
        let onlineImgUrl = "";

        // ছবি থাকলে আপলোড হবে
        if (fileInput.files && fileInput.files[0]) {
            onlineImgUrl = await uploadToImgBB(fileInput.files[0]);
        }

        const p = db.people.find(x => x.id === db.activeId);
        p.transactions.unshift({
            id: Date.now(),
            amount: amt,
            type: type,
            secret: db.secret, // এটি বর্তমানে কাঁচা নাকি পাকা মোডে আছে তা চেক করবে
            date: new Date().toLocaleDateString('en-GB'),
            note: document.getElementById('txNote').value,
            imgUrl: onlineImgUrl,
            status: 'active'
        });

        saveDB();
        renderLedger();
        
        // ফর্ম ক্লিয়ার করা
        amtInput.value = ""; 
        document.getElementById('txNote').value = "";
        document.getElementById('txFile').value = "";
        document.getElementById('imgPreview').classList.add('hidden');
        if(saveBtn) saveBtn.innerText = "CONFIRM";
    };

    // --- পিন লজিক চেক ---
    let needsPin = false;

    // যদি কাঁচা মোডে (Secret Mode) থাকে
    if (db.secret === true) {
        // শুধুমাত্র কাস্টমারের কাছ থেকে টাকা পাওয়ার (RECEIVED) সময় পিন লাগবে
        if (db.tab === 'CUSTOMER' && type === 'RECEIVED') {
            needsPin = true;
        }
    }

    // পিন লাগবে কি না সেই অনুযায়ী অ্যাকশন নেওয়া
    if (needsPin) {
        askPin(saveAction);
    } else {
        saveAction(); // পিন ছাড়া সরাসরি সেভ
    }
}

        function deleteTx(tid) {
            if(confirm("Are you sure? This entry will be grayed out.")) {
                const p = db.people.find(x => x.id === db.activeId);
                p.transactions.find(t => t.id === tid).status = 'deleted';
                saveDB(); renderLedger();
            }
        }

        function calcBalance(txs, isSecret, personType) {
    let totalGiven = 0;
    let totalReceived = 0;

    // শুধুমাত্র একটিভ এবং মোড অনুযায়ী ট্রানজ্যাকশন ফিল্টার করা
    const filteredTxs = txs.filter(t => t.secret === isSecret && t.status === 'active');

    filteredTxs.forEach(t => {
        if (t.type === 'GIVEN') totalGiven += t.amount;
        if (t.type === 'RECEIVED') totalReceived += t.amount;
    });

    if (personType === 'SUPPLIER') {
        // সাপ্লায়ারের ক্ষেত্রে: যা পেয়েছি - যা দিয়েছি = আমার দেনা
        return totalReceived - totalGiven; 
    } else {
        // কাস্টমারের ক্ষেত্রে: যা দিয়েছি - যা পেয়েছি = আমার পাওনা
        return totalGiven - totalReceived;
    }
}

        function saveDB() { localStorage.setItem('pb_pro_ledger_v3', JSON.stringify(db)); }
        function goHome() { document.getElementById('pageLedger').classList.add('hidden'); document.getElementById('pageHome').classList.remove('hidden'); renderHome(); }
        function refresh() { if(db.activeId && !document.getElementById('pageLedger').classList.contains('hidden')) renderLedger(); else renderHome(); }
        function openAddModal() { 
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('addModalTitle').innerText = "Add New " + (db.tab === 'CUSTOMER' ? 'Customer' : 'Supplier');
        }
        function closeAddModal() { document.getElementById('addModal').classList.add('hidden'); }
        
        function confirmAdd() {
            const n = document.getElementById('newPName').value;
            const ph = document.getElementById('newPPhone').value;
            if(!n || !ph) return alert("Required fields missing");
            db.people.unshift({ id: Date.now(), name: n, phone: ph, type: db.tab, transactions: [] });
            saveDB(); closeAddModal(); renderHome();
            document.getElementById('newPName').value = ""; document.getElementById('newPPhone').value = "";
        }

        function showFullReport() {
            askPin(() => {
                let msg = "BUSINESS SUMMARY\n\nNAME | MAIN | SECRET\n--------------------\n";
                db.people.forEach(p => {
                    msg += `${p.name} | ₹${calcBalance(p.transactions, false)} | ₹${calcBalance(p.transactions, true)}\n`;
                });
                alert(msg);
            });
        }

        function zoomImage(src) {
    const modal = document.getElementById('zoomModal');
    const img = document.getElementById('zoomImg');
    img.src = src;
    modal.classList.remove('hidden');
    // পিন চিমটি দিয়ে জুম করার ফিল দেওয়ার জন্য এনিমেশন
    img.style.transform = "scale(0.8)";
    setTimeout(() => {
        img.style.transform = "scale(1)";
    }, 50);
}

        function forgotPin() {
            const ph = prompt("Enter your registered mobile number:");
            if(ph === db.admin.phone) {
                const pin = prompt("Enter NEW 4-digit PIN:");
                if(pin.length === 4) {
                    db.admin.pin = pin; saveDB(); alert("PIN Updated Successfully!");
                }
            } else alert("Mobile number not found!");
        }
    </script>
